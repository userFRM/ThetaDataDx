    <tspan fill="#1074FF">theta</tspan><tspan fill="#a0a0a0">data</tspan><tspan dx="8" fill="url(#dxGradient)" font-style="italic" font-weight="900">Dx</tspan>
  </text>

  <!-- Global Developer Output Console line: SDK label followed by the four official
       language marks. Each mark is the upstream monochrome glyph nested in its own
       0 0 24 24 viewBox and tinted to the wordmark grey (#EAECEF) so the set reads as
       one harmonized row on the dark grid rather than four clashing brand colors. -->
  <g transform="translate(148, 124)">
    <text font-family="'JetBrains Mono', Consolas, Monaco, monospace" font-size="12" letter-spacing="0.05em">
      <tspan fill="#64768E">UNFILTERED MARKET DATA SDK //</tspan>
    </text>

