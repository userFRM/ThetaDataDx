<svg width="800" height="180" viewBox="0 0 800 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brand natively explicit standard loops gradient -->
    <linearGradient id="dxGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="100%" stop-color="#1074FF" />
    </linearGradient>

    <!-- Fading matrix transparency paths specifically defining the 4 asset flows  -->
    <linearGradient id="quantGlow" x1="0" y1="0" x2="380" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1074FF" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="dataStreamLine" x1="0" y1="0" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1074FF" stop-opacity="0" />
      <stop offset="15%" stop-color="#1074FF" stop-opacity="0.3" />
      <stop offset="65%" stop-color="#00D4FF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- BACKGROUND: The Dark Architecture Native Grid Box Layer -->
  <rect x="2" y="2" width="796" height="176" rx="14" fill="#090D13" stroke="#1C2636" stroke-width="1.5" />
  <rect x="3" y="3" width="794" height="60" rx="13" fill="#ffffff" opacity="0.015" />

  <!-- THE MULTI-ASSET TICK PIPELINE BACKGROUND
       Positioned completely safely far right to respect perfect brand formatting limits natively -->
  <g transform="translate(370, 0)">

      <!-- LAYER 1: Stocks (Raw unfiltered Web-Socket quote streaming tape) -->
      <line x1="20" y1="36" x2="430" y2="36" stroke="url(#dataStreamLine)" stroke-width="1.5" stroke-dasharray="14 6" opacity="0.8"/>
      <rect x="180" y="34" width="38" height="4" rx="2" fill="#00D4FF" opacity="0.9" />
      <rect x="60"  y="34" width="12" height="4" rx="2" fill="#1074FF" />

      <!-- LAYER 2: Indices & Rates (Solid constant structural updates lines) -->
      <line x1="-30" y1="82" x2="430" y2="82" stroke="url(#dataStreamLine)" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>
      <rect x="290" y="81" width="8"  height="2" rx="1" fill="#00D4FF" opacity="0.8"/>

      <!-- LAYER 3: Options Surface Derivation Lines (Shows advanced data structure handling logic lines natively) -->
      <path d="M 0 170 C 120 150 200 90 430 140" fill="none" stroke="url(#quantGlow)" stroke-width="2" opacity="0.7"/>

      <!-- ASSET CLASS TELEMETRY TAGS (Typographic array matrix rendering values formatting data packets strings native directly text boundaries logic correctly directly natively perfectly nicely perfectly inline formats ) -->
      <!-- Visual explicitly displays STOCKS + OPTIONS + RATES + INDICES standard multi packet properties text streams  -->
      <g font-family="'JetBrains Mono', Consolas, Courier, monospace" font-size="10" opacity="0.45">

        <!-- [OPTIONS] Local Black-Scholes greeks for a near-ATM SPY call -->
        <text x="90" y="22" fill="#00D4FF">SPY 20260619 C 550   Δ 0.531  Γ 0.013  Θ -0.19  ν 0.44</text>

        <!-- [STOCKS] Full-tick NBBO quote -->
        <text x="40" y="66" fill="#1074FF" font-weight="700">NBBO  bid 4.85 ×120   ask 4.90 ×88</text>
        <!-- [INDICES] Index level + implied vol -->
        <text x="240" y="72" fill="#6A80A1">SPX 5512.40   VIX 13.80   IV 12.1%</text>

        <!-- [TRADE] Full-tick trade print -->
        <text x="80" y="158" fill="#1074FF">trade  px 4.87  sz 10  @CBOE</text>
        <!-- [STOCKS] Equity OHLC bar -->
        <text x="172" y="130" fill="#00D4FF" font-size="10">AAPL  O 232.1  H 234.8  L 231.6  C 233.9</text>
      </g>
  </g>

