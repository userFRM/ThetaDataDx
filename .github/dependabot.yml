version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "npm"
    directory: "/thetadatadx-ts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "npm"
    directory: "/docs-site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "pip"
    directory: "/thetadatadx-py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

