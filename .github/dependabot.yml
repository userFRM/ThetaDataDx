version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "npm"
    directory: "/thetadatadx-ts"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]
    # The `thetadatadx-*` platform packages in optionalDependencies are this
    # project's own napi binaries; their versions track the release and are
    # set by scripts/release/bump_version.py, not dependabot. Bumping them to
    # an as-yet-unpublished release version breaks the lockfile install.
    ignore:
      - dependency-name: "thetadatadx-*"

  - package-ecosystem: "npm"
    directory: "/docs-site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "pip"
    directory: "/thetadatadx-py"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      patch-minor:
        update-types: ["patch", "minor"]

