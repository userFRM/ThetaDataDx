name: Install protoc
description: Install the Protocol Buffers compiler on GitHub-hosted runners.

runs:
  using: composite
  steps:
    - name: Install protoc on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
        protoc --version

    - name: Install protoc on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        brew install protobuf
        protoc --version

    - name: Install protoc on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $version = '34.1'
        $zipPath = Join-Path $env:RUNNER_TEMP "protoc-$version-win64.zip"
        $extractDir = Join-Path $env:RUNNER_TEMP "protoc-$version-win64"
        $downloadUrl = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"

        Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath

        if (Test-Path $extractDir) {
          Remove-Item -Recurse -Force $extractDir
        }

        Expand-Archive -Path $zipPath -DestinationPath $extractDir
        $binDir = Join-Path $extractDir 'bin'
        $protocExe = Join-Path $binDir 'protoc.exe'
        $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        & $protocExe --version
