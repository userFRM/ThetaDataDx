name: CI

# Tiered CI. The fast lane runs on every PR to main (drafts included)
# and is the merge gate: format, a Linux clippy pass with warnings
# denied, the core library tests, and every cheap script gate.
# Cross-platform builds and the slow compile-heavy jobs run post-merge on
# main, on a nightly schedule, on release tags, and on a PR only when
# relevant paths change or the `full-ci` label is set. Draft PRs run the
# fast lane only.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  merge_group:
  schedule:
    # Off-peak, off-minute nightly run of the full heavy lane so the
    # cross-platform builds, semver check, and bench gate are proven
    # daily even when every PR that day skipped them on path grounds.
    - cron: "23 6 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ───────────────────────────────────────────────────────────────
  # Path-relevance gate. Heavy jobs read these outputs to decide
  # whether a pull_request touched code that warrants the expensive
  # cross-platform / compile-heavy work. Non-PR events (push to main,
  # schedule, tag, merge_group) ignore these outputs and always run the
  # full heavy lane, so coverage is never lost. The filter definition is
  # shared across every lane via the reusable `paths.yml`.
  # ───────────────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/paths.yml

  # ───────────────────────────────────────────────────────────────
  # Matrix planner. Emits the OS matrix the cross-platform heavy jobs
  # consume via `fromJSON`. On a pull_request the matrix is the Linux
  # leg only — the macOS/Windows legs are proven post-merge on main, on
  # the nightly schedule, on tags, and in the merge queue, where the
  # full matrix always runs. Skipping individual legs with a leg-level
  # `if` would skip the whole job, so the breadth is chosen here at the
  # matrix source instead.
  # ───────────────────────────────────────────────────────────────
  setup:
    name: Plan matrices
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ffi_matrix: ${{ steps.plan.outputs.ffi_matrix }}
      bindings_matrix: ${{ steps.plan.outputs.bindings_matrix }}
      lint_matrix: ${{ steps.plan.outputs.lint_matrix }}
    steps:
      - name: Choose matrix breadth
        id: plan
        shell: bash
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          if [ "${IS_PR}" = "true" ]; then
            # PR: Linux only for the cross-platform builds; ubuntu/MSRV
            # clippy only for the lint matrix.
            ffi='[{"os":"ubuntu-latest","artifact-name":"ffi-linux-x86_64","artifact-path":"target/release/libthetadatadx_ffi.so\ntarget/release/libthetadatadx_ffi.a"}]'
            bindings='[{"os":"ubuntu-latest","ffi_artifact":"ffi-linux-x86_64"}]'
            lint='[{"os":"ubuntu-latest","toolchain":"1.88"}]'
          else
            # main / tag / schedule / merge_group: full cross-platform set.
            ffi='[{"os":"ubuntu-latest","artifact-name":"ffi-linux-x86_64","artifact-path":"target/release/libthetadatadx_ffi.so\ntarget/release/libthetadatadx_ffi.a"},{"os":"macos-latest","artifact-name":"ffi-macos-arm64","artifact-path":"target/release/libthetadatadx_ffi.dylib\ntarget/release/libthetadatadx_ffi.a"},{"os":"windows-latest","artifact-name":"ffi-windows-msvc-x86_64","artifact-path":"target/release/thetadatadx_ffi.dll\ntarget/release/thetadatadx_ffi.dll.lib"}]'
            bindings='[{"os":"ubuntu-latest","ffi_artifact":"ffi-linux-x86_64"},{"os":"macos-latest","ffi_artifact":"ffi-macos-arm64"},{"os":"windows-latest","ffi_artifact":"ffi-windows-msvc-x86_64"}]'
            lint='[{"os":"ubuntu-latest","toolchain":"1.88"},{"os":"macos-latest","toolchain":"stable"},{"os":"windows-latest","toolchain":"stable"}]'
          fi
          {
            echo "ffi_matrix={\"include\":${ffi}}"
            echo "bindings_matrix={\"include\":${bindings}}"
            echo "lint_matrix={\"include\":${lint}}"
          } >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════
  # FAST LANE. Runs on every PR (drafts included), every push to main,
  # and in the merge queue. This is the required merge gate. Linux-only,
  # no cross-platform builds, targets well under ten minutes.
  # ═══════════════════════════════════════════════════════════════

  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (ubuntu, stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  core-test:
    name: Core library tests (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      # The library unit tests for the core crate. This is the fast
      # merge-gate slice: it builds the default feature set plus
      # `config-file` so the TOML-config test module compiles, and runs
      # the `--lib` unit tests without the heavy optional-dependency
      # suites (arrow / polars / panic-boundary) or the full workspace
      # build, which run in the heavy lane. `config-file` is enabled so
      # the `#[cfg(feature = "config-file")]` config tests in
      # `config/mod.rs` actually compile and run rather than silently
      # skipping.
      - run: cargo test -p thetadatadx --features config-file --lib --locked

  c-abi-completeness:
    name: C ABI completeness vs C header
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Build the release FFI library first so the gate sources its
      # symbol inventory from `nm -D --defined-only` on the compiled
      # .so. A regex pass over source would miss macro-emitted symbols
      # (`tick_array_free!` etc.); the nm-based ground truth catches
      # every exported `thetadatadx_*` symbol the loader will actually expose.
      # The cross-platform FFI builds live in the heavy lane; the fast
      # lane builds the Linux .so this gate needs and nothing more.
      - run: cargo build -p thetadatadx-ffi --release --locked
      - run: python3 scripts/ci/check_c_abi_completeness.py --selftest
      - run: python3 scripts/ci/check_c_abi_completeness.py

  binding-parity:
    name: Cross-binding parity matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Gate 2 test harness (#595): exercise the per-field /
      # per-setter granularity matrix in-process before running the
      # production gate. Two layers — `--selftest` is a fast in-process
      # smoke check; `scripts/ci/tests/test_check_binding_parity.py` drives the
      # full synthetic-source matrix via tempdir.
      - run: python3 scripts/ci/check_binding_parity.py --selftest
      - run: python3 scripts/ci/tests/test_check_binding_parity.py
      - run: python3 scripts/ci/check_binding_parity.py

  wire-schema-drift:
    name: Wire schema drift (proto + FPSS + tick layouts)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Gate 5 (#548): every committed snapshot (gRPC proto codegen,
    # FPSS event class projections, tick-layout asserts, SDK surface
    # tables) must equal the regeneration output. Drift = build
    # failure. `generate_sdk_surfaces --check` already validates the
    # endpoint / surface / tick / FPSS event projections; this job
    # adds the gRPC proto snapshot drift check on top and asserts the
    # tree is clean afterwards so a stray write from either generator
    # also surfaces as a hit.
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - run: cargo run -p thetadatadx --features config-file,__internal --bin generate_docs_site --locked -- --check
      - run: cargo run -p thetadatadx --features grpc-codegen --bin refresh_grpc_snapshot --locked
      - name: Assert no tracked file changed
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "::error::Wire schema regeneration produced uncommitted changes. Run \`cargo run -p thetadatadx --bin refresh_grpc_snapshot --features grpc-codegen\` and \`cargo run -p thetadatadx --bin generate_sdk_surfaces --features config-file\` locally and commit the diff." >&2
            exit 1
          fi

  safety-comments:
    name: SAFETY-comment hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Structural SAFETY-comment boilerplate detector
        run: |
          python3 scripts/ci/check_safety_comment_boilerplate.py --selftest
          python3 scripts/ci/check_safety_comment_boilerplate.py

  public-surface-leak:
    name: Public surface internal-name leak
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Shipped surface internal-name leak detector
        run: |
          python3 scripts/ci/check_public_surface_leak.py --selftest
          python3 scripts/ci/check_public_surface_leak.py
      # Prose complement to the symbol-leak gate above: the symbol gate
      # guards the exported API identifiers, this one guards the
      # client-facing documentation prose (READMEs, examples, published
      # type declarations, docs site, OpenAPI, user config) against the
      # internal transport vocabulary. `--selftest` is the in-process
      # smoke check; the tests/ file drives the full fixture matrix.
      - name: Client-facing vocabulary detector
        run: |
          python3 scripts/ci/check_client_facing_vocab.py --selftest
          python3 scripts/ci/tests/test_check_client_facing_vocab.py
          python3 scripts/ci/check_client_facing_vocab.py

  doc-defaults:
    name: Documented config defaults
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Documented default vs Rust source-of-truth detector
        run: |
          python3 scripts/ci/check_doc_defaults.py --selftest
          python3 scripts/ci/check_doc_defaults.py

  no-re-framing:
    name: Source docs framing hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Source docs framing detector
        run: |
          python3 scripts/ci/check_no_re_framing.py --selftest
          python3 scripts/ci/check_no_re_framing.py

  docs-consistency:
    name: Docs consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python3 scripts/ci/check_docs_consistency.py --selftest
      - run: python3 scripts/ci/check_docs_consistency.py

  version-sync:
    name: Version sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python3 scripts/ci/check_version_sync.py --selftest
      - run: python3 scripts/ci/check_version_sync.py

  # Pure-Python script gates split out of the heavy `surfaces` job so they
  # run on EVERY PR — including a docs-only PR that skips the rust-gated
  # `surfaces` job. While they lived only in `surfaces`, a path-irrelevant
  # PR skipped them, and the aggregate gate counts a skip as a pass, so
  # cross-lockfile drift / endpoint-agreement regressions could merge
  # untested. Neither needs cargo or node, so they belong in the fast lane
  # alongside docs-consistency / version-sync.
  lockfile-drift:
    name: Lockfile drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Cross-Cargo.lock dependency-version drift on security-critical
      # (rustls, tokio, h2, reqwest, hyper) and SDK-owned (thetadatadx)
      # deps. A workspace bump must land in every binding lockfile or the
      # wheel / npm package ships a stale runtime.
      - run: python3 scripts/ci/check_lockfile_drift.py

  agreement:
    name: Endpoint agreement
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python3 scripts/ci/tests/test_check_agreement.py

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Run every sub-check (advisories, bans, licenses, sources).
          # Policy lives in deny.toml at the repo root.
          arguments: --all-features

  # ═══════════════════════════════════════════════════════════════
  # HEAVY LANE. Cross-platform builds and the slow compile-heavy jobs.
  # Runs on push to main, on the nightly schedule, on release tags, in
  # the merge queue, and on a PR only when relevant paths changed or the
  # `full-ci` label is present. Never on draft PRs.
  # ═══════════════════════════════════════════════════════════════

  lint-matrix:
    name: Lint (${{ matrix.os }}, ${{ matrix.toolchain }})
    needs: [changes, setup]
    # The `full-ci` label and the source-touching-rename safety net
    # (`force_full`) each force the heavy lane on their own, so both sit
    # OUTSIDE the docs fast-path clause: a `full-ci` PR runs even when the
    # diff is docs-render-only, and a rename that moved real source into
    # the doc tree runs even though the rename-blind dorny flag is false.
    # Absent both, the original selective behavior holds — skip when the
    # diff is docs-render-only or the per-language flag is false.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.rust == 'true')))
    strategy:
      fail-fast: false
      # The Linux stable clippy pass is the fast-lane `clippy` job; this
      # matrix covers the MSRV floor (Linux, declared in
      # `[workspace.package].rust-version`) plus the cross-platform
      # runners. The `setup` planner keeps a PR to the ubuntu/MSRV leg —
      # which catches a dependency bump that lifts the rustc floor before
      # release — and defers the macOS/Windows clippy legs to main and
      # the nightly run, off the per-push critical path.
      matrix: ${{ fromJSON(needs.setup.outputs.lint_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test
    needs: changes
    # full-ci and force_full each force the heavy lane on their own (see
    # the lint-matrix note); otherwise the original selective behavior.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.rust == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      # The `__test-helpers` feature is private (double-underscore
      # prefix) — see `thetadatadx-rs/Cargo.toml`. It exposes
      # test-only constructors and the `grpc` module surface for
      # integration tests and decode-fixture harnesses that drive the
      # raw transport layer against synthetic frames. Without this flag
      # those tests silently skip and the endpoint-routing / decoder /
      # pool-bench coverage is lost.
      #
      # `config-file` is enabled alongside it so the TOML-config test
      # module (`#[cfg(feature = "config-file")]` in `config/mod.rs`)
      # actually compiles and runs. Without it those tests are excluded
      # entirely, so a sample config that silently drops a section — or a
      # test asserting an override that never applies — passes by never
      # executing.
      - run: cargo test --workspace --locked --features thetadatadx/__test-helpers,thetadatadx/config-file
      # Gate 3 (#546) - Rust side: doctests run as part of `cargo test
      # --workspace` above, but invoking `--doc` explicitly verifies
      # the FFI crate's `extern "C"` doc examples compile + run on
      # every PR. Without this, a doc-only regression (an example
      # that references a renamed symbol, say) wouldn't surface until
      # someone manually ran the doc step.
      - run: cargo test --doc --workspace --locked

  # The feature-gated suites compile heavy optional dependencies
  # (`polars` / `arrow`) and the panic-boundary harness. They run in a
  # dedicated job rather than piling onto the workspace `Test` job, whose
  # stacked target artifacts otherwise exhaust the runner's disk.
  feature-tests:
    name: Feature-gated tests (columnar + panic boundary)
    needs: changes
    # full-ci and force_full each force the heavy lane on their own (see
    # the lint-matrix note); otherwise the original selective behavior.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.rust == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      # The DataFrame extension traits (`to_arrow` / `to_polars`) and their
      # column / order / dtype contract live behind the `arrow` / `polars`
      # features, which the workspace run does not enable — so their tests
      # would otherwise compile to an empty, silently-passing binary. Run
      # them explicitly so a regression in the columnar surface fails CI.
      - run: cargo test -p thetadatadx --locked --features "arrow,polars,frames,__test-helpers,config-file"
      # The FFI unwind-safety guard (`tests/panic_boundary.rs`) is gated
      # behind `testing-panic-boundary`. It verifies a panic crossing an
      # `extern "C"` boundary is caught and converted to an error code
      # instead of aborting the process — the contract every C / C++ /
      # Python caller relies on. Without this step the guard compiles to
      # nothing and the boundary is unverified.
      - run: cargo test -p thetadatadx-ffi --locked --features testing-panic-boundary

  rustdoc:
    name: Rustdoc — Gate 13 catches broken intra-doc links
    needs: changes
    # full-ci and force_full each force the heavy lane on their own (see
    # the lint-matrix note); otherwise the original selective behavior.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.rust == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      # `[workspace.lints.rust] warnings = "deny"` promotes every
      # rustdoc warning (broken intra-doc links, redundant explicit
      # link targets, unresolved references) into a hard build error.
      # Running `cargo doc --no-deps --workspace` therefore fails CI
      # the moment a docstring links to a private item, a renamed
      # symbol, or a path that no longer exists — closes the gap
      # A widely-cited open-source PR documented, where 33 broken links shipped
      # because no CI job ever invoked `cargo doc`.
      - run: cargo doc --no-deps --workspace --locked
      # Validate the feature-gated docs too: `frames`, `arrow`, and
      # `polars` add public docs that are silent on the default cargo
      # doc invocation. docs.rs builds with `all-features = true`, so
      # CI must mirror that contract or a broken link will land on
      # docs.rs but pass CI.
      - run: cargo doc --no-deps -p thetadatadx --features "arrow polars frames config-file" --locked

  bench:
    name: Bench regression gate
    needs: changes
    # Criterion wall-clock benches are runner-sensitive and the baseline
    # is admittedly deferred, so this never runs on a PR — the
    # deterministic allocations `perf-gate` covers per-PR regressions.
    # Runs post-merge on main, on the nightly schedule, on tags, and in
    # the merge queue, where a real regression is caught before release.
    if: >-
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - name: Run tracked benches (mock-backed, no live creds)
        run: |
          THETADATADX_BENCH_QUICK=1 cargo bench -p thetadatadx --features __test-helpers \
              --bench grpc_transport_comparison --locked
          cargo bench -p thetadatadx --bench streaming_channels --locked -- \
              "streaming_channels/direct_callback/100k_events" --quick
          cargo bench -p thetadatadx --bench streaming_channels --locked -- \
              "streaming_channels/disruptor_consumer_panic_isolated/100k_events" --quick # VOCAB-OK: bench function name from bench crate
          cargo bench -p thetadatadx --bench streaming_channels --locked -- \
              "streaming_channels/disruptor_cross_thread/100k_events" --quick # VOCAB-OK: bench function name from bench crate
          # Production-constructor variant: routes the pipeline through
          # `build_poller_producer` so the sequence-recording producer
          # adapter is measured. Needs `__test-helpers` for the
          # crate-internal constructor re-export; its baseline is deferred
          # (see `_deferred` in `benches/baseline/criterion.json`) until a
          # first sample lands on `main`, mirroring the bench-gate rule
          # that a value is blessed only against the hosted-runner profile.
          cargo bench -p thetadatadx --features __test-helpers --bench streaming_channels --locked -- \
              "streaming_channels/disruptor_production_ctor/100k_events" --quick # VOCAB-OK: bench function name from bench crate
          # Gate 10 (#553) expansion: FPSS event clone + match dispatch
          # benches. The bench files already exist
          # (`bench_fpss_event.rs`); this step exercises them in CI so
          # the data is generated. They will be added to
          # `benches/baseline/criterion.json` in a follow-up commit once
          # a first sample lands on `main` — the baseline JSON is
          # captured locally and we do not bless a value against the
          # GitHub-hosted runner without one observed sample.
          cargo bench -p thetadatadx --bench bench_fpss_event --locked -- --quick
      - name: Validate the regression gate's own threshold logic
        run: python3 scripts/ci/check_bench_regression.py --selftest
      - name: Compare against checked-in baseline
        # Threshold tightened from 100% (a 2x slowdown passed) to 25%.
        # The baseline JSON is recaptured against the GH-hosted runner
        # perf profile so the comparison is apples-to-apples; a 25%
        # slowdown is the smallest regression we want to gate against.
        # The previous 100% threshold was a placeholder set when the
        # gate first landed (local vs CI runner perf delta was
        # unknown); now that the baseline is CI-equivalent, the
        # threshold can shrink to the meaningful signal range.
        run: python3 scripts/ci/check_bench_regression.py --threshold 25

  semver:
    name: Semver check
    needs: changes
    # cargo-semver-checks anchored at the last published release baseline.
    # Runs in the heavy lane: on push to main and tags it compares against
    # the published crates.io baseline (which catches a hotfix branch that
    # rebased directly onto main); on a PR it runs only when the crate or
    # FFI sources changed or the `full-ci` label is set, and never on a
    # draft.
    # full-ci and force_full each force the PR heavy lane on their own (see
    # the lint-matrix note); otherwise the original selective behavior. The
    # non-PR branch (main / tag / schedule / merge_group) is unchanged.
    if: >-
      (github.event_name != 'pull_request' &&
       (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') ||
        github.event_name == 'schedule' || github.event_name == 'merge_group')) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.semver == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      # cargo-semver-checks anchored at the last published release;
      # hard-fail on any public Rust API break the crate version does
      # not account for. Advance the baseline tag at every published
      # major bump so the patch line is guarded against accidental
      # breaks.
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        continue-on-error: false
        with:
          package: thetadatadx
          baseline-rev: v11.0.0  # VOCAB-OK: published-release tag is the semver-checks baseline anchor

  surfaces:
    name: Extended Surfaces
    needs: changes
    # full-ci and force_full each force the heavy lane on their own (see
    # the lint-matrix note); otherwise the original selective behavior.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.rust == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      # NOTE: `check_lockfile_drift.py` and `test_check_agreement.py` ran
      # here historically, but they are pure-Python gates that must run on
      # EVERY PR (a docs-only PR skips this rust-gated heavy job). They now
      # live in the standalone `lockfile-drift` / `agreement` fast-lane
      # jobs above, both wired into `ci-gate`. Kept out of this job to
      # avoid running them twice.
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - run: cargo run -p thetadatadx --features config-file,__internal --bin generate_docs_site --locked -- --check
      - run: cargo check --manifest-path tools/mcp/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/mcp/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/mcp/Cargo.toml --locked
      - run: cargo check --manifest-path tools/server/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/server/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/server/Cargo.toml --locked
      - run: cargo check --manifest-path thetadatadx-py/Cargo.toml --locked
      - run: cargo check --manifest-path thetadatadx-ts/Cargo.toml --locked
      - name: TypeScript SDK build + test
        working-directory: thetadatadx-ts
        run: |
          npm install
          npm run build
          npm test

  # ───────────────────────────────────────────────────────────────
  # Doc-render fast lane. The markdown-emitting doc generator
  # (`build_support_bin/endpoints/docs_render/**`) and the checked-in
  # doc-site output tree cannot change the compiled library or any SDK
  # binding surface, so a PR that touches ONLY those skips the whole
  # cross-platform matrix (`test` / `surfaces` / `build-ffi` /
  # `sdk-bindings` / `cpp-tests` and the Python/TS lanes). The doc
  # regeneration `--check`s and fmt already run on EVERY PR in the
  # always-on fast lane (`wire-schema-drift` runs both
  # `generate_sdk_surfaces --check` and `generate_docs_site --check`;
  # `fmt` runs repo-wide), so this job only adds the gaps that the fast
  # lane misses for the feature-gated generator: clippy of the two
  # generator bins (the default `clippy --workspace` does not enable
  # their `config-file` / `__internal` required-features, so it never
  # compiles them) and intra-doc-link rustdoc. On any PR that also
  # touches real source it does not run (the full matrix does instead),
  # and it never runs on push/tag/schedule.
  # ───────────────────────────────────────────────────────────────
  docs-render-check:
    name: Doc-render lint + rustdoc
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      needs.changes.outputs.docs_render_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
        with:
          components: clippy
      # Clippy the feature-gated generator bins (and the shared
      # `build_support_bin` tree both compile) — the gap the always-on
      # `clippy --workspace --all-targets` leaves because it does not
      # enable their required-features.
      - run: cargo clippy -p thetadatadx --bin generate_docs_site --features config-file,__internal --locked -- -D warnings
      - run: cargo clippy -p thetadatadx --bin generate_sdk_surfaces --features config-file --locked -- -D warnings
      # Intra-doc link hygiene on the core crate the generator lives in.
      - run: cargo doc --no-deps -p thetadatadx --features "config-file" --locked

  build-ffi:
    name: Build FFI (${{ matrix.os }})
    needs: [changes, setup]
    # full-ci and force_full each force the heavy lane on their own (see
    # the lint-matrix note); otherwise the original selective behavior.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.ffi == 'true')))
    # A PR builds the Linux target only; the macOS/Windows targets are
    # proven post-merge on main, on the nightly schedule, on tags, and in
    # the merge queue. The OS set is chosen by the `setup` planner.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.ffi_matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu
      - run: cargo build --release -p thetadatadx-ffi --locked
      - if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu -p thetadatadx-ffi --locked
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
      - if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ffi-windows-gnu-x86_64
          path: |
            target/x86_64-pc-windows-gnu/release/thetadatadx_ffi.dll
            target/x86_64-pc-windows-gnu/release/libthetadatadx_ffi*.a

  build-server:
    name: Build Server (${{ matrix.archive }})
    runs-on: ${{ matrix.os }}
    # Tag-only: the server binaries are a release artifact. On a `v*` tag the
    # `release` job below pulls these archives into the GitHub Release; nothing
    # consumes them on a PR, so the cross-platform build stays off the PR path.
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: thetadatadx-server-windows-x86_64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: thetadatadx-server-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: thetadatadx-server-macos-x86_64.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: thetadatadx-server-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/server
          key: ${{ matrix.target }}
      - uses: ./.github/actions/install-protoc
      - name: Install musl toolchain (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - name: Build release binary
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --manifest-path tools/server/Cargo.toml --target ${{ matrix.target }}
      - name: Package archive
        id: package
        shell: bash
        run: |
          set -euo pipefail
          bindir="tools/server/target/${{ matrix.target }}/release"
          stage="$(mktemp -d)/thetadatadx-server"
          mkdir -p "$stage"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$bindir/thetadatadx-server.exe" "$stage/"
          else
            cp "$bindir/thetadatadx-server" "$stage/"
          fi

          cat > "$stage/README.txt" <<'EOF'
          thetadatadx-server
          ==================

          A local HTTP REST (port 25503) and WebSocket (port 25520) server that
          speaks the v3 route surface. It connects to the upstream data servers
          directly; no JVM terminal is required.

          These binaries are not code-signed yet, so each operating system asks
          for a one-time confirmation the first time you run them.

          Windows
            1. Unzip this archive.
            2. Double-click thetadatadx-server.exe. If a "Windows protected your
               PC" SmartScreen dialog appears, click "More info", then
               "Run anyway".

          macOS
            1. Unpack this archive.
            2. Right-click (or Control-click) thetadatadx-server and choose
               "Open", then confirm "Open" in the dialog. If macOS still blocks
               it, open System Settings > Privacy & Security and click
               "Open Anyway" next to the thetadatadx-server entry.

          Linux
            1. Unpack this archive.
            2. Make the binary executable, then run it:
                 chmod +x thetadatadx-server
                 ./thetadatadx-server

          On the first launch the server prompts for the email and password of
          your ThetaData login and saves them to a local creds.txt file so the
          prompt does not repeat. Pass --creds <path> to use a different file.
          EOF

          out="$(pwd)/${{ matrix.archive }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            # `7z` ships on GitHub Windows runners and produces a standard zip.
            ( cd "$(dirname "$stage")" && 7z a -tzip "$out" "$(basename "$stage")" >/dev/null )
          else
            tar -czf "$out" -C "$(dirname "$stage")" "$(basename "$stage")"
          fi
          echo "path=$out" >> "$GITHUB_OUTPUT"
      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

  sdk-bindings:
    name: SDK Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [setup, build-ffi]
    timeout-minutes: 30
    # The OS set mirrors `build-ffi` (it consumes those artifacts): Linux
    # only on a PR, full cross-platform on main/tag/nightly. When
    # `build-ffi` skips (docs-render-only PR), this skips with it.
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.bindings_matrix) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.ffi_artifact }}
          path: target/release/
      - if: runner.os == 'Windows'
        uses: actions/download-artifact@v8
        with:
          name: ffi-windows-gnu-x86_64
          path: target/x86_64-pc-windows-gnu/release/
      - run: cmake -S thetadatadx-cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp

  cpp-tests:
    name: C++ Tests (offline)
    runs-on: ubuntu-latest
    needs: build-ffi
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ffi-linux-x86_64
          path: target/release/
      - name: Configure
        run: cmake -S thetadatadx-cpp -B build/cpp-tests -DTHETADATADX_CPP_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build/cpp-tests --config Release --target thetadatadx_cpp_tests
      - name: Run offline subset
        run: ctest --test-dir build/cpp-tests --output-on-failure --no-tests=error

  # ═══════════════════════════════════════════════════════════════
  # RELEASE LANE. Tag-triggered only. Unchanged: the full matrix has
  # already run above on the same `v*` ref before these gate on it.
  # ═══════════════════════════════════════════════════════════════

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, surfaces, sdk-bindings, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      - shell: bash
        run: |
          set -euo pipefail
          publish_or_skip() {
            local package="$1"
            local manifest_path="$2"
            local version
            local existing=""

            version=$(python3 -c 'import pathlib, sys, tomllib; data = tomllib.loads(pathlib.Path(sys.argv[1]).read_text()); print(data["package"]["version"])' "$manifest_path")

            for attempt in {1..10}; do
              if cargo publish -p "$package" --locked; then
                return 0
              fi

              existing=$(python3 -c 'import json, sys, urllib.request; url = f"https://crates.io/api/v1/crates/{sys.argv[1]}"; data = json.load(urllib.request.urlopen(url, timeout=30)); print(data["crate"]["max_version"])' "$package")

              if [ "$existing" = "$version" ]; then
                echo "$package $version already exists on crates.io; skipping publish"
                return 0
              fi

              if [ "$attempt" -eq 10 ]; then
                echo "failed to publish $package $version; crates.io reports max_version=$existing" >&2
                return 1
              fi

              sleep 30
            done
          }

          publish_or_skip thetadatadx thetadatadx-rs/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-crate, build-ffi, build-server]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ffi-linux-x86_64
          path: artifacts/linux/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-macos-arm64
          path: artifacts/macos/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-msvc-x86_64
          path: artifacts/windows-msvc/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-gnu-x86_64
          path: artifacts/windows-gnu/
      - uses: actions/download-artifact@v8
        with:
          pattern: thetadatadx-server-*
          path: server-assets/
          merge-multiple: true
      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp artifacts/linux/libthetadatadx_ffi.so release-assets/
          cp artifacts/linux/libthetadatadx_ffi.a release-assets/
          cp artifacts/macos/libthetadatadx_ffi.dylib release-assets/
          cp artifacts/macos/libthetadatadx_ffi.a release-assets/
          cp artifacts/windows-msvc/thetadatadx_ffi.dll release-assets/thetadatadx_ffi-windows-msvc.dll
          cp artifacts/windows-msvc/thetadatadx_ffi.dll.lib release-assets/thetadatadx_ffi-windows-msvc.dll.lib
          cp artifacts/windows-gnu/thetadatadx_ffi.dll release-assets/thetadatadx_ffi-windows-gnu.dll
          find artifacts/windows-gnu -maxdepth 1 -type f -name 'libthetadatadx_ffi*.a' -exec cp {} release-assets/ \;
          find server-assets -type f -exec cp {} release-assets/ \;
      - name: Resolve release notes body
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          candidate=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$candidate" ]; then
            echo "body_path=$candidate" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: |
            release-assets/*

  # ═══════════════════════════════════════════════════════════════
  # AGGREGATOR GATE. A single roll-up status that summarizes every job
  # above. This is the one check branch protection should require: it
  # runs with `if: always()`, depends on every other job, and fails
  # unless every dependency finished `success` or `skipped`. A heavy
  # job that legitimately skips on a path-irrelevant PR counts as a
  # pass; a real `failure` or `cancelled` in any dependency fails the
  # gate. Requiring this one job (instead of a hand-maintained list of
  # per-job names) means a conditionally-skipped required check can no
  # longer leave the merge gate permanently unsatisfiable, and a newly
  # added job is covered the moment it appears in `needs` below.
  # ═══════════════════════════════════════════════════════════════
  ci-gate:
    name: CI gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - changes
      - setup
      - fmt
      - clippy
      - core-test
      - c-abi-completeness
      - binding-parity
      - wire-schema-drift
      - safety-comments
      - public-surface-leak
      - doc-defaults
      - no-re-framing
      - docs-consistency
      - version-sync
      - lockfile-drift
      - agreement
      - cargo-deny
      - lint-matrix
      - test
      - feature-tests
      - rustdoc
      - bench
      - semver
      - surfaces
      - docs-render-check
      - build-ffi
      - sdk-bindings
      - cpp-tests
      - build-server
      - publish-crate
      - release
    steps:
      - name: Fail unless every dependency succeeded or was skipped
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = sorted(
              name
              for name, data in needs.items()
              if data.get("result") not in ("success", "skipped")
          )
          for name in sorted(needs):
              print(f"{name}: {needs[name].get('result')}")
          if bad:
              joined = ", ".join(bad)
              sys.exit(f"CI gate failed: {joined} did not succeed or skip")
          print("CI gate passed: every dependency succeeded or was skipped")
          PY
