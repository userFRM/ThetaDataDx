name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo test --workspace --locked

  surfaces:
    name: Extended Surfaces
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: python3 scripts/check_docs_consistency.py
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - run: cargo clippy --manifest-path tools/mcp/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/mcp/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/server/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/server/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/cli/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/cli/Cargo.toml --locked
      - run: cargo check --manifest-path sdks/python/Cargo.toml --locked

  sdk-bindings:
    name: SDK Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go_enabled: true
          - os: macos-latest
            go_enabled: true
          - os: windows-latest
            go_enabled: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - if: matrix.go_enabled
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - if: runner.os == 'Windows' && matrix.go_enabled
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu
      - run: cargo build --release -p thetadatadx-ffi --locked
      - if: runner.os == 'Windows' && matrix.go_enabled
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu -p thetadatadx-ffi --locked
      - run: cmake -S sdks/cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp
      - if: matrix.go_enabled
        shell: bash
        working-directory: sdks/go
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Linux" ]; then
            export LD_LIBRARY_PATH="${{ github.workspace }}/target/release"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="${{ github.workspace }}/target/release"
          else
            export PATH="${{ github.workspace }}/target/x86_64-pc-windows-gnu/release:$PATH"
            export CGO_LDFLAGS="-L${{ github.workspace }}/target/x86_64-pc-windows-gnu/release"
          fi
          go test ./...

  build-ffi:
    name: Build FFI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: ffi-linux-x86_64
            artifact-path: |
              target/release/libthetadatadx_ffi.so
              target/release/libthetadatadx_ffi.a
          - os: macos-latest
            artifact-name: ffi-macos-arm64
            artifact-path: |
              target/release/libthetadatadx_ffi.dylib
              target/release/libthetadatadx_ffi.a
          - os: windows-latest
            artifact-name: ffi-windows-msvc-x86_64
            artifact-path: |
              target/release/thetadatadx_ffi.dll
              target/release/thetadatadx_ffi.dll.lib
    runs-on: ${{ matrix.os }}
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu
      - run: cargo build --release -p thetadatadx-ffi --locked
      - if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu -p thetadatadx-ffi --locked
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
      - if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ffi-windows-gnu-x86_64
          path: |
            target/x86_64-pc-windows-gnu/release/thetadatadx_ffi.dll
            target/x86_64-pc-windows-gnu/release/libthetadatadx_ffi*.a

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, surfaces, sdk-bindings, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      - shell: bash
        run: |
          set -euo pipefail
          publish_or_skip() {
            local package="$1"
            local manifest_path="$2"
            local version
            local existing=""

            version=$(python3 - "$manifest_path" <<'PY'
import pathlib
import sys
import tomllib

manifest = pathlib.Path(sys.argv[1])
data = tomllib.loads(manifest.read_text())
print(data["package"]["version"])
PY
)

            for attempt in {1..10}; do
              if cargo publish -p "$package" --locked; then
                return 0
              fi

              existing=$(python3 - "$package" <<'PY'
import json
import sys
import urllib.request

package = sys.argv[1]
url = f"https://crates.io/api/v1/crates/{package}"
with urllib.request.urlopen(url, timeout=30) as response:
    data = json.load(response)
print(data["crate"]["max_version"])
PY
)

              if [ "$existing" = "$version" ]; then
                echo "$package $version already exists on crates.io; skipping publish"
                return 0
              fi

              if [ "$attempt" -eq 10 ]; then
                echo "failed to publish $package $version; crates.io reports max_version=$existing" >&2
                return 1
              fi

              sleep 30
            done
          }

          publish_or_skip tdbe crates/tdbe/Cargo.toml
          publish_or_skip thetadatadx crates/thetadatadx/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-crate, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ffi-linux-x86_64
          path: artifacts/linux/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-macos-arm64
          path: artifacts/macos/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-msvc-x86_64
          path: artifacts/windows-msvc/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-gnu-x86_64
          path: artifacts/windows-gnu/
      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp artifacts/linux/libthetadatadx_ffi.so release-assets/
          cp artifacts/linux/libthetadatadx_ffi.a release-assets/
          cp artifacts/macos/libthetadatadx_ffi.dylib release-assets/
          cp artifacts/macos/libthetadatadx_ffi.a release-assets/
          cp artifacts/windows-msvc/thetadatadx_ffi.dll release-assets/thetadatadx_ffi-windows-msvc.dll
          cp artifacts/windows-msvc/thetadatadx_ffi.dll.lib release-assets/thetadatadx_ffi-windows-msvc.dll.lib
          cp artifacts/windows-gnu/thetadatadx_ffi.dll release-assets/thetadatadx_ffi-windows-gnu.dll
          find artifacts/windows-gnu -maxdepth 1 -type f -name 'libthetadatadx_ffi*.a' -exec cp {} release-assets/ \;
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
