name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  c-abi-completeness:
    name: C ABI completeness vs C header
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Build the release FFI library first so the gate sources its
      # symbol inventory from `nm -D --defined-only` on the compiled
      # .so. A regex pass over source would miss macro-emitted symbols
      # (`tick_array_free!` etc.); the nm-based ground truth catches
      # every exported `tdx_*` symbol the loader will actually expose.
      - run: cargo build -p thetadatadx-ffi --release
      - run: python3 scripts/check_c_abi_completeness.py

  binding-parity:
    name: Cross-binding parity matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Gate 2 test harness (#595): exercise the per-field /
      # per-setter granularity matrix in-process before running the
      # production gate. Two layers — `--selftest` is a fast in-process
      # smoke check; `scripts/test_check_binding_parity.py` drives the
      # full synthetic-source matrix via tempdir.
      - run: python3 scripts/check_binding_parity.py --selftest
      - run: python3 scripts/test_check_binding_parity.py
      - run: python3 scripts/check_binding_parity.py

  wire-schema-drift:
    name: Wire schema drift (proto + FPSS + tick layouts)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    # Gate 5 (#548): every committed snapshot (gRPC proto codegen,
    # FPSS event class projections, tick-layout asserts, SDK surface
    # tables) must equal the regeneration output. Drift = build
    # failure. `generate_sdk_surfaces --check` already validates the
    # endpoint / surface / tick / FPSS event projections; this job
    # adds the gRPC proto snapshot drift check on top and asserts the
    # tree is clean afterwards so a stray write from either generator
    # also surfaces as a hit.
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - run: cargo run -p thetadatadx --features config-file,__internal --bin generate_docs_site --locked -- --check
      - run: cargo run -p thetadatadx --features grpc-codegen --bin refresh_grpc_snapshot --locked
      - name: Assert no tracked file changed
        shell: bash
        run: |
          if ! git diff --exit-code; then
            echo "::error::Wire schema regeneration produced uncommitted changes. Run \`cargo run -p thetadatadx --bin refresh_grpc_snapshot --features grpc-codegen\` and \`cargo run -p thetadatadx --bin generate_sdk_surfaces --features config-file\` locally and commit the diff." >&2
            exit 1
          fi

  safety-comments:
    name: SAFETY-comment hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Structural SAFETY-comment boilerplate detector
        run: |
          python3 scripts/check_safety_comment_boilerplate.py --selftest
          python3 scripts/check_safety_comment_boilerplate.py

  public-surface-leak:
    name: Public surface internal-name leak
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Shipped surface internal-name leak detector
        run: |
          python3 scripts/check_public_surface_leak.py --selftest
          python3 scripts/check_public_surface_leak.py

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # Run every sub-check (advisories, bans, licenses, sources).
          # Policy lives in deny.toml at the repo root.
          arguments: --all-features

  check:
    name: Lint (${{ matrix.os }}, ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          # MSRV floor declared in `[workspace.package].rust-version`.
          # Pin the Linux runner to the floor toolchain so a dependency
          # bump that pulls in a newer rustc requirement fails CI before
          # it reaches release.
          - os: ubuntu-latest
            toolchain: "1.88"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      # The `__test-helpers` feature is private (double-underscore
      # prefix) — see `crates/thetadatadx/Cargo.toml`. It exposes
      # test-only constructors and the `grpc` module surface for
      # integration tests and decode-fixture harnesses that drive the
      # raw transport layer against synthetic frames. Without this flag
      # those tests silently skip and the endpoint-routing / decoder /
      # pool-bench coverage is lost.
      - run: cargo test --workspace --locked --features thetadatadx/__test-helpers
      # Gate 3 (#546) - Rust side: doctests run as part of `cargo test
      # --workspace` above, but invoking `--doc` explicitly verifies
      # the FFI crate's `extern "C"` doc examples compile + run on
      # every PR. Without this, a doc-only regression (an example
      # that references a renamed symbol, say) wouldn't surface until
      # someone manually ran the doc step.
      - run: cargo test --doc --workspace --locked

  rustdoc:
    name: Rustdoc — Gate 13 catches broken intra-doc links
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      # `[workspace.lints.rust] warnings = "deny"` promotes every
      # rustdoc warning (broken intra-doc links, redundant explicit
      # link targets, unresolved references) into a hard build error.
      # Running `cargo doc --no-deps --workspace` therefore fails CI
      # the moment a docstring links to a private item, a renamed
      # symbol, or a path that no longer exists — closes the gap
      # A widely-cited open-source PR documented, where 33 broken links shipped
      # because no CI job ever invoked `cargo doc`.
      - run: cargo doc --no-deps --workspace --locked
      # Validate the feature-gated docs too: `frames`, `arrow`, and
      # `polars` add public docs that are silent on the default cargo
      # doc invocation. docs.rs builds with `all-features = true`, so
      # CI must mirror that contract or a broken link will land on
      # docs.rs but pass CI.
      - run: cargo doc --no-deps -p thetadatadx --features "arrow polars frames config-file" --locked

  bench:
    name: Bench regression gate
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      - name: Run tracked benches (mock-backed, no live creds)
        run: |
          THETADATADX_BENCH_QUICK=1 cargo bench -p thetadatadx --features __test-helpers \
              --bench grpc_transport_comparison --locked
          cargo bench -p thetadatadx --bench streaming_channels --locked -- \
              "streaming_channels/direct_callback/100k_events" --quick
          cargo bench -p thetadatadx --bench streaming_channels --locked -- \
              "streaming_channels/disruptor_consumer_panic_isolated/100k_events" --quick # VOCAB-OK: bench function name from bench crate
          cargo bench -p thetadatadx --bench streaming_channels --locked -- \
              "streaming_channels/disruptor_cross_thread/100k_events" --quick # VOCAB-OK: bench function name from bench crate
          # Production-constructor variant: routes the pipeline through
          # `build_poller_producer` so the sequence-recording producer
          # adapter is measured. Needs `__test-helpers` for the
          # crate-internal constructor re-export; its baseline is deferred
          # (see `_deferred` in `benches/baseline/criterion.json`) until a
          # first sample lands on `main`, mirroring the bench-gate rule
          # that a value is blessed only against the hosted-runner profile.
          cargo bench -p thetadatadx --features __test-helpers --bench streaming_channels --locked -- \
              "streaming_channels/disruptor_production_ctor/100k_events" --quick # VOCAB-OK: bench function name from bench crate
          # Gate 10 (#553) expansion: FPSS event clone + match dispatch
          # benches. The bench files already exist
          # (`bench_fpss_event.rs`); this step exercises them in CI so
          # the data is generated. They will be added to
          # `benches/baseline/criterion.json` in a follow-up commit once
          # a first sample lands on `main` — the baseline JSON is
          # captured locally and we do not bless a value against the
          # GitHub-hosted runner without one observed sample.
          cargo bench -p thetadatadx --bench bench_fpss_event --locked -- --quick
      - name: Compare against checked-in baseline
        # Threshold tightened from 100% (a 2x slowdown passed) to 25%.
        # The baseline JSON is recaptured against the GH-hosted runner
        # perf profile so the comparison is apples-to-apples; a 25%
        # slowdown is the smallest regression we want to gate against.
        # The previous 100% threshold was a placeholder set when the
        # gate first landed (local vs CI runner perf delta was
        # unknown); now that the baseline is CI-equivalent, the
        # threshold can shrink to the meaningful signal range.
        run: python3 scripts/check_bench_regression.py --threshold 25

  semver:
    name: Semver check
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    # Gate 9 (issue #552): every PR against main runs cargo-semver-checks
    # so a silent breaking change to the `thetadatadx` public Rust API
    # surface fails the build. Push-to-main and tag runs still execute
    # the same check — the comparison is against the last published
    # crates.io baseline, which catches the case where a hotfix branch
    # rebases directly onto main.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      # cargo-semver-checks anchored at the last published release;
      # hard-fail on any public Rust API break the crate version does
      # not account for. Advance the baseline tag at every published
      # major bump so the patch line is guarded against accidental
      # breaks.
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        continue-on-error: false
        with:
          package: thetadatadx
          baseline-rev: v11.0.0  # VOCAB-OK: published-release tag is the semver-checks baseline anchor

  surfaces:
    name: Extended Surfaces
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: python3 scripts/check_docs_consistency.py
      - run: python3 scripts/check_version_sync.py
      # Cross-Cargo.lock dependency-version drift on security-critical
      # (rustls, tokio, h2, reqwest, hyper) and SDK-owned (thetadatadx)
      # deps. A workspace bump must land in every binding lockfile or the
      # wheel / npm package ships a stale runtime.
      - run: python3 scripts/check_lockfile_drift.py
      - run: python3 scripts/validate_agreement_test.py
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - run: cargo run -p thetadatadx --features config-file,__internal --bin generate_docs_site --locked -- --check
      - run: cargo check --manifest-path tools/mcp/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/mcp/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/mcp/Cargo.toml --locked
      - run: cargo check --manifest-path tools/server/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/server/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/server/Cargo.toml --locked
      - run: cargo check --manifest-path sdks/python/Cargo.toml --locked
      - run: cargo check --manifest-path sdks/typescript/Cargo.toml --locked
      - name: TypeScript SDK build + test
        working-directory: sdks/typescript
        run: |
          npm install
          npm run build
          npm test

  sdk-bindings:
    name: SDK Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-ffi
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ffi_artifact: ffi-linux-x86_64
          - os: macos-latest
            ffi_artifact: ffi-macos-arm64
          - os: windows-latest
            ffi_artifact: ffi-windows-msvc-x86_64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.ffi_artifact }}
          path: target/release/
      - if: runner.os == 'Windows'
        uses: actions/download-artifact@v8
        with:
          name: ffi-windows-gnu-x86_64
          path: target/x86_64-pc-windows-gnu/release/
      - run: cmake -S sdks/cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp

  cpp-tests:
    name: C++ Tests (offline)
    runs-on: ubuntu-latest
    needs: build-ffi
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ffi-linux-x86_64
          path: target/release/
      - name: Configure
        run: cmake -S sdks/cpp -B build/cpp-tests -DTHETADATADX_CPP_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build/cpp-tests --config Release --target thetadatadx_cpp_tests
      - name: Run offline subset
        run: ctest --test-dir build/cpp-tests --output-on-failure --no-tests=error

  build-ffi:
    name: Build FFI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: ffi-linux-x86_64
            artifact-path: |
              target/release/libthetadatadx_ffi.so
              target/release/libthetadatadx_ffi.a
          - os: macos-latest
            artifact-name: ffi-macos-arm64
            artifact-path: |
              target/release/libthetadatadx_ffi.dylib
              target/release/libthetadatadx_ffi.a
          - os: windows-latest
            artifact-name: ffi-windows-msvc-x86_64
            artifact-path: |
              target/release/thetadatadx_ffi.dll
              target/release/thetadatadx_ffi.dll.lib
    runs-on: ${{ matrix.os }}
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      - if: runner.os == 'Windows'
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu
      - run: cargo build --release -p thetadatadx-ffi --locked
      - if: runner.os == 'Windows'
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu -p thetadatadx-ffi --locked
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
      - if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ffi-windows-gnu-x86_64
          path: |
            target/x86_64-pc-windows-gnu/release/thetadatadx_ffi.dll
            target/x86_64-pc-windows-gnu/release/libthetadatadx_ffi*.a

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, surfaces, sdk-bindings, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      - shell: bash
        run: |
          set -euo pipefail
          publish_or_skip() {
            local package="$1"
            local manifest_path="$2"
            local version
            local existing=""

            version=$(python3 -c 'import pathlib, sys, tomllib; data = tomllib.loads(pathlib.Path(sys.argv[1]).read_text()); print(data["package"]["version"])' "$manifest_path")

            for attempt in {1..10}; do
              if cargo publish -p "$package" --locked; then
                return 0
              fi

              existing=$(python3 -c 'import json, sys, urllib.request; url = f"https://crates.io/api/v1/crates/{sys.argv[1]}"; data = json.load(urllib.request.urlopen(url, timeout=30)); print(data["crate"]["max_version"])' "$package")

              if [ "$existing" = "$version" ]; then
                echo "$package $version already exists on crates.io; skipping publish"
                return 0
              fi

              if [ "$attempt" -eq 10 ]; then
                echo "failed to publish $package $version; crates.io reports max_version=$existing" >&2
                return 1
              fi

              sleep 30
            done
          }

          publish_or_skip thetadatadx crates/thetadatadx/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-crate, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ffi-linux-x86_64
          path: artifacts/linux/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-macos-arm64
          path: artifacts/macos/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-msvc-x86_64
          path: artifacts/windows-msvc/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-gnu-x86_64
          path: artifacts/windows-gnu/
      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp artifacts/linux/libthetadatadx_ffi.so release-assets/
          cp artifacts/linux/libthetadatadx_ffi.a release-assets/
          cp artifacts/macos/libthetadatadx_ffi.dylib release-assets/
          cp artifacts/macos/libthetadatadx_ffi.a release-assets/
          cp artifacts/windows-msvc/thetadatadx_ffi.dll release-assets/thetadatadx_ffi-windows-msvc.dll
          cp artifacts/windows-msvc/thetadatadx_ffi.dll.lib release-assets/thetadatadx_ffi-windows-msvc.dll.lib
          cp artifacts/windows-gnu/thetadatadx_ffi.dll release-assets/thetadatadx_ffi-windows-gnu.dll
          find artifacts/windows-gnu -maxdepth 1 -type f -name 'libthetadatadx_ffi*.a' -exec cp {} release-assets/ \;
      - name: Resolve release notes body
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          candidate=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$candidate" ]; then
            echo "body_path=$candidate" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body_path: ${{ steps.release_notes.outputs.body_path }}
          files: |
            release-assets/*
