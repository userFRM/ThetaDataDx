name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --locked -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo test --workspace --locked

  surfaces:
    name: Extended Surfaces
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: python3 scripts/check_docs_consistency.py
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - run: cargo clippy --manifest-path tools/mcp/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/mcp/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/server/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/server/Cargo.toml --locked
      - run: cargo clippy --manifest-path tools/cli/Cargo.toml --locked -- -D warnings
      - run: cargo test --manifest-path tools/cli/Cargo.toml --locked
      - run: cargo check --manifest-path sdks/python/Cargo.toml --locked

  sdk-bindings:
    name: SDK Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: check
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go_enabled: true
          - os: macos-latest
            go_enabled: true
          - os: windows-latest
            go_enabled: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - if: matrix.go_enabled
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build --release -p thetadatadx-ffi --locked
      - run: cmake -S sdks/cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp
      - if: matrix.go_enabled
        shell: bash
        working-directory: sdks/go
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Linux" ]; then
            export LD_LIBRARY_PATH="${{ github.workspace }}/target/release"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            export DYLD_LIBRARY_PATH="${{ github.workspace }}/target/release"
          else
            export PATH="${{ github.workspace }}/target/release:$PATH"
          fi
          go test ./...

  build-ffi:
    name: Build FFI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: ffi-linux-x86_64
            artifact-path: |
              target/release/libthetadatadx_ffi.so
              target/release/libthetadatadx_ffi.a
          - os: macos-latest
            artifact-name: ffi-macos-arm64
            artifact-path: |
              target/release/libthetadatadx_ffi.dylib
              target/release/libthetadatadx_ffi.a
          - os: windows-latest
            artifact-name: ffi-windows-x86_64
            artifact-path: |
              target/release/thetadatadx_ffi.dll
              target/release/thetadatadx_ffi.dll.lib
    runs-on: ${{ matrix.os }}
    needs: check
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo build --release -p thetadatadx-ffi --locked
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, surfaces, sdk-bindings, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/install-protoc
      - run: cargo publish -p tdbe --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..10}; do
            if cargo publish -p thetadatadx --locked; then
              exit 0
            fi
            if [ "$attempt" -eq 10 ]; then
              exit 1
            fi
            sleep 30
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-crate, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: ffi-linux-x86_64
          path: artifacts/linux/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-macos-arm64
          path: artifacts/macos/
      - uses: actions/download-artifact@v8
        with:
          name: ffi-windows-x86_64
          path: artifacts/windows/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux/libthetadatadx_ffi.so
            artifacts/linux/libthetadatadx_ffi.a
            artifacts/macos/libthetadatadx_ffi.dylib
            artifacts/macos/libthetadatadx_ffi.a
            artifacts/windows/thetadatadx_ffi.dll
            artifacts/windows/thetadatadx_ffi.dll.lib
