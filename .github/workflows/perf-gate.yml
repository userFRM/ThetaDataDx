name: Perf Gate

# Per-binding performance-regression gate built on a DETERMINISTIC
# metric: allocations per decoded row. Unlike the wall-clock Criterion
# gate in `ci.yml`, this gate keys on an allocation count, which is a
# property of the code rather than of the runner. The identical fixture
# decodes with the identical number of allocations on a 2-vCPU hosted
# runner and on a developer workstation, so the gate runs on shared
# hardware without flaking. The rationale is documented in full in the
# header of `scripts/ci/check_perf_gate.py`.
#
# Kept in its own workflow file (not folded into `ci.yml`) so the gate's
# bench step and baseline evolve without colliding with other in-flight
# CI work.
#
# Heavy lane: the bench compile is slow, so this runs post-merge on main,
# on the nightly schedule, on release tags, in the merge queue, and on a
# PR only when the core or FFI sources changed or the `full-ci` label is
# set. Never on draft PRs.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  merge_group:
  schedule:
    - cron: "23 6 * * *"

permissions:
  contents: read

concurrency:
  group: perf-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Pin the directory the bench writes its metric report into, decoupled
  # from the cargo invocation's working directory (Criterion runs benches
  # with the crate root as cwd). The gate reads from the same path.
  PERF_GATE_OUT_DIR: ${{ github.workspace }}/target/perf-gate

jobs:
  changes:
    name: Detect changed paths
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/paths.yml

  decode-allocations:
    name: Decode allocations-per-row gate
    needs: changes
    # full-ci and force_full each force the heavy lane on their own: a
    # full-ci PR runs even when the diff is docs-render-only, and a rename
    # that moved real source into the doc tree runs even though the
    # rename-blind dorny `perf` flag is false. Absent both, the original
    # selective behavior holds.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.perf == 'true')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      # Same four-step Rust preamble every build job in this repo uses:
      # stable toolchain, Swatinem cache, protoc.
      - uses: ./.github/actions/setup-rust-deps
      - name: Run the decode-allocations bench (counting allocator, no live creds)
        # The counting global allocator lives only in this bench binary;
        # the shipped library allocator is unchanged. `__internal` exposes
        # the wire / decode surface the bench drives. The bench writes
        # per-row allocation figures to PERF_GATE_OUT_DIR.
        run: |
          cargo bench -p thetadatadx-rs --features __internal \
              --bench bench_decode_allocations --locked -- --noplot
      - name: Compare against the committed baseline
        # Relative threshold plus an absolute floor, mirroring
        # `check_bench_regression.py`. The metric is exact (an integer
        # count over a fixed row count, no jitter), so the threshold is
        # tight; the floor keeps the gate meaningful if a baseline ever
        # approaches zero allocations per row.
        run: python3 scripts/ci/check_perf_gate.py --threshold 10

  # ═══════════════════════════════════════════════════════════════
  # AGGREGATOR GATE. A single roll-up status summarizing every job in
  # this workflow, mirroring `ci.yml`'s `ci-gate`. It runs with
  # `if: always()`, depends on every other job, and fails unless every
  # dependency finished `success` or `skipped`. The bench job
  # legitimately skips on a path-irrelevant PR (it counts as a pass); a
  # real `failure` or `cancelled` fails the gate. This is the one
  # perf-lane check branch protection should require — requiring it
  # (instead of a per-job name) keeps a conditionally-skipped required
  # check from leaving the merge gate permanently unsatisfiable, and a
  # newly added job is covered the moment it appears in `needs` below.
  # ═══════════════════════════════════════════════════════════════
  perf-gate:
    name: Perf gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - changes
      - decode-allocations
    steps:
      - name: Fail unless every dependency succeeded or was skipped
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = sorted(
              name
              for name, data in needs.items()
              if data.get("result") not in ("success", "skipped")
          )
          for name in sorted(needs):
              print(f"{name}: {needs[name].get('result')}")
          if bad:
              joined = ", ".join(bad)
              sys.exit(f"Perf gate failed: {joined} did not succeed or skip")
          print("Perf gate passed: every dependency succeeded or was skipped")
          PY
