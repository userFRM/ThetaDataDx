name: Live Validation

on:
  workflow_dispatch:
    inputs:
      soak_duration_secs:
        description: "FPSS reconnect soak duration in seconds"
        required: false
        default: "120"

permissions:
  contents: read

concurrency:
  group: live-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Live Secrets Preflight
    runs-on: ubuntu-latest
    outputs:
      has_live_secrets: ${{ steps.check.outputs.has_live_secrets }}
    steps:
      - id: check
        shell: bash
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${THETADATA_EMAIL}" ] && [ -n "${THETADATA_PASSWORD}" ]; then
            echo "has_live_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_live_secrets=false" >> "$GITHUB_OUTPUT"
            echo "ThetaData live secrets are not configured; live jobs will be skipped."
          fi

  smoke:
    name: Live Smoke (${{ matrix.os }})
    needs: preflight
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - run: cargo build --release -p thetadatadx-ffi --locked
      - run: cargo build --release --manifest-path tools/server/Cargo.toml --locked
      - run: cargo build --release --manifest-path tools/mcp/Cargo.toml --locked
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin build --release -m thetadatadx-py/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - run: python scripts/dev/live_smoke.py creds.txt
      - run: python scripts/dev/streaming_smoke.py creds.txt
      - run: cmake -S thetadatadx-cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp thetadatadx_example thetadatadx_streaming_smoke
      - shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_example
      - shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_streaming_smoke creds.txt
      - name: FLATFILES synthetic golden (decoder)
        # Runs against a hand-built blob in the repo; no live wire. This
        # is the always-on regression gate for the FIT decoder + CSV
        # writer. Fast and deterministic.
        run: cargo test --test flatfiles_synthetic_golden -- --nocapture
      - name: FLATFILES byte-match (vendor reference)
        run: |
          # Single env var gates the whole byte-match contract:
          # THETADATADX_FLATFILE_FIXTURES_PATH points at a directory
          # containing OPTION-OPEN_INTEREST-20260428.csv and
          # OPTION-EOD-20260428.csv. When unset (or pointing at a
          # missing directory / missing fixture), the test prints a
          # one-line skip diagnostic and passes — matching the CI
          # steady state where the gigabyte-scale vendor reference
          # fixtures are not checked into the repo (tracked under
          # #453). Once a fixture lands in the runner image (or is
          # restored from cache / artefact), set the env var below to
          # enable byte-match validation:
          #
          # env:
          #   THETADATADX_FLATFILE_FIXTURES_PATH: ${{ runner.temp }}/thetadatadx-fixtures
          cargo test --features live-tests --test flatfiles_byte_match -- --nocapture
  endpoint-validation:
    name: Full Endpoint Validation (${{ matrix.os }})
    needs: [preflight, smoke]
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - run: cargo build --release -p thetadatadx-ffi --locked
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin build --release -m thetadatadx-py/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - run: python scripts/ci/check_python.py creds.txt
      - run: cmake -S thetadatadx-cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp thetadatadx_validate
      - shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_validate creds.txt
  release-validation:
    name: Full Release Validation
    needs: [preflight, endpoint-validation]
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust-deps
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - run: bash scripts/release/validate_release.sh creds.txt

  fpss-soak:
    name: FPSS Reconnect Soak
    needs: [preflight, release-validation]
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin build --release -m thetadatadx-py/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - shell: bash
        env:
          WORKFLOW_INPUT_SOAK_DURATION_SECS: ${{ github.event.inputs.soak_duration_secs }}
        run: |
          set -euo pipefail
          duration="${WORKFLOW_INPUT_SOAK_DURATION_SECS:-120}"
          python scripts/dev/streaming_soak.py creds.txt --duration-secs "$duration"
