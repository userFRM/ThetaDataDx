name: Live Validation

on:
  workflow_dispatch:
    inputs:
      soak_duration_secs:
        description: "FPSS reconnect soak duration in seconds"
        required: false
        default: "120"

permissions:
  contents: read

concurrency:
  group: live-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Live Secrets Preflight
    runs-on: ubuntu-latest
    outputs:
      has_live_secrets: ${{ steps.check.outputs.has_live_secrets }}
    steps:
      - id: check
        shell: bash
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${THETADATA_EMAIL}" ] && [ -n "${THETADATA_PASSWORD}" ]; then
            echo "has_live_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_live_secrets=false" >> "$GITHUB_OUTPUT"
            echo "ThetaData live secrets are not configured; live jobs will be skipped."
          fi

  smoke:
    name: Live Smoke (${{ matrix.os }})
    needs: preflight
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-latest
            go_enabled: true
          - os: macos-latest
            go_enabled: true
          - os: windows-latest
            go_enabled: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - if: matrix.go_enabled
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - if: runner.os == 'Windows' && matrix.go_enabled
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - run: cargo build --release -p thetadatadx-cli -p thetadatadx-ffi --locked
      - if: runner.os == 'Windows' && matrix.go_enabled
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu -p thetadatadx-ffi --locked
      - run: cargo build --release --manifest-path tools/server/Cargo.toml --locked
      - run: cargo build --release --manifest-path tools/mcp/Cargo.toml --locked
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin build --release -m sdks/python/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - run: python scripts/live_smoke.py creds.txt
      - run: python scripts/fpss_smoke.py creds.txt
      - run: cmake -S sdks/cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp thetadatadx_example thetadatadx_fpss_smoke
      - if: runner.os == 'Linux'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_example
      - if: runner.os == 'macOS'
        shell: bash
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_example
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\target\release;$env:PATH"
          .\build\cpp\Release\thetadatadx_example.exe
      - if: runner.os == 'Linux'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_fpss_smoke creds.txt
      - if: runner.os == 'macOS'
        shell: bash
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_fpss_smoke creds.txt
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\target\release;$env:PATH"
          .\build\cpp\Release\thetadatadx_fpss_smoke.exe creds.txt
      - if: matrix.go_enabled && runner.os == 'Linux'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: cd sdks/go && go run ./cmd/live_smoke ../../creds.txt
      - if: matrix.go_enabled && runner.os == 'Linux'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: cd sdks/go && go run ./cmd/fpss_smoke ../../creds.txt
      - if: matrix.go_enabled && runner.os == 'macOS'
        shell: bash
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: cd sdks/go && go run ./cmd/live_smoke ../../creds.txt
      - if: matrix.go_enabled && runner.os == 'macOS'
        shell: bash
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: cd sdks/go && go run ./cmd/fpss_smoke ../../creds.txt
      - if: matrix.go_enabled && runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_LDFLAGS: -L${{ github.workspace }}\target\x86_64-pc-windows-gnu\release
        run: |
          $env:PATH = "${{ github.workspace }}\target\x86_64-pc-windows-gnu\release;$env:PATH"
          cd sdks/go
          go run ./cmd/live_smoke ${{ github.workspace }}\creds.txt
      - if: matrix.go_enabled && runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_LDFLAGS: -L${{ github.workspace }}\target\x86_64-pc-windows-gnu\release
        run: |
          $env:PATH = "${{ github.workspace }}\target\x86_64-pc-windows-gnu\release;$env:PATH"
          cd sdks/go
          go run ./cmd/fpss_smoke ${{ github.workspace }}\creds.txt

  endpoint-validation:
    name: Full Endpoint Validation (${{ matrix.os }})
    needs: smoke
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-latest
            go_enabled: true
          - os: macos-latest
            go_enabled: true
          - os: windows-latest
            go_enabled: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - if: matrix.go_enabled
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - if: runner.os == 'Windows' && matrix.go_enabled
        shell: bash
        run: rustup target add x86_64-pc-windows-gnu
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - run: cargo build --release -p thetadatadx-cli -p thetadatadx-ffi --locked
      - if: runner.os == 'Windows' && matrix.go_enabled
        shell: bash
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
        run: cargo build --release --target x86_64-pc-windows-gnu -p thetadatadx-ffi --locked
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin build --release -m sdks/python/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - run: python scripts/validate_cli.py creds.txt
      - run: python scripts/validate_python.py creds.txt
      - run: cmake -S sdks/cpp -B build/cpp
      - run: cmake --build build/cpp --config Release --target thetadatadx_cpp thetadatadx_validate
      - if: runner.os == 'Linux'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_validate creds.txt
      - if: runner.os == 'macOS'
        shell: bash
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
        run: ./build/cpp/thetadatadx_validate creds.txt
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "${{ github.workspace }}\target\release;$env:PATH"
          .\build\cpp\Release\thetadatadx_validate.exe creds.txt
      - if: matrix.go_enabled && runner.os == 'Linux'
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: cd sdks/go && go run ./cmd/validate ../../creds.txt
      - if: matrix.go_enabled && runner.os == 'macOS'
        shell: bash
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: cd sdks/go && go run ./cmd/validate ../../creds.txt
      - if: matrix.go_enabled && runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_LDFLAGS: -L${{ github.workspace }}\target\x86_64-pc-windows-gnu\release
        run: |
          $env:PATH = "${{ github.workspace }}\target\x86_64-pc-windows-gnu\release;$env:PATH"
          cd sdks/go
          go run ./cmd/validate ${{ github.workspace }}\creds.txt

  release-validation:
    name: Full Release Validation
    needs: endpoint-validation
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - run: bash scripts/validate_release.sh creds.txt

  fpss-soak:
    name: FPSS Reconnect Soak
    needs: release-validation
    if: ${{ needs.preflight.outputs.has_live_secrets == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - name: Materialize creds.txt
        shell: python
        env:
          THETADATA_EMAIL: ${{ secrets.THETADATA_EMAIL }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
        run: |
          from pathlib import Path
          import os
          Path("creds.txt").write_text(
              os.environ["THETADATA_EMAIL"] + "\n" + os.environ["THETADATA_PASSWORD"] + "\n",
              encoding="utf-8",
          )
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin build --release -m sdks/python/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - shell: bash
        env:
          WORKFLOW_INPUT_SOAK_DURATION_SECS: ${{ github.event.inputs.soak_duration_secs }}
        run: |
          set -euo pipefail
          duration="${WORKFLOW_INPUT_SOAK_DURATION_SECS:-120}"
          python scripts/fpss_soak.py creds.txt --duration-secs "$duration"
