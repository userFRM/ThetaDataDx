name: Python SDK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build wheel (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
            label: ubuntu py3.12
          - os: macos-latest
            python: "3.12"
            label: macos py3.12
          - os: windows-latest
            python: "3.12"
            label: windows py3.12
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - name: Build wheel
        shell: bash
        run: python -m maturin build --release -m sdks/python/Cargo.toml -o dist/ --interpreter python
      - name: Install wheel
        shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Import smoke
        shell: bash
        run: |
          python - <<'PY'
          import thetadatadx
          from thetadatadx import implied_volatility

          iv, err = implied_volatility(450.0, 455.0, 0.05, 0.015, 30.0 / 365.0, 8.50, "C")
          print(thetadatadx.__file__)
          print(round(iv, 6), round(err, 6))
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ runner.os }}
          path: dist/*.whl

  compatibility:
    name: ABI3 smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.14"]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          name: wheel-${{ runner.os }}
          path: dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - shell: bash
        run: python -c "import thetadatadx; print(thetadatadx.__file__)"

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/install-protoc
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin sdist -m sdks/python/Cargo.toml -o dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.tar.gz
      - shell: bash
        run: python -c "import thetadatadx"
      - if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
