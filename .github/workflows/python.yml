name: Python SDK

# Heavy lane. The wheel matrix and its smoke / stub / nogil gates build
# across every supported OS and Python, so they run post-merge on main,
# on the nightly schedule, on release tags, in the merge queue, and on a
# PR only when the Python SDK, FFI, or core sources changed or the
# `full-ci` label is set. Never on draft PRs. The fast PR merge gate
# lives in ci.yml.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  merge_group:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'sdks/python/**'
              - 'ffi/**'
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/python.yml'
              - '.github/actions/**'

  # Single guard reused by every heavy job below. On any non-PR event
  # (push to main, schedule, tag, merge_group) the matrix runs in full.
  # On a PR it runs only for a non-draft whose changes touched the
  # Python SDK / FFI / core, or that carries the `full-ci` label.
  build:
    name: Build wheel (${{ matrix.label }})
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (needs.changes.outputs.python == 'true' ||
        contains(github.event.pull_request.labels.*.name, 'full-ci')))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.12"
            label: ubuntu py3.12
          - os: macos-latest
            python: "3.12"
            label: macos py3.12
          - os: windows-latest
            python: "3.12"
            label: windows py3.12
          # PEP 703 free-threaded build. PyO3 emits a per-version wheel
          # (`cp314-cp314t-*`) rather than an `abi3` wheel because the
          # free-threaded ABI is not compatible with the stable ABI
          # surface — the wheel tag is intentionally narrower than the
          # baseline matrix. The `gil_used = false` attribute on the
          # `#[pymodule]` keeps the GIL disabled after import; without
          # it the free-threaded interpreter auto-re-enables the GIL
          # on first import of an extension module and defeats the
          # entire purpose of shipping nogil wheels. The free-threaded
          # floor is CPython 3.14: PyO3 does not support the
          # free-threaded build of CPython below 3.14, so 3.13t carries
          # no nogil wheel.
          - os: ubuntu-latest
            python: "3.14t"
            label: ubuntu py3.14t (nogil)
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
        with:
          components: clippy
      - uses: actions/setup-python@v6
        with:
          # The free-threaded interpreter (`3.14t`) is a PEP 703 build.
          # `actions/setup-python@v6` honours the `t` suffix and
          # provisions the `python3.14t` binary the matching wheel needs.
          python-version: ${{ matrix.python }}
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      # `too_many_arguments` is allow-listed because every offender is a
      # generated pyo3 endpoint method whose signature mirrors the
      # underlying REST surface — not a real code smell. Every other
      # warning (including new ones) stays fatal.
      - name: Clippy (Python SDK)
        shell: bash
        working-directory: sdks/python
        run: cargo clippy --all-targets -- -D warnings -A clippy::too_many_arguments
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      # Linux wheel uses the manylinux2014 (glibc 2.17) Docker toolchain so
      # the published wheel is installable on every supported platform —
      # Ubuntu 22.04 / RHEL 8 / Google Colab / Databricks / CentOS 7 all
      # pin glibc at or below 2.34. Building on `ubuntu-latest` directly
      # tags the wheel with the host glibc floor (currently 2.38), which
      # silently breaks every older runtime.
      - name: Build wheel (Linux abi3, manylinux2014)
        if: matrix.os == 'ubuntu-latest' && !endsWith(matrix.python, 't')
        uses: PyO3/maturin-action@v1
        with:
          # `--interpreter python3.12` targets the abi3 floor declared in
          # `sdks/python/Cargo.toml` (pyo3/abi3-py312). The default
          # `python` binary inside the manylinux2014 Docker image is
          # Python 2.7, which lacks `sys.implementation` and breaks
          # maturin's interpreter probe; `python3.12` resolves cleanly
          # inside the image.
          command: build
          args: --release -m sdks/python/Cargo.toml -o dist/ --interpreter python3.12
          manylinux: '2014'
          target: x86_64
          # The manylinux2014 CentOS 7 image ships no `protoc`, which
          # `prost-build` needs to compile `proto/mdds.proto`.
          # Install a pinned prebuilt binary before maturin starts.
          before-script-linux: |
            set -euo pipefail
            PROTOC_VERSION=29.3
            curl -fsSL -o /tmp/protoc.zip \
              "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
            unzip -q /tmp/protoc.zip -d /usr/local
            chmod 0755 /usr/local/bin/protoc
            protoc --version
      # PEP 703 free-threaded wheel — `--interpreter ${{ matrix.python }}`
      # (e.g. `python3.14t`) tells maturin to emit a `cp314-cp314t-*`
      # tagged wheel rather than the `abi3` one. The `gil_used = false`
      # attribute on `#[pymodule]` keeps the GIL disabled after import
      # on the matching interpreter. Built on `ubuntu-latest` host (not
      # the manylinux2014 image) because the freethreaded interpreter
      # ships in CPython 3.14+, which post-dates the CentOS 7 glibc
      # floor — the manylinux floor for nogil wheels lifts to 2.28
      # (manylinux_2_28) automatically.
      - name: Build wheel (Linux freethreaded)
        if: matrix.os == 'ubuntu-latest' && endsWith(matrix.python, 't')
        shell: bash
        run: |
          python -m maturin build \
            --release \
            -m sdks/python/Cargo.toml \
            -o dist/ \
            --interpreter "python${{ matrix.python }}"
      - name: Build wheel (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        run: python -m maturin build --release -m sdks/python/Cargo.toml -o dist/ --interpreter python
      - name: Install wheel
        shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Import smoke
        shell: bash
        run: |
          python - <<'PY'
          import thetadatadx
          from thetadatadx import implied_volatility

          iv, err = implied_volatility(450.0, 455.0, 0.05, 0.015, 30.0 / 365.0, 8.50, "C")
          print(thetadatadx.__file__)
          print(round(iv, 6), round(err, 6))
          PY
      # Run the Python pytest suite against the freshly-installed wheel. The
      # `THETADATADX_TEST_CREDS`-gated tests skip cleanly without secrets so this
      # step exercises the install path AND the public-API surface contracts
      # that don't need a live FPSS handshake. Kept as a separate step from
      # the import smoke above so a pytest regression points at the suite,
      # not at the smoke output.
      - name: Pytest suite (skipped tests stay skipped)
        shell: bash
        run: |
          python -m pip install pytest
          python -m pytest sdks/python/tests/ -v
      - name: Inspect wheel contents (Gate 12 / #555)
        shell: bash
        run: python3 scripts/dev/inspect_artifacts.py dist/*.whl
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ runner.os }}-${{ matrix.python }}
          path: dist/*.whl

  # ───────────────────────────────────────────────────────────────
  # The stubtest, doctest, and nogil throughput gates are lifted to
  # standalone jobs with their own `runs-on` so a matrix label rename
  # (`ubuntu-latest` → anything else) does NOT silently skip them.
  # A prior in-matrix `if: matrix.os == 'ubuntu-latest'` form depended
  # on the literal matrix value; lifting them out decouples the gate
  # execution from the build-matrix label shape. Each depends on the
  # `build` job, so when `build` is skipped on a path-irrelevant PR
  # these skip with it; on main / schedule / tag they always run.
  # ───────────────────────────────────────────────────────────────

  stubtest:
    # Gate 6 (#549): mypy stubtest — verifies `__init__.pyi` matches
    # the runtime byte-for-byte. The allowlist documents the small
    # set of structural pyo3 false positives (`__init__` vs `__new__`
    # for pyclass constructors, etc.) plus the explicit "deliberately
    # unstubbed" generator-emitted surface.
    name: Stubtest (.pyi vs runtime)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: wheel-Linux-3.12
          path: dist/
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install mypy
          python -m pip install --force-reinstall dist/*.whl
      - name: Stubtest (.pyi vs runtime)
        shell: bash
        run: |
          python -m mypy.stubtest thetadatadx \
            --allowlist sdks/python/stubtest_allowlist.txt \
            --ignore-missing-stub \
            --ignore-disjoint-bases \
            --ignore-positional-only

  fresh-install-smoke:
    # Gate 8 (#551): fresh-venv smoke test. Simulates a first-time
    # user typing `pip install thetadatadx` then importing every
    # documented top-level export. Runs in a brand-new venv so a
    # pollution-by-development-deps regression cannot mask a real
    # missing export.
    name: Fresh-install smoke
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: wheel-Linux-3.12
          path: dist/
      - shell: bash
        run: |
          python -m venv /tmp/thetadatadx-smoke
          /tmp/thetadatadx-smoke/bin/pip install --upgrade pip
          /tmp/thetadatadx-smoke/bin/pip install pytest
          /tmp/thetadatadx-smoke/bin/pip install dist/*.whl
          /tmp/thetadatadx-smoke/bin/python -m pytest sdks/python/tests/test_fresh_install_smoke.py -v
          /tmp/thetadatadx-smoke/bin/python -m pytest sdks/python/tests/test_module_exports.py -v

  nogil-throughput:
    # Parallel-throughput gate — only meaningful on the free-threaded
    # interpreter, where the contended/baseline ratio reveals whether
    # the GIL is truly released on the dispatcher hot path. The gate
    # asserts the nogil interpreter sees < 1.8x overhead under CPU
    # contention; a regression that re-acquires the GIL surfaces
    # here as a ratio approaching the GIL-build value (~2x).
    #
    # Threshold raised from 1.5x to 1.8x. The 1.5x bound was too
    # tight for GH shared-runner perf jitter — false positives at
    # ~1.55x masked the gate's signal value. The 1.8x bound is below
    # the held-GIL band (~2.0x observed on the stock 3.13 build) so
    # a real GIL regression still trips it, while transient runner
    # contention no longer fails the gate. The matching pytest
    # assertion lives in
    # `sdks/python/tests/test_no_gil.py::test_parallel_throughput_bench_runs`
    # and is kept in lockstep at 1.8x.
    name: Parallel throughput (nogil gate, py${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          name: wheel-Linux-${{ matrix.python }}
          path: dist/
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
      - name: Parallel throughput (nogil gate)
        shell: bash
        run: |
          python sdks/python/benches/bench_parallel_throughput.py | tee bench.json
          python - <<'PY'
          import json, pathlib, sys
          payload = json.loads(pathlib.Path("bench.json").read_text().strip().splitlines()[-1])
          ratio = payload["overhead_ratio"]
          gil = payload["gil_enabled"]
          print(f"interpreter={payload['python']} gil={gil} overhead={ratio:.3f}x")
          # Free-threaded build must keep overhead under 1.8x. A held
          # GIL pushes the ratio to ~2x (observed on stock 3.13: 2.06x).
          if gil:
              sys.exit("nogil gate triggered on a GIL-enabled interpreter")
          if ratio >= 1.8:
              sys.exit(f"nogil overhead ratio {ratio:.3f}x ≥ 1.8x — GIL may be held on hot path")
          PY

  compatibility:
    name: ABI3 smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.14"]
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          # The abi3 wheel is the one tagged with the host Python the
          # build job ran on (`3.12`). The freethreaded wheel carries
          # its own matrix entry (`3.14t`) and is not part of the abi3
          # compatibility surface.
          name: wheel-${{ runner.os }}-3.12
          path: dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - shell: bash
        run: python -c "import thetadatadx; print(thetadatadx.__file__)"

  # Standalone smoke job for the PEP 703 free-threaded wheels. Confirms
  # the matching nogil wheel installs on its target interpreter AND that
  # importing the module does NOT auto-re-enable the GIL (a missing
  # `gil_used = false` on the `#[pymodule]` would flip the GIL back on
  # at import time — this job catches that regression).
  freethreaded:
    name: Free-threaded smoke (py${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          name: wheel-Linux-${{ matrix.python }}
          path: dist/
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.whl
      - name: GIL stays disabled after import
        shell: bash
        run: |
          python - <<'PY'
          import sys
          assert not sys._is_gil_enabled(), "interpreter started with GIL enabled — unexpected for a freethreaded build"
          import thetadatadx
          assert not sys._is_gil_enabled(), (
              "importing thetadatadx re-enabled the GIL — the #[pymodule] "
              "attribute `gil_used = false` is missing or the wheel was "
              "built without it"
          )
          print(f"thetadatadx imported on {sys.version.split()[0]}, GIL stayed disabled")
          PY
      - name: Pytest suite on freethreaded
        shell: bash
        run: |
          python -m pip install pytest
          python -m pytest sdks/python/tests/ -v

  sdist:
    name: Build source distribution
    needs: changes
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (needs.changes.outputs.python == 'true' ||
        contains(github.event.pull_request.labels.*.name, 'full-ci')))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-deps
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces --locked -- --check
      - shell: bash
        run: python -m pip install --upgrade pip "maturin>=1.9.4,<2.0"
      - shell: bash
        run: python -m maturin sdist -m sdks/python/Cargo.toml -o dist/
      - name: Inspect sdist contents (Gate 12 / #555)
        shell: bash
        run: python3 scripts/dev/inspect_artifacts.py dist/*.tar.gz
      - shell: bash
        run: python -m pip install --force-reinstall dist/*.tar.gz
      - shell: bash
        run: python -c "import thetadatadx"
      - if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
