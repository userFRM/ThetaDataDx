name: Deploy Docs
on:
  push:
    branches: [main]
    # Only deploy when docs actually change. The generated docs are committed
    # to `docs-site/` (enforced by the docs-consistency drift gate), so a docs
    # change always shows here — a code-only merge no longer redeploys Pages,
    # which is what piled deployments onto the shared `pages` concurrency group.
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/paths.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/paths.yml"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: python3 scripts/ci/check_docs_consistency.py
      - run: cd docs-site && npm ci
      - run: cd docs-site && npx vitepress build docs
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name != 'pull_request'
        with:
          path: docs-site/docs/.vitepress/dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
