name: TypeScript SDK

# Heavy lane. The native-addon build matrix spans Linux, macOS, and
# Windows, so it runs post-merge on main, on the nightly schedule, on
# release tags, in the merge queue, and on a PR only when the TypeScript
# SDK, FFI, or core sources changed or the `full-ci` label is set. Never
# on draft PRs. The fast PR merge gate lives in ci.yml.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  merge_group:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changed paths
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/paths.yml

  # Matrix planner. On a PR the native-addon build is the linux-gnu
  # target only; the macOS/Windows addons are proven post-merge on main,
  # on the nightly schedule, on tags, and in the merge queue. The
  # gate/manifest/test steps already gate on the ubuntu leg, so a PR
  # still runs them.
  setup:
    name: Plan matrix
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_matrix: ${{ steps.plan.outputs.build_matrix }}
    steps:
      - name: Choose matrix breadth
        id: plan
        shell: bash
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          linux='{"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}'
          if [ "${IS_PR}" = "true" ]; then
            build="[${linux}]"
          else
            macos='{"os":"macos-latest","target":"aarch64-apple-darwin"}'
            windows='{"os":"windows-latest","target":"x86_64-pc-windows-msvc"}'
            build="[${linux},${macos},${windows}]"
          fi
          echo "build_matrix={\"include\":${build}}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: [changes, setup]
    # full-ci and force_full each force the heavy lane on their own: a
    # full-ci PR runs even when the diff is docs-render-only, and a rename
    # that moved real source into the doc tree runs even though the
    # rename-blind dorny `typescript` flag is false. Absent both, the
    # original selective behavior holds.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
       (contains(github.event.pull_request.labels.*.name, 'full-ci') ||
        needs.changes.outputs.force_full == 'true' ||
        (needs.changes.outputs.docs_render_only != 'true' &&
         needs.changes.outputs.typescript == 'true')))
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.build_matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: ./.github/actions/install-protoc
      - working-directory: thetadatadx-ts
        run: npm install
      # `too_many_arguments` is allow-listed because every offender is a
      # generated napi endpoint method whose signature mirrors the
      # underlying REST surface — not a real code smell. Every other
      # warning (including new ones) stays fatal.
      - name: Clippy (TypeScript SDK)
        working-directory: thetadatadx-ts
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings -A clippy::too_many_arguments
      - name: Build native addon
        working-directory: thetadatadx-ts
        # Mirror the local `npm run build` two-step: napi-rs emits
        # `index.d.ts`, then `scripts/postbuild_alias_contract.mjs`
        # appends the U7 `export const Contract: typeof ContractRef;`
        # alias the documented public surface depends on. Running
        # `napi build` alone would diverge from `package.json` and
        # fail Gate 7 below on every CI run.
        run: |
          npx napi build --platform --release --target ${{ matrix.target }} --strip
          node scripts/postbuild_alias_contract.mjs
      # Gate 7 (#550): the committed `index.d.ts` must equal what
      # `npm run build` just produced (napi-rs emission + the U7
      # postbuild alias). Any drift means a contributor forgot to
      # commit a regenerated stub after a binding change, so the
      # published types lie about the runtime.
      - name: Verify index.d.ts is in sync with native build
        if: matrix.os == 'ubuntu-latest'
        working-directory: thetadatadx-ts
        run: |
          if ! git diff --exit-code -- index.d.ts; then
            echo "::error::thetadatadx-ts/index.d.ts is out of sync with the napi build. Run \`npm run build\` locally and commit the regenerated file." >&2
            exit 1
          fi
      # H9: run `npm test` on every advertised platform (Linux,
      # macOS, Windows) rather than gating to Linux only. CI parity
      # with the Python and Rust matrices: every platform we ship a
      # prebuilt addon for has its tests run on that platform.
      - name: Test
        working-directory: thetadatadx-ts
        run: npm test
      # Gate 3 (#546) - TypeScript side: extract tsdoc `@example` /
      # fenced-code blocks from `index.d.ts` and run each one with
      # `tsx`. Today `index.d.ts` carries no `@example` blocks (the
      # napi-rs emitter doesn't pass them from the Rust source);
      # the gate is wired so future TS doc examples are exercised
      # automatically once the napi-rs emitter starts forwarding them.
      #
      # The cross-language Gate 3 scope is now scoped narrowly to:
      #   - Rust:     `cargo test --doc --workspace` (active, runs)
      #   - Python:   stubtest (active — verifies stub <-> runtime)
      #   - TS:       `tsx`-based extractor below (wired, no examples
      #               present yet; passes through with a clean exit)
      #   - C++:      NOT wired. Documented as a follow-up item; the
      #               C++ surface examples live in the README rather
      #               than as runnable Catch2 doctest blocks. Adding
      #               a doctest extractor for C++ requires a Catch2
      #               build-flag toggle in CMakeLists.txt and is
      #               deferred until C++ examples start carrying
      #               machine-checkable fences.
      - name: Doc-example harness
        if: matrix.os == 'ubuntu-latest'
        working-directory: thetadatadx-ts
        run: node scripts/run_doc_examples.mjs
      # H9: emit the public-surface shape manifest so the
      # cross-language agreement validator (`scripts/ci/check_agreement.py`)
      # can compare TypeScript field sets against the Python / CLI /
      # C++ runtime artifacts. Manifest is platform-independent —
      # only run on Linux to avoid duplicate uploads.
      - name: Emit TypeScript shape manifest
        if: matrix.os == 'ubuntu-latest'
        run: node thetadatadx-ts/scripts/emit_validator_manifest.mjs
      # The agreement validator's self-test runs in the fast-lane `agreement`
      # job on every PR; no need to re-run it inside the TypeScript build.
      - name: Upload TypeScript shape manifest
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: validator-typescript
          path: artifacts/validator_typescript.json
          if-no-files-found: error
      - name: Pack + inspect npm tarball (Gate 12 / #555)
        if: matrix.os == 'ubuntu-latest'
        working-directory: thetadatadx-ts
        run: |
          npm pack --json | tee ../npm-pack.json
          tar tzf thetadatadx-*.tgz | head -50
          python3 ../scripts/dev/inspect_artifacts.py thetadatadx-*.tgz
      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: thetadatadx-ts/thetadatadx-ts.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Preflight - tag matches package version
        working-directory: thetadatadx-ts
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          for dir in npm/*/; do
            [ -f "${dir}package.json" ] || continue
            v=$(node -p "require('./${dir}package.json').version")
            if [ "$v" != "$version" ]; then
              echo "::error::package version mismatch: ${dir}package.json is ${v}, root package is ${version}"
              exit 1
            fi
          done
          node <<'JS'
          const pkg = require('./package.json');
          const version = pkg.version;
          for (const [name, depVersion] of Object.entries(pkg.optionalDependencies ?? {})) {
            if (depVersion !== version) {
              console.error(`::error::optional dependency ${name} is ${depVersion}, root package is ${version}`);
              process.exit(1);
            }
          }
          JS
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match TypeScript package version ${version} (expected v${version})"
            exit 1
          fi
      - working-directory: thetadatadx-ts
        run: npm install
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: thetadatadx-ts/artifacts
      - name: Move binaries into platform packages
        working-directory: thetadatadx-ts
        run: npx napi artifacts --output-dir artifacts
      - name: List platform packages
        working-directory: thetadatadx-ts
        run: ls -lR npm/
      - name: Publish platform packages
        working-directory: thetadatadx-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            if ls "$dir"/*.node 1>/dev/null 2>&1; then
              pkg_name=$(node -p "require('./${dir}package.json').name")
              pkg_version=$(node -p "require('./${dir}package.json').version")
              if npm view "${pkg_name}@${pkg_version}" version 2>/dev/null; then
                echo "⏭ ${pkg_name}@${pkg_version} already published"
              else
                dist_tag=latest
                case "$pkg_version" in *-*) dist_tag=next;; esac
                npm publish "$dir" --access public --tag "$dist_tag"
              fi
            fi
          done
      - name: Publish root package
        working-directory: thetadatadx-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if npm view "thetadatadx-ts@${pkg_version}" version 2>/dev/null; then
            echo "⏭ thetadatadx-ts@${pkg_version} already published"
          else
            dist_tag=latest
            case "$pkg_version" in *-*) dist_tag=next;; esac
            npm publish --provenance --access public --tag "$dist_tag"
          fi

  # ═══════════════════════════════════════════════════════════════
  # AGGREGATOR GATE. A single roll-up status summarizing every job in
  # this workflow, mirroring `ci.yml`'s `ci-gate`. It runs with
  # `if: always()`, depends on every other job, and fails unless every
  # dependency finished `success` or `skipped`. A heavy job that
  # legitimately skips on a path-irrelevant PR counts as a pass; a real
  # `failure` or `cancelled` fails the gate. This is the one
  # TypeScript-lane check branch protection should require — requiring it
  # (instead of a hand-kept list of per-job names) keeps a
  # conditionally-skipped required check from leaving the merge gate
  # permanently unsatisfiable, and a newly added job is covered the
  # moment it appears in `needs` below.
  # ═══════════════════════════════════════════════════════════════
  typescript-gate:
    name: TypeScript gate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - changes
      - setup
      - build
      - publish
    steps:
      - name: Fail unless every dependency succeeded or was skipped
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = sorted(
              name
              for name, data in needs.items()
              if data.get("result") not in ("success", "skipped")
          )
          for name in sorted(needs):
              print(f"{name}: {needs[name].get('result')}")
          if bad:
              joined = ", ".join(bad)
              sys.exit(f"TypeScript gate failed: {joined} did not succeed or skip")
          print("TypeScript gate passed: every dependency succeeded or was skipped")
          PY
