name: TypeScript SDK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: ./.github/actions/install-protoc
      - working-directory: sdks/typescript
        run: npm install
      # `too_many_arguments` is allow-listed because every offender is a
      # generated napi endpoint method whose signature mirrors the
      # underlying REST surface — not a real code smell. Every other
      # warning (including new ones) stays fatal.
      - name: Clippy (TypeScript SDK)
        working-directory: sdks/typescript
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings -A clippy::too_many_arguments
      - name: Build native addon
        working-directory: sdks/typescript
        # Mirror the local `npm run build` two-step: napi-rs emits
        # `index.d.ts`, then `scripts/postbuild_alias_contract.mjs`
        # appends the U7 `export const Contract: typeof ContractRef;`
        # alias the documented public surface depends on. Running
        # `napi build` alone would diverge from `package.json` and
        # fail Gate 7 below on every CI run.
        run: |
          npx napi build --platform --release --target ${{ matrix.target }} --strip
          node scripts/postbuild_alias_contract.mjs
      # Gate 7 (#550): the committed `index.d.ts` must equal what
      # `npm run build` just produced (napi-rs emission + the U7
      # postbuild alias). Any drift means a contributor forgot to
      # commit a regenerated stub after a binding change, so the
      # published types lie about the runtime.
      - name: Verify index.d.ts is in sync with native build
        if: matrix.os == 'ubuntu-latest'
        working-directory: sdks/typescript
        run: |
          if ! git diff --exit-code -- index.d.ts; then
            echo "::error::sdks/typescript/index.d.ts is out of sync with the napi build. Run \`npm run build\` locally and commit the regenerated file." >&2
            exit 1
          fi
      # H9: run `npm test` on every advertised platform (Linux,
      # macOS, Windows) rather than gating to Linux only. CI parity
      # with the Python and Rust matrices: every platform we ship a
      # prebuilt addon for has its tests run on that platform.
      - name: Test
        working-directory: sdks/typescript
        run: npm test
      # Gate 3 (#546) - TypeScript side: extract tsdoc `@example` /
      # fenced-code blocks from `index.d.ts` and run each one with
      # `tsx`. Today `index.d.ts` carries no `@example` blocks (the
      # napi-rs emitter doesn't pass them from the Rust source);
      # the gate is wired so future TS doc examples are exercised
      # automatically once the napi-rs emitter starts forwarding them.
      #
      # C3 closure: the cross-language Gate 3 scope is now scoped
      # narrowly to:
      #   - Rust:     `cargo test --doc --workspace` (active, runs)
      #   - Python:   stubtest (active — verifies stub <-> runtime)
      #   - TS:       `tsx`-based extractor below (wired, no examples
      #               present yet; passes through with a clean exit)
      #   - C++:      NOT wired. Documented as a follow-up item; the
      #               C++ surface examples live in the README rather
      #               than as runnable Catch2 doctest blocks. Adding
      #               a doctest extractor for C++ requires a Catch2
      #               build-flag toggle in CMakeLists.txt and is
      #               deferred until C++ examples start carrying
      #               machine-checkable fences.
      - name: Doc-example harness
        if: matrix.os == 'ubuntu-latest'
        working-directory: sdks/typescript
        run: node scripts/run_doc_examples.mjs
      # H9: emit the public-surface shape manifest so the
      # cross-language agreement validator (`scripts/validate_agreement.py`)
      # can compare TypeScript field sets against the Python / CLI /
      # C++ runtime artifacts. Manifest is platform-independent —
      # only run on Linux to avoid duplicate uploads.
      - name: Emit TypeScript shape manifest
        if: matrix.os == 'ubuntu-latest'
        run: node sdks/typescript/scripts/emit_validator_manifest.mjs
      - name: Validator self-test (Python diff engine)
        if: matrix.os == 'ubuntu-latest'
        run: python3 scripts/validate_agreement_test.py
      - name: Upload TypeScript shape manifest
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: validator-typescript
          path: artifacts/validator_typescript.json
          if-no-files-found: error
      - name: Pack + inspect npm tarball (Gate 12 / #555)
        if: matrix.os == 'ubuntu-latest'
        working-directory: sdks/typescript
        run: |
          npm pack --json | tee ../../npm-pack.json
          tar tzf thetadatadx-*.tgz | head -50
          python3 ../../scripts/inspect_artifacts.py thetadatadx-*.tgz
      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: sdks/typescript/thetadatadx.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - working-directory: sdks/typescript
        run: npm install
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: sdks/typescript/artifacts
      - name: Move binaries into platform packages
        working-directory: sdks/typescript
        run: npx napi artifacts --output-dir artifacts
      - name: List platform packages
        working-directory: sdks/typescript
        run: ls -lR npm/
      - name: Publish platform packages
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            if ls "$dir"/*.node 1>/dev/null 2>&1; then
              pkg_name=$(node -p "require('./${dir}package.json').name")
              pkg_version=$(node -p "require('./${dir}package.json').version")
              if npm view "${pkg_name}@${pkg_version}" version 2>/dev/null; then
                echo "⏭ ${pkg_name}@${pkg_version} already published"
              else
                npm publish "$dir" --access public
              fi
            fi
          done
      - name: Publish root package
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if npm view "thetadatadx@${pkg_version}" version 2>/dev/null; then
            echo "⏭ thetadatadx@${pkg_version} already published"
          else
            npm publish --provenance --access public
          fi
