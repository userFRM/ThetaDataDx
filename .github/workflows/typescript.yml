name: TypeScript SDK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: typescript-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: ./.github/actions/install-protoc
      - working-directory: sdks/typescript
        run: npm install
      - name: Build native addon
        working-directory: sdks/typescript
        run: npx napi build --platform --release --target ${{ matrix.target }} --strip
      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: sdks/typescript
        run: npm test
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: sdks/typescript/thetadatadx.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - working-directory: sdks/typescript
        run: npm install
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: sdks/typescript/artifacts
      - name: Move binaries into platform packages
        working-directory: sdks/typescript
        run: npx napi artifacts --output-dir artifacts
      - name: List platform packages
        working-directory: sdks/typescript
        run: ls -lR npm/
      - name: Publish platform packages
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            if ls "$dir"/*.node 1>/dev/null 2>&1; then
              pkg_name=$(node -p "require('./${dir}package.json').name")
              pkg_version=$(node -p "require('./${dir}package.json').version")
              if npm view "${pkg_name}@${pkg_version}" version 2>/dev/null; then
                echo "⏭ ${pkg_name}@${pkg_version} already published"
              else
                npm publish "$dir" --access public
              fi
            fi
          done
      - name: Publish root package
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if npm view "thetadatadx@${pkg_version}" version 2>/dev/null; then
            echo "⏭ thetadatadx@${pkg_version} already published"
          else
            npm publish --provenance --access public
          fi
