syntax = "proto3";

import "google/protobuf/struct.proto";

option java_multiple_files = true;
option java_package = "net.thetadata.grpc";

// Production MDDS routes on BetaEndpoints.BetaThetaTerminal/<method>.
// Do not rename without confirming the server has been updated.
package BetaEndpoints;

message AuthToken {
  string session_uuid = 1;
}

message ContractSpec {
  string symbol = 1;
  string expiration = 2;
  optional string strike = 3;
  optional string right = 4;
}

message QueryInfo {
  AuthToken auth_token = 1;
  map <string, string> query_parameters = 2;
  string client_type = 3;
  string terminal_git_commit = 4;
  string terminal_version = 5;
}

message Price {
  int32 value = 1;
  int32 type = 2;
}

enum TimeZone {
  NEW_YORK = 0;
  UTC = 1;
}

message ZonedDateTime {
  uint64 epoch_ms = 1;
  TimeZone zone = 2;
}

message DataValue {
  oneof data_type {
    string text = 1;
    int64 number = 2;
    Price price = 3;
    ZonedDateTime timestamp = 4;
    google.protobuf.NullValue null_value = 5;
  }
}

message DataValueList {
  repeated DataValue values = 1;
}

message DataTable {
  repeated string headers = 1;
  repeated DataValueList data_table = 2;
}

enum CompressionAlgo {
  NONE = 0;
  ZSTD = 1;
}

message CompressionDescription {
  CompressionAlgo algo = 1;
  int32 level = 2;
}

message ResponseData {
  // compressed_data holds a DataTable when decompressed; can add a type field for other data types
  bytes compressed_data = 1;
  CompressionDescription compression_description = 2;
  int32 original_size = 3;  // original size in bytes before compressing
}


