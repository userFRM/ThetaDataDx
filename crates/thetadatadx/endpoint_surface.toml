# Explicit endpoint surface specification for ThetaDataDx.
#
# This file is the normalized source of truth for endpoint metadata,
# parameter semantics, REST paths, projection call-shapes, and reusable
# endpoint families.
# The build pipeline validates it against `proto/mdds.proto` and
# combines it with wire metadata extracted from the proto.

version = 2

# Global request-level options attached to every endpoint via
# `TdxEndpointRequestOptions` (FFI) / `EndpointOption` (Go) /
# `with_timeout_ms` (Rust/Python/C++). These are NOT per-endpoint
# builder params — they apply uniformly across the surface — but the
# FFI struct layout still needs to mirror this list, so we declare
# them here as the single source of truth. `scripts/check_docs_consistency.py`
# enforces the drift check.

[[request_options_global]]
name = "timeout_ms"
description = "Per-request deadline in milliseconds. 0 means no deadline."
type = "u64"

# Reusable parameter groups.

[param_groups.request_type]

[[param_groups.request_type.params]]
name = "request_type"
description = "Request type: EOD, TRADE, QUOTE, OHLC, etc."
param_type = "RequestType"
required = true
binding = "method"

[param_groups.stock_symbol]

[[param_groups.stock_symbol.params]]
name = "symbol"
description = "Ticker symbol (e.g. AAPL)"
param_type = "Symbol"
required = true
binding = "method"

[param_groups.multi_symbol]

[[param_groups.multi_symbol.params]]
name = "symbol"
description = "Comma-separated ticker symbols (e.g. AAPL,MSFT)"
param_type = "Symbols"
required = true
binding = "method"
arg_name = "symbols"

[param_groups.expiration_param]

[[param_groups.expiration_param.params]]
name = "expiration"
description = "Expiration date YYYYMMDD"
param_type = "Expiration"
required = true
binding = "method"

[param_groups.strike_param]

[[param_groups.strike_param.params]]
name = "strike"
description = "Strike price in dollars as a string (e.g. 500 or 17.5). Use `*` for wildcard selection."
param_type = "Strike"
required = false
binding = "builder"
default = "*"

[param_groups.right_param]

[[param_groups.right_param.params]]
name = "right"
description = "Option side. Accepts `call`, `put`, or `both`."
param_type = "Right"
required = false
binding = "builder"
default = "both"

[param_groups.contract_identity]

[[param_groups.contract_identity.params]]
use = "stock_symbol"

[[param_groups.contract_identity.params]]
use = "expiration_param"

[[param_groups.contract_identity.params]]
use = "strike_param"

[[param_groups.contract_identity.params]]
use = "right_param"

[param_groups.required_date]

[[param_groups.required_date.params]]
name = "date"
description = "Date YYYYMMDD"
param_type = "Date"
required = true
binding = "method"

[param_groups.interval]

[[param_groups.interval.params]]
name = "interval"
description = "Accepts milliseconds (60000) or shorthand (1m). Presets: tick, 10ms, 100ms, 500ms, 1s, 5s, 10s, 15s, 30s, 1m, 5m, 10m, 15m, 30m, 1h. Defaults to `1s` when omitted — matching the upstream ThetaData Python library."
param_type = "Interval"
required = false
binding = "builder"
default = "1s"

[param_groups.start_time_filter]

[[param_groups.start_time_filter.params]]
name = "start_time"
description = "Start time filter"
param_type = "Str"
required = false
binding = "builder"
default = "09:30:00"

[param_groups.end_time_filter]

[[param_groups.end_time_filter.params]]
name = "end_time"
description = "End time filter"
param_type = "Str"
required = false
binding = "builder"
default = "16:00:00"

[param_groups.history_time_filters]

[[param_groups.history_time_filters.params]]
use = "start_time_filter"

[[param_groups.history_time_filters.params]]
use = "end_time_filter"

[param_groups.stock_venue_filter]

[[param_groups.stock_venue_filter.params]]
name = "venue"
description = "Venue/exchange filter. Accepts `nqb` (Nasdaq Basic) or `utp_cta` (UTP & CTA)."
param_type = "Str"
required = false
binding = "builder"
default = "nqb"

[param_groups.min_time_filter]

[[param_groups.min_time_filter.params]]
name = "min_time"
description = "Minimum time filter"
param_type = "Str"
required = false
binding = "builder"

[param_groups.start_date_required]

[[param_groups.start_date_required.params]]
name = "start_date"
description = "Start date YYYYMMDD"
param_type = "Date"
required = true
binding = "method"

[param_groups.end_date_required]

[[param_groups.end_date_required.params]]
name = "end_date"
description = "End date YYYYMMDD"
param_type = "Date"
required = true
binding = "method"

[param_groups.date_range_required]

[[param_groups.date_range_required.params]]
use = "start_date_required"

[[param_groups.date_range_required.params]]
use = "end_date_required"

[param_groups.start_date_optional]

[[param_groups.start_date_optional.params]]
name = "start_date"
description = "Start date YYYYMMDD"
param_type = "Date"
required = false
binding = "builder"

[param_groups.end_date_optional]

[[param_groups.end_date_optional.params]]
name = "end_date"
description = "End date YYYYMMDD"
param_type = "Date"
required = false
binding = "builder"

[param_groups.date_range_optional]

[[param_groups.date_range_optional.params]]
use = "start_date_optional"

[[param_groups.date_range_optional.params]]
use = "end_date_optional"

[param_groups.time_of_day]

[[param_groups.time_of_day.params]]
name = "time_of_day"
description = "ET wall-clock time in HH:MM:SS.SSS (e.g. 09:30:00.000 for 9:30 AM ET; legacy 34200000 is also accepted)"
param_type = "Str"
required = true
binding = "method"

[param_groups.exclusive_flag]

[[param_groups.exclusive_flag.params]]
name = "exclusive"
description = "When true, quotes whose timestamp equals the trade timestamp are excluded; only quotes strictly before the trade are paired."
param_type = "Bool"
required = false
binding = "builder"
default = "true"

[param_groups.max_dte_filter]

[[param_groups.max_dte_filter.params]]
name = "max_dte"
description = "Maximum days to expiration"
param_type = "Int"
required = false
binding = "builder"

[param_groups.strike_range_filter]

[[param_groups.strike_range_filter.params]]
name = "strike_range"
description = "Strike range filter"
param_type = "Int"
required = false
binding = "builder"

[param_groups.annual_dividend_input]

[[param_groups.annual_dividend_input.params]]
name = "annual_dividend"
description = "Annual dividend"
param_type = "Float"
required = false
binding = "builder"

[param_groups.rate_type_input]

[[param_groups.rate_type_input.params]]
name = "rate_type"
description = "Risk-free-rate source used in the Greeks calculation. Accepts `sofr`, `treasury_m1`, `treasury_m3`, `treasury_m6`, `treasury_y1`, `treasury_y2`, `treasury_y3`, `treasury_y5`, `treasury_y7`, `treasury_y10`, `treasury_y20`, `treasury_y30`."
param_type = "Str"
required = false
binding = "builder"
default = "sofr"

[param_groups.rate_value_input]

[[param_groups.rate_value_input.params]]
name = "rate_value"
description = "Rate value"
param_type = "Float"
required = false
binding = "builder"

[param_groups.option_greeks_rate_inputs]

[[param_groups.option_greeks_rate_inputs.params]]
use = "annual_dividend_input"

[[param_groups.option_greeks_rate_inputs.params]]
use = "rate_type_input"

[[param_groups.option_greeks_rate_inputs.params]]
use = "rate_value_input"

[param_groups.stock_price_input]

[[param_groups.stock_price_input.params]]
name = "stock_price"
description = "Stock price"
param_type = "Float"
required = false
binding = "builder"

[param_groups.version_input]

[[param_groups.version_input.params]]
name = "version"
description = "Greeks model version. Accepts `latest` (newest DG3-family revision) or `1` (pinned original)."
param_type = "Str"
required = false
binding = "builder"
default = "latest"

[param_groups.option_snapshot_greeks_inputs]

[[param_groups.option_snapshot_greeks_inputs.params]]
use = "option_greeks_rate_inputs"

[[param_groups.option_snapshot_greeks_inputs.params]]
use = "stock_price_input"

[[param_groups.option_snapshot_greeks_inputs.params]]
use = "version_input"

[param_groups.option_history_greeks_inputs]

[[param_groups.option_history_greeks_inputs.params]]
use = "option_greeks_rate_inputs"

[[param_groups.option_history_greeks_inputs.params]]
use = "version_input"

[param_groups.use_market_value_flag]

[[param_groups.use_market_value_flag.params]]
name = "use_market_value"
description = "When true, calculate Greeks against the option market value (mid-price) instead of the NBBO bid/ask pair."
param_type = "Bool"
required = false
binding = "builder"
default = "false"

[param_groups.underlyer_use_nbbo_flag]

[[param_groups.underlyer_use_nbbo_flag.params]]
name = "underlyer_use_nbbo"
description = "When true, use the NBBO-derived underlyer price as the Greeks input instead of the last trade."
param_type = "Bool"
required = false
binding = "builder"
default = "false"

[param_groups.year_param]

[[param_groups.year_param.params]]
name = "year"
description = "4-digit year (e.g. 2024)"
param_type = "Year"
required = true
binding = "method"

