# Concrete endpoint declarations.

[[endpoints]]
name = "stock_list_symbols"
template = "stock_list"
description = "List all available stock ticker symbols."
rest_path = "/v3/stock/list/symbols"
list_column = "symbol"

[[endpoints]]
name = "stock_list_dates"
template = "stock_list"
description = "List available dates for a stock by request type (EOD, TRADE, QUOTE, etc.)."
rest_path = "/v3/stock/list/dates"
list_column = "date"

[[endpoints.params]]
use = "request_type"

[[endpoints.params]]
use = "stock_symbol"

[[endpoints]]
name = "stock_snapshot_ohlc"
template = "stock_snapshot"
description = "Get the latest OHLC snapshot for one or more stocks."
rest_path = "/v3/stock/snapshot/ohlc"
returns = "OhlcTicks"

[[endpoints]]
name = "stock_snapshot_trade"
template = "stock_snapshot"
description = "Get the latest trade snapshot for one or more stocks."
rest_path = "/v3/stock/snapshot/trade"
