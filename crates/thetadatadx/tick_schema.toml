# ─────────────────────────────────────────────────────────────────────────────
# `option_history_trade_greeks_*` sibling tick types.
#
# The five `option_history_trade_greeks_*` endpoints calculate Greeks for
# every individual OPRA trade rather than at a sampled interval. Their wire
# rows therefore carry the nine trade-side execution columns
# (`sequence`, `ext_condition1..4`, `condition`, `size`, `exchange`, `price`)
# in place of the `bid` / `ask` quote pair carried by the matching
# interval-sampled `option_history_greeks_*` endpoints.
#
# These were silently routed to the bare `Greeks*Tick` types for the v10
# line, which dropped every trade-side column on decode -- users got the
# Greeks but lost the per-trade execution context. Verified-live against
# terminal jar build `202605221` (CSV captures pinned in
# `tests/fixtures/captures/option_history_trade_greeks_*.meta.toml`).
#
# The IV variant (`option_history_trade_greeks_implied_volatility`) ships
# only the single `implied_vol` + `iv_error` pair (not the bid/mid/ask IV
# triple of the interval-sampled `IvTick`).
# ─────────────────────────────────────────────────────────────────────────────

