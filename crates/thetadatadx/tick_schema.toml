# Tick Type Schema -- single source of truth for all DataTable column schemas
# AND every per-language binding name a renderer needs to emit code for that
# tick type.
#
# build.rs reads this file and generates:
#   - DataTable parsers              -> $OUT_DIR/decode_generated.rs
#   - per-language SDK surfaces      -> sdks/{python,typescript,go,cpp}/...
#                                       (driven entirely by [types.X.render])
#
# Column types:
#   i32     -> row_number(row, i)                         default: 0
#   i64     -> row_number_i64(row, i)                     default: 0
#   f64     -> row_price_f64(row, i) (accepts Price|Number)  default: 0.0
#   String  -> row_text(row, i)                           default: ""
#   price   -> decode to f64 via Price::new(raw, pt).to_f64()
#   eod_num -> EOD numeric/time field: Price/Number direct, Timestamp -> ms_of_day
#   eod_num64 -> EOD numeric widened to i64 (for volume/count); Price/Number direct, Timestamp -> ms_of_day
#   eod_date -> EOD date field: Price/Number direct, Timestamp -> YYYYMMDD
#   eod_price -> EOD price fields: decode to f64 at parse time
#
# Parser options:
#   required = ["col1", "col2"]  -- headers that must exist or parser returns empty vec
#   eod_style = true  -- use eod_num helper (handles both Price and Number cells)
#
# Struct options:
#   copy = true/false   -- whether to derive Copy (false when String fields exist)
#   align = 64          -- repr(C, align(N)); omit for no repr attribute
#   doc = "..."         -- doc comment on the struct
#   contract_id = true  -- inject expiration/strike/right fields
#                          (populated by server on wildcard queries, 0 otherwise)
#
# Render block (per-language binding names):
#   collection            -- wire-collection plural (e.g. "GreeksTicks") matched
#                            by `endpoint_surface.toml::returns`. Must be unique.
#   direct                -- Rust direct-client tick type
#   parser                -- generated parser fn name (matches `parser` above)
#   go_struct             -- Go SDK struct name
#   go_converter          -- Go SDK converter fn (cgo bridge)
#   ffi_array             -- FFI array struct (e.g. "TdxGreeksTickArray")
#   ffi_array_empty       -- empty-array literal for FFI null-init
#   ffi_output_variant    -- thetadatadx::EndpointOutput variant name
#   ffi_from_vec_array    -- FFI array struct used in Tdx*::from_vec calls
#   ffi_header_return     -- return type in generated C/Go header
#   ffi_free_fn           -- C-side free fn name (without C. prefix)
#   cpp_value             -- C++ value type name
#   python_converter      -- legacy Python dict converter (PyDict)
#   python_columnar       -- Python columnar dict converter
#   python_pyclass_list   -- Python pyclass-list converter (PyTickList)
#   python_vec_to_pylist  -- Python Vec<Tick> -> Py<PyList> fast-path converter
#   python_slice_arrow    -- Python slice-arrow Arrow C Data converter
#   ts_class              -- TypeScript napi-rs class name
#   ts_class_vec          -- TypeScript class-vec converter fn
#   pyclass               -- Python pyclass struct name (typically same as type_name)

# ─────────────────────────────────────────────────────────────────────────────
# Existing 4 tick types (hand-written before, now generated)
# ─────────────────────────────────────────────────────────────────────────────

