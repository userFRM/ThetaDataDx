[types.QuoteTick]
doc = """Quote tick -- 10 fields + midpoint. NBBO quote data.

Wire layout: the full shape is 11 columns (`ms_of_day`,
`bid_size`, `bid_exchange`, `bid`, `bid_condition`, `ask_size`,
`ask_exchange`, `ask`, `ask_condition`, `price_type`, `date`).
The four exchange / condition columns are NOT in the `required` list
below so the generator emits `opt_number(row, None) -> 0` arms for
them; this lets the decoder accept subset NBBO layouts (e.g. the
6-field `[ms_of_day, bid_size, bid, ask_size, ask, date]` shape some
storage tiers emit) without erroring, while still decoding the full
11-field shape bit-exact when every column is present."""
copy = true
align = 64
contract_id = true
parser = "parse_quote_ticks"
required = ["ms_of_day", "bid", "ask"]
columns = [
    { name = "ms_of_day",     field = "ms_of_day",     type = "i32" },
    { name = "bid_size",      field = "bid_size",      type = "i32" },
    { name = "bid_exchange",  field = "bid_exchange",  type = "i32" },
    { name = "bid",           field = "bid",           type = "price" },
    { name = "bid_condition", field = "bid_condition", type = "i32" },
    { name = "ask_size",      field = "ask_size",      type = "i32" },
    { name = "ask_exchange",  field = "ask_exchange",  type = "i32" },
    { name = "ask",           field = "ask",           type = "price" },
    { name = "ask_condition", field = "ask_condition", type = "i32" },
    { name = "date",          field = "date",          type = "i32" },
]

[types.QuoteTick.render]
collection = "QuoteTicks"
direct = "QuoteTick"
parser = "parse_quote_ticks"
