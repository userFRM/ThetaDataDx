# Declarative non-endpoint SDK/tool surface specification.
#
# endpoint_surface.toml remains the SSOT for validated request/response
# endpoints backed by the upstream proto. This file covers the remaining
# non-endpoint projections:
#   - FPSS/unified public methods
#   - offline utility functions
#   - CLI/MCP utility commands and tools
#   - small C++ lifecycle wrappers
#
# This spec now declares the public method set, parameter lists, target
# projections, and user-facing docs. build_support/sdk_surface/ is only the
# renderer: it maps semantic kinds below onto language-specific code templates.

version = 2

[[methods]]
name = "start_streaming"
kind = "start_streaming"
doc = "Start FPSS streaming and register a callback for incoming events. Each typed FPSS event is delivered to the callback off the network thread; the binding owns the dispatcher and the callback runs under a panic boundary."
targets = ["python_unified", "typescript_napi"]

[[methods]]
name = "is_streaming"
kind = "is_streaming"
doc = "Whether the streaming connection is active."
targets = ["python_unified", "typescript_napi"]

#  — typed subscribe_* / unsubscribe_* methods deleted.
# The polymorphic `subscribe(Subscription)` / `subscribe_many([...])` /
# `unsubscribe(Subscription)` / `unsubscribe_many([...])` paths are
# implemented directly on the unified client surface in each binding
# (Python: `sdks/python/src/lib.rs`, TypeScript: `sdks/typescript/src/lib.rs`,
# C++: `sdks/cpp/include/thetadatadx.hpp`). The fluent `Contract` /
# `Subscription` / `SecType` value types are exposed through
# language-native modules (`fluent.rs` for Python and TypeScript,
# `thetadatadx.hpp` for C++).

[[methods]]
name = "active_subscriptions"
kind = "active_subscriptions"
doc = "Get a snapshot of currently active subscriptions."
targets = ["python_unified", "typescript_napi", "cpp_fpss"]

[[methods]]
name = "reconnect"
kind = "reconnect"
doc = "Reconnect streaming and re-subscribe all previous subscriptions."
targets = ["python_unified", "typescript_napi", "cpp_fpss"]

[[methods]]
name = "stop_streaming"
kind = "stop_streaming"
doc = """Stop streaming while keeping the historical client usable.

Clears the registered callback. To resume streaming, start streaming again with a freshly bound callback -- reconnect will fail because no callback is held. See the reconnect docs for the rationale: the callback is released at the same scope boundary the application observes, so a stopped session never retains a captured reference past a teardown the caller has already seen."""
targets = ["python_unified", "typescript_napi"]

[[methods]]
name = "shutdown"
kind = "shutdown"
doc = """Shut down the FPSS streaming connection.

On the Python and TypeScript bindings, this clears the registered callback (same explicit-handoff semantics as stopping the stream); reconnect will then fail until the caller starts streaming again with a freshly bound callback. The C++ binding preserves the underlying connection's behaviour."""
targets = ["python_unified", "typescript_napi", "cpp_fpss"]

[[methods]]
name = "await_drain"
kind = "await_drain"
doc = "Block until the previous streaming session's consumer thread has finished firing the registered callback. Returns true if the drain completed within the timeout, false otherwise."
targets = ["python_unified", "typescript_napi"]
params = [{ name = "timeout_ms", type = "u64", doc = "Maximum time to wait, in milliseconds." }]

[[methods]]
name = "is_authenticated"
kind = "is_authenticated"
doc = "Return true if the FPSS client is currently authenticated."
targets = ["cpp_fpss"]

[[methods]]
name = "connect"
kind = "fpss_connect"
doc = "Connect to FPSS streaming servers. Throws on failure."
targets = ["cpp_fpss"]
params = [
  { name = "creds", type = "credentials_ref", doc = "Credentials handle." },
  { name = "config", type = "config_ref", doc = "Configuration handle." },
]

[[methods]]
name = "from_file"
kind = "fpss_connect_from_file"
doc = "Connect to FPSS streaming servers, loading credentials from a file (line 1 = email, line 2 = password), defaulting to the production configuration. Throws on failure."
targets = ["cpp_fpss"]
params = [{ name = "path", type = "string", doc = "Path to the credentials file." }]

[[methods]]
name = "credentials_from_file"
kind = "credentials_from_file"
doc = "Load credentials from a file. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the credentials file." }]

[[methods]]
name = "credentials_from_email"
kind = "credentials_from_email"
doc = "Construct credentials from email and password. Throws on failure."
targets = ["cpp_lifecycle"]
params = [
  { name = "email", type = "string", doc = "Account email." },
  { name = "password", type = "string", doc = "Account password." },
]

[[methods]]
name = "config_production"
kind = "config_constructor"
doc = "Create the production configuration."
targets = ["cpp_lifecycle"]
config_variant = "production"

[[methods]]
name = "config_dev"
kind = "config_constructor"
doc = "Create the dev replay configuration."
targets = ["cpp_lifecycle"]
config_variant = "dev"

[[methods]]
name = "config_stage"
kind = "config_constructor"
doc = "Create the staging configuration."
targets = ["cpp_lifecycle"]
config_variant = "stage"

[[methods]]
name = "client_connect"
kind = "client_connect"
doc = "Connect the unified client. Throws on failure."
targets = ["cpp_lifecycle"]
params = [
  { name = "creds", type = "credentials_ref", doc = "Credentials handle." },
  { name = "config", type = "config_ref", doc = "Configuration handle." },
]

[[methods]]
name = "mdds_client_from_file"
kind = "client_connect_from_file"
doc = "Connect the historical (MDDS) client, loading credentials from a file. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the credentials file." }]

[[utilities]]
name = "auth"
kind = "auth"
doc = "Test authentication and print session info."
cli_about = "Test authentication and print session info"
targets = ["cli"]

[[utilities]]
name = "ping"
kind = "ping"
doc = "Check MCP server status."
mcp_description = "Check MCP server status. Returns uptime and connection info without hitting ThetaData servers."
targets = ["mcp"]

[[utilities]]
name = "all_greeks"
kind = "all_greeks"
doc = "Compute all 23 Black-Scholes Greeks + IV in one call."
cli_about = "Compute Black-Scholes Greeks (offline, no server needed)"
mcp_description = "Compute all 23 Black-Scholes Greeks OFFLINE (no ThetaData server needed). Returns value, delta, gamma, theta, vega, rho, IV, iv_error, vanna, charm, vomma, veta, speed, zomma, color, ultima, d1, d2, dual_delta, dual_gamma, epsilon, lambda, vera."
cli_name = "greeks"
targets = ["python", "typescript", "cpp", "mcp", "cli"]
params = [
  { name = "spot", type = "f64", doc = "Spot price.", mcp_description = "Spot price (underlying)" },
  { name = "strike", type = "f64", doc = "Strike price." },
  { name = "rate", type = "f64", doc = "Risk-free rate.", mcp_description = "Risk-free rate (e.g. 0.05 for 5%)" },
  { name = "div_yield", type = "f64", doc = "Dividend yield.", cli_name = "dividend", mcp_name = "dividend_yield", mcp_description = "Dividend yield (e.g. 0.02 for 2%)" },
  { name = "tte", type = "f64", doc = "Time to expiration in years.", cli_name = "time", mcp_name = "time_to_expiry", mcp_description = "Time to expiration in years (e.g. 0.25 for 3 months)" },
  { name = "option_price", type = "f64", doc = "Option price.", mcp_description = "Market price of the option" },
  { name = "right", type = "string", doc = "Option side: C/P or call/put (case-insensitive).", mcp_description = "Option side: \"C\"/\"P\" or \"call\"/\"put\" (case-insensitive)", enum_values = ["C", "P", "c", "p", "call", "put", "CALL", "PUT", "Call", "Put"] },
]

