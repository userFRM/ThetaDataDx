# ─────────────────────────────────────────────────────────────────────────────
# FFI thread-local-error reader markers (W3 / W7c)
# ─────────────────────────────────────────────────────────────────────────────
# Substrings that identify a call site reading the FFI's thread-local error
# slot (`ffi/src/lib.rs::LAST_ERROR`). Any Go source line containing one of
# these consults the TLS, so the enclosing function MUST have executed
# `runtime.LockOSThread()` (with a matching deferred unlock) before reaching
# that line. See docs/dev/w3-async-cancellation-design.md, section
# "cgo thread-local correctness".
#
# This list is the single source of truth consumed by BOTH sides:
#
#   * `build_support/sdk_surface.rs::inject_os_thread_pin` uses it at build
#     time to decide which generated Go method bodies need the pin injected.
#   * `sdks/go/tls_markers_generated_test.go` (generated) re-emits it as
#     `tlsReaderMarkers`, consumed by `TestEveryFFIErrorReaderPinsOSThread`
#     in `sdks/go/timeout_pin_test.go` to statically audit every Go function
#     in the package for the required pin.
#
# Adding a marker here is all it takes: regenerate with
# `cargo run -p thetadatadx --features config-file --bin generate_sdk_surfaces`
# and both sides pick it up.

[[go_ffi.tls_reader_markers]]
substring = "lastError("
description = "Go-side wrapper that reads LAST_ERROR after a failing FFI call."

[[go_ffi.tls_reader_markers]]
substring = "lastErrorRaw("
description = "Lower-level wrapper returning the raw `*C.char` from LAST_ERROR."

[[go_ffi.tls_reader_markers]]
substring = "f.fpssCall("
description = "FPSS cgo invocation followed by an inline LAST_ERROR check."

[[go_ffi.tls_reader_markers]]
substring = "C.tdx_last_error("
description = "Direct cgo call into the C FFI's `tdx_last_error` symbol."

[[go_ffi.tls_reader_markers]]
substring = "stringArrayToGo("
description = "Helper that itself reads LAST_ERROR — callers must pin before invoking (the helper also self-pins defensively)."
