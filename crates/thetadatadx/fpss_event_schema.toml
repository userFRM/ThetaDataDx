# FPSS streaming event schema — single source of truth for every event
# shape exposed to downstream SDKs.
#
# Read by `build_support/fpss_events/`. Drives:
#   - per-language typed structs for every variant (Python pyclass,
#     TS napi `#[napi(object)]`, Go struct, C++ struct, FFI struct).
#   - the `BufferedEvent` enum in Python + TS (generator-emitted, not
#     hand-rolled — drift is compile-fatal).
#   - the `fpss_event_to_buffered(event: &FpssEvent) -> BufferedEvent`
#     converter in Python + TS.
#   - the `buffered_event_to_typed` dispatcher that returns a typed
#     pyclass / napi struct for every variant — no PyDict / `any`
#     fallback anywhere.
#
# Variant classification:
#   - `kind = "data"`     — typed market-data payload (Quote / Trade / ...)
#   - `kind = "simple"`   — diagnostic control events (login, disconnect,
#                           market_open, unknown-data fallback) flattened
#                           into one struct with `event_type`, `detail`, `id`.
#   - `kind = "raw_data"` — raw frame bytes for unrecognized wire codes.
#
# Column type `Contract` is a nested struct: every language emits a
# Contract struct/class with (root, sec_type, exp_date?, is_call?, strike?).
# Optional fields (exp_date / is_call / strike) use the language-native
# nullable shape (`Option<..>` in Rust, `Option<..>` in napi, `Optional[..]`
# in Python via pyo3 `Option<..>`, `*T` pointer in Go, `std::optional<..>`
# in C++).

version = 3

# ── Data variants — market-data ticks ─────────────────────────────────

[events.Quote]
kind = "data"
doc = "FPSS Quote tick. Mirrors `FpssData::Quote`."
columns = [
    { name = "contract_id",   type = "i32" },
    { name = "contract",      type = "Contract" },
    { name = "ms_of_day",     type = "i32" },
    { name = "bid_size",      type = "i32" },
    { name = "bid_exchange",  type = "i32" },
    { name = "bid",           type = "f64" },
    { name = "bid_condition", type = "i32" },
    { name = "ask_size",      type = "i32" },
    { name = "ask_exchange",  type = "i32" },
    { name = "ask",           type = "f64" },
    { name = "ask_condition", type = "i32" },
    { name = "date",          type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

[events.Trade]
kind = "data"
doc = "FPSS Trade tick. Mirrors `FpssData::Trade`."
columns = [
    { name = "contract_id",     type = "i32" },
    { name = "contract",        type = "Contract" },
    { name = "ms_of_day",       type = "i32" },
    { name = "sequence",        type = "i32" },
    { name = "ext_condition1",  type = "i32" },
    { name = "ext_condition2",  type = "i32" },
    { name = "ext_condition3",  type = "i32" },
    { name = "ext_condition4",  type = "i32" },
    { name = "condition",       type = "i32" },
    { name = "size",            type = "i32" },
    { name = "exchange",        type = "i32" },
    { name = "price",           type = "f64" },
    { name = "condition_flags", type = "i32" },
    { name = "price_flags",     type = "i32" },
    { name = "volume_type",     type = "i32" },
    { name = "records_back",    type = "i32" },
    { name = "date",            type = "i32" },
    { name = "received_at_ns",  type = "u64" },
]

[events.OpenInterest]
kind = "data"
doc = "FPSS OpenInterest tick. Mirrors `FpssData::OpenInterest`."
columns = [
    { name = "contract_id",   type = "i32" },
    { name = "contract",      type = "Contract" },
    { name = "ms_of_day",     type = "i32" },
    { name = "open_interest", type = "i32" },
    { name = "date",          type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

[events.Ohlcvc]
kind = "data"
doc = "FPSS OHLCVC bar. Mirrors `FpssData::Ohlcvc`."
columns = [
    { name = "contract_id",    type = "i32" },
    { name = "contract",       type = "Contract" },
    { name = "ms_of_day",      type = "i32" },
    { name = "open",           type = "f64" },
    { name = "high",           type = "f64" },
    { name = "low",            type = "f64" },
    { name = "close",          type = "f64" },
    { name = "volume",         type = "i64" },
    { name = "count",          type = "i64" },
    { name = "date",           type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

# ── Non-data variants — control / raw fallbacks ───────────────────────

[events.Simple]
kind = "simple"
doc = "FPSS control / diagnostic event. Flattened from every `FpssControl` variant (login_success, contract_assigned, req_response, market_open/close, server_error, disconnected, reconnecting, reconnected, error, unknown_frame) and from the unknown-data / unknown-control fallbacks. `event_type` carries the concrete variant name; `detail` is a free-form diagnostic string (None when the variant carries no payload); `id` is the contract_id / req_id / reconnect attempt number where applicable."
columns = [
    { name = "event_type", type = "String" },
    { name = "detail",     type = "Option<String>" },
    { name = "id",         type = "Option<i32>" },
]

[events.RawData]
kind = "raw_data"
doc = "FPSS raw-bytes event for frames the decoder did not recognize. `code` is the wire message code; `payload` is the full frame body."
columns = [
    { name = "code",    type = "u8" },
    { name = "payload", type = "Vec<u8>" },
]
