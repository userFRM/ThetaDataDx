# FPSS streaming event schema — single source of truth for every event
# shape exposed to downstream SDKs.
#
# Read by `build_support/fpss_events/`. Drives:
#   - per-language typed structs for every variant (Python pyclass,
#     TS napi `#[napi(object)]`, C++ struct, FFI struct).
#   - the `BufferedEvent` enum in Python + TS (generator-emitted, not
#     hand-rolled — drift is compile-fatal).
#   - the `fpss_event_to_buffered(event: &StreamEvent) -> BufferedEvent`
#     converter in Python + TS.
#   - the `buffered_event_to_typed` dispatcher that returns a typed
#     pyclass / napi struct for every variant — no PyDict / `any`
#     fallback anywhere.
#
# Variant classification:
#   - `kind = "data"`     — typed market-data payload (Quote / Trade / ...)
#   - `kind = "control"`  — typed control / lifecycle event mirroring a
#                           `StreamControl::*` Rust variant one-for-one.
#                           Each variant declares its own fields so the
#                           Python and TypeScript SDKs surface the same
#                           shape Rust consumers see (no flat
#                           `event_type` / `detail` envelope).
#                           Frames the decoder cannot parse are surfaced
#                           through `StreamControl::UnknownFrame` (typed
#                           control variant with `code` + `payload`).
#
# Column type `Contract` is a nested struct: every language emits a
# Contract struct/class with (root, sec_type, exp_date?, is_call?, strike?).
# Optional fields (exp_date / is_call / strike) use the language-native
# nullable shape (`Option<..>` in Rust, `Option<..>` in napi, `Optional[..]`
# in Python via pyo3 `Option<..>`, `std::optional<..>` in C++).

version = 8

# ── Data variants — market-data ticks ─────────────────────────────────

[events.Quote]
kind = "data"
doc = "FPSS Quote tick."
columns = [
    { name = "contract",      type = "Contract" },
    { name = "ms_of_day",     type = "i32" },
    { name = "bid_size",      type = "i32" },
    { name = "bid_exchange",  type = "i32" },
    { name = "bid",           type = "f64" },
    { name = "bid_condition", type = "i32" },
    { name = "ask_size",      type = "i32" },
    { name = "ask_exchange",  type = "i32" },
    { name = "ask",           type = "f64" },
    { name = "ask_condition", type = "i32" },
    { name = "date",          type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

[events.Trade]
kind = "data"
doc = "FPSS Trade tick."
columns = [
    { name = "contract",        type = "Contract" },
    { name = "ms_of_day",       type = "i32" },
    { name = "sequence",        type = "i32" },
    { name = "ext_condition1",  type = "i32" },
    { name = "ext_condition2",  type = "i32" },
    { name = "ext_condition3",  type = "i32" },
    { name = "ext_condition4",  type = "i32" },
    { name = "condition",       type = "i32" },
    { name = "size",            type = "i32" },
    { name = "exchange",        type = "i32" },
    { name = "price",           type = "f64" },
    { name = "condition_flags", type = "i32" },
    { name = "price_flags",     type = "i32" },
    { name = "volume_type",     type = "i32" },
    { name = "records_back",    type = "i32" },
    { name = "date",            type = "i32" },
    { name = "received_at_ns",  type = "u64" },
]

[events.OpenInterest]
kind = "data"
doc = "FPSS OpenInterest tick."
columns = [
    { name = "contract",      type = "Contract" },
    { name = "ms_of_day",     type = "i32" },
    { name = "open_interest", type = "i32" },
    { name = "date",          type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

[events.Ohlcvc]
kind = "data"
doc = "FPSS OHLCVC bar."
columns = [
    { name = "contract",       type = "Contract" },
    { name = "ms_of_day",      type = "i32" },
    { name = "open",           type = "f64" },
    { name = "high",           type = "f64" },
    { name = "low",            type = "f64" },
    { name = "close",          type = "f64" },
    { name = "volume",         type = "i64" },
    { name = "count",          type = "i64" },
    { name = "date",           type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

[events.MarketValue]
kind = "data"
doc = "FPSS MarketValue tick (wire code 25). A calculated theoretical market value derived from the real-time bid/ask — `market_bid` / `market_ask` are the quote bid/ask after a size-imbalance + spread-aware nudge, `market_price` is their integer midpoint. Per-contract only (no full-stream variant)."
columns = [
    { name = "contract",      type = "Contract" },
    { name = "ms_of_day",     type = "i32" },
    { name = "market_bid",    type = "f64" },
    { name = "market_ask",    type = "f64" },
    { name = "market_price",  type = "f64" },
    { name = "date",          type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

# ── Control variants — typed mirror of `StreamControl::*` ────────────────
#
# Each [events.<Variant>] section maps to a Rust `StreamControl::<Variant>`
# arm. Field names + scalar types match the Rust enum exactly. Python
# users dispatch via `match event: case LoginSuccess(): ...`; TypeScript
# users discriminate on `event.kind`. The converter in `buffered.rs`
# generator pattern-matches each `StreamControl` arm directly into the
# matching `BufferedEvent::<Variant>` arm — no flat `event_type` /
# `detail` string envelope.
#
# `RemoveReason` (on `Disconnected.reason` and `Reconnecting.reason`) is
# `#[repr(i16)]` upstream; we surface it as `i32` matching how `sec_type`
# on `Contract` carries the `SecType` enum's discriminant. Consumers
# compare against `thetadatadx::RemoveReason as i32`.

[events.LoginSuccess]
kind = "control"
doc = "FPSS login succeeded. `permissions` is the server's opaque bundle string — diagnostic metadata only; for feature gating use the Nexus REST subscription tiers."
columns = [
    { name = "permissions", type = "String" },
]

[events.ContractAssigned]
kind = "control"
doc = "FPSS server assigned a contract id. The `contract` payload carries the full resolved contract (root, sec_type, expiration / strike / right for options)."
columns = [
    { name = "id",       type = "i32" },
    { name = "contract", type = "Contract" },
]

[events.ReqResponse]
kind = "control"
doc = "FPSS subscription response (wire code 40). `result` is an integer status code (0=Subscribed, 1=Error, 2=MaxStreamsReached, 3=InvalidPerms)."
columns = [
    { name = "req_id", type = "i32" },
    { name = "result", type = "i32" },
]

[events.MarketOpen]
kind = "control"
doc = "FPSS market-open signal (wire code 30). Carries no payload."
columns = []

[events.MarketClose]
kind = "control"
doc = "FPSS market-close signal (wire code 32). Carries no payload."
columns = []

[events.ServerError]
kind = "control"
doc = "FPSS server-error message (wire code 11)."
columns = [
    { name = "message", type = "String" },
]

[events.Disconnected]
kind = "control"
doc = "FPSS server disconnected the client (wire code 12). `reason` is the integer disconnect code; read the resolved reason-name field for the symbolic name."
columns = [
    { name = "reason", type = "i32" },
]

[events.Reconnecting]
kind = "control"
doc = "FPSS auto-reconnect is about to attempt reconnection. Emitted before sleeping for `delay_ms` milliseconds. `attempt` is 1-based and saturates at the maximum 32-bit signed value if the reconnect loop exceeds 2^31 attempts."
columns = [
    { name = "reason",   type = "i32" },
    { name = "attempt",  type = "i32" },
    { name = "delay_ms", type = "u64" },
]

[events.Reconnected]
kind = "control"
doc = "FPSS auto-reconnect succeeded — connection is live again. Carries no payload."
columns = []

[events.ReconnectsExhausted]
kind = "control"
doc = "FPSS auto-reconnect stopped without a user-initiated shutdown — terminal for the session. Emitted when the reconnect budget (attempt count or wall-clock envelope) is exhausted, a permanent disconnect reason short-circuits recovery, a manual policy declines to reconnect, or a custom policy returns no delay. `reason` is the integer disconnect code of the final drop; read the resolved reason-name field for the symbolic name. `attempts` is the number of consecutive reconnect attempts consumed before giving up (0 when no reconnect was attempted)."
columns = [
    { name = "reason",   type = "i32" },
    { name = "attempts", type = "i32" },
]

[events.ParseError]
kind = "control"
doc = "FPSS protocol-level parse error. Named `ParseError` on every binding so it never collides with the language's own error types (Python's exception classes, the JS global `Error`)."
columns = [
    { name = "message", type = "String" },
]

[events.UnknownFrame]
kind = "control"
doc = "FPSS server sent a frame with an unrecognised wire code. Raw bytes preserved for diagnostics / upstream bug reports."
columns = [
    { name = "code",    type = "u8" },
    { name = "payload", type = "Vec<u8>" },
]

[events.Connected]
kind = "control"
doc = "FPSS server connection ack (wire code 4). Carries no payload."
columns = []

[events.Ping]
kind = "control"
doc = "FPSS server heartbeat (wire code 10). The server emits PING frames (observed 1-byte payload `[0]`) the client heartbeat logic does not have to answer; payload preserved for diagnostics."
columns = [
    { name = "payload", type = "Vec<u8>" },
]

[events.ReconnectedServer]
kind = "control"
doc = "FPSS server-side reconnect ack (wire code 13). Distinct from `Reconnected`, which the client emits from its auto-reconnect state machine once the new TLS session is authenticated."
columns = []

[events.Restart]
kind = "control"
doc = "FPSS server stream restart (wire code 31). The server restarts the stream without dropping the TCP connection; delta decode state should be cleared on receipt."
columns = []

[events.UnknownControl]
kind = "control"
doc = "FPSS control variant the SDK does not yet recognise. Surfaced when a newer protocol revision adds a control event this build predates — keep dispatch logic forward-compatible by handling this variant. Carries no payload."
columns = []
