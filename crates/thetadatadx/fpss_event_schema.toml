[events.MarketValue]
kind = "data"
doc = "FPSS MarketValue tick (wire code 25). Mirrors `FpssData::MarketValue`. A calculated theoretical market value derived from the real-time bid/ask â€” `market_bid` / `market_ask` are the quote bid/ask after a size-imbalance + spread-aware nudge, `market_price` is their integer midpoint. Per-contract only (no full-stream variant)."
columns = [
    { name = "contract",      type = "Contract" },
    { name = "ms_of_day",     type = "i32" },
    { name = "market_bid",    type = "f64" },
    { name = "market_ask",    type = "f64" },
    { name = "market_price",  type = "f64" },
    { name = "date",          type = "i32" },
    { name = "received_at_ns", type = "u64" },
]

# â”€â”€ Control variants â€” typed mirror of `FpssControl::*` â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
#
# Each [events.<Variant>] section maps to a Rust `FpssControl::<Variant>`
# arm. Field names + scalar types match the Rust enum exactly. Python
# users dispatch via `match event: case LoginSuccess(): ...`; TypeScript
# users discriminate on `event.kind`. The converter in `buffered.rs`
# generator pattern-matches each `FpssControl` arm directly into the
# matching `BufferedEvent::<Variant>` arm â€” no flat `event_type` /
# `detail` string envelope.
#
# `RemoveReason` (on `Disconnected.reason` and `Reconnecting.reason`) is
# `#[repr(i16)]` upstream; we surface it as `i32` matching how `sec_type`
# on `Contract` carries the `SecType` enum's discriminant. Consumers
# compare against `thetadatadx::RemoveReason as i32`.

[events.LoginSuccess]
kind = "control"
doc = "FPSS login succeeded. Mirrors `FpssControl::LoginSuccess`. `permissions` is the server's opaque `Bundle` string â€” diagnostic metadata only; for feature gating use the Nexus REST subscription tiers (see `FpssControl::LoginSuccess` doc on the core crate)."
columns = [
    { name = "permissions", type = "String" },
]

[events.ContractAssigned]
kind = "control"
doc = "FPSS server assigned a contract id. Mirrors `FpssControl::ContractAssigned`. The `contract` payload carries the full resolved `Contract` (root, sec_type, expiration / strike / right for options)."
columns = [
    { name = "id",       type = "i32" },
    { name = "contract", type = "Contract" },
]

[events.ReqResponse]
kind = "control"
doc = "FPSS subscription response (wire code 40). Mirrors `FpssControl::ReqResponse`. `result` is the `StreamResponseType` discriminant cast to `i32` (0=Subscribed, 1=Error, 2=MaxStreamsReached, 3=InvalidPerms)."
columns = [
    { name = "req_id", type = "i32" },
    { name = "result", type = "i32" },
]

[events.MarketOpen]
kind = "control"
doc = "FPSS market-open signal (wire code 30). Mirrors `FpssControl::MarketOpen`. Carries no payload."
columns = []

[events.MarketClose]
kind = "control"
doc = "FPSS market-close signal (wire code 32). Mirrors `FpssControl::MarketClose`. Carries no payload."
columns = []

[events.ServerError]
kind = "control"
doc = "FPSS server-error message (wire code 11). Mirrors `FpssControl::ServerError`."
columns = [
    { name = "message", type = "String" },
]

[events.Disconnected]
kind = "control"
doc = "FPSS server disconnected the client (wire code 12). Mirrors `FpssControl::Disconnected`. `reason` is the `RemoveReason` discriminant cast to `i32`; compare against `thetadatadx::RemoveReason as i32` for symbolic interpretation."
columns = [
    { name = "reason", type = "i32" },
]

[events.Reconnecting]
kind = "control"
doc = "FPSS auto-reconnect is about to attempt reconnection. Mirrors `FpssControl::Reconnecting`. Emitted before sleeping for `delay_ms` milliseconds. `attempt` is 1-based and saturates at `i32::MAX` if the reconnect loop exceeds 2^31 attempts."
columns = [
    { name = "reason",   type = "i32" },
    { name = "attempt",  type = "i32" },
    { name = "delay_ms", type = "u64" },
]

[events.Reconnected]
kind = "control"
doc = "FPSS auto-reconnect succeeded â€” connection is live again. Mirrors `FpssControl::Reconnected`. Carries no payload."
columns = []

[events.ReconnectsExhausted]
kind = "control"
doc = "FPSS auto-reconnect stopped without a user-initiated shutdown â€” terminal for the session. Mirrors `FpssControl::ReconnectsExhausted`. Emitted when the reconnect budget (attempt count or wall-clock envelope) is exhausted, a permanent disconnect reason short-circuits recovery, a manual policy declines to reconnect, or a custom policy returns no delay. `reason` is the `RemoveReason` discriminant of the final drop cast to `i32`; `attempts` is the number of consecutive reconnect attempts consumed before giving up (0 when no reconnect was attempted)."
columns = [
    { name = "reason",   type = "i32" },
    { name = "attempts", type = "i32" },
]

[events.ParseError]
kind = "control"
doc = "FPSS protocol-level parse error. Mirrors `FpssControl::Error`. Named `ParseError` on every binding so it never collides with the language's own error types (Python's exception classes, the JS global `Error`)."
columns = [
    { name = "message", type = "String" },
]

[events.UnknownFrame]
kind = "control"
doc = "FPSS server sent a frame with an unrecognised wire code. Mirrors `FpssControl::UnknownFrame`. Raw bytes preserved for diagnostics / upstream bug reports."
columns = [
    { name = "code",    type = "u8" },
    { name = "payload", type = "Vec<u8>" },
]

[events.Connected]
kind = "control"
doc = "FPSS server connection ack (wire code 4, `StreamMsgType::Connected`). Mirrors `FpssControl::Connected`. Carries no payload."
columns = []

[events.Ping]
kind = "control"
doc = "FPSS server heartbeat (wire code 10, `StreamMsgType::Ping`). Mirrors `FpssControl::Ping`. The server emits PING frames (observed 1-byte payload `[0]`) the client heartbeat logic does not have to answer; payload preserved for diagnostics."
columns = [
    { name = "payload", type = "Vec<u8>" },
]

[events.ReconnectedServer]
kind = "control"
doc = "FPSS server-side reconnect ack (wire code 13). Mirrors `FpssControl::ReconnectedServer`. Distinct from `Reconnected`, which the client emits from its auto-reconnect state machine once the new TLS session is authenticated."
columns = []

[events.Restart]
kind = "control"
doc = "FPSS server stream restart (wire code 31, `StreamMsgType::Restart`). Mirrors `FpssControl::Restart`. The server restarts the stream without dropping the TCP connection; delta decode state should be cleared on receipt."
columns = []

[events.UnknownControl]
kind = "control"
doc = "FPSS control variant the SDK does not yet recognise. Surfaced when the core crate adds a new `FpssControl::*` arm â€” keep dispatch logic forward-compatible by handling this variant. Carries no payload."
columns = []
