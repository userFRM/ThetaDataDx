# Static config accessor surface for the FFI + C++ codegen.
#
# One [[accessor]] per generated `thetadatadx_config_{set,get}_*` entry point.
# `generate_sdk_surfaces` renders the Rust fns (ffi/src/config_accessors.rs)
# and the C++ inline methods (sdks/cpp/include/config_accessors.hpp.inc) from
# this file. Divergent accessors (string, enum, Option-widened, policy-aware,
# validated) stay hand-written in ffi/src/auth.rs and thetadatadx.hpp.

[[accessor]]
symbol = "thetadatadx_config_set_reconnect_wait_ms"
kind = "set"
param = "ms"
abi_type = "u64"
path = "reconnect.wait_ms"
doc = """
Set the reconnect delay (ms) honoured for generic transient
disconnects (TimedOut, ServerRestarting, Unspecified, …). Plumbed
through to the streaming I/O loop at connect time and consumed by the
`Auto` reconnect arm via `reconnect_delay_for`. Default `250`.
"""
cpp_doc = """
Set the reconnect delay (ms) honoured for generic transient
disconnects (TimedOut, ServerRestarting, Unspecified, ...).
Default 250.
"""
py_doc = """
Set the reconnect delay (ms) honoured for generic transient
disconnects (TimedOut, ServerRestarting, Unspecified, …).
Plumbed through to the streaming I/O loop at connect time.
Default ``250``.
"""
ts_doc = """
Set the reconnect delay (ms) honoured for generic transient
disconnects (TimedOut, ServerRestarting, Unspecified, …).
Plumbed through to the streaming I/O loop at connect time.
Default `250`.

Accepts a `bigint` for parity with the other bindings, which use a 64-bit unsigned integer.
"""
py_param = "ms"
ts_param = "ms"

[[accessor]]
symbol = "thetadatadx_config_get_reconnect_wait_ms"
kind = "get"
param = "out_ms"
abi_type = "u64"
path = "reconnect.wait_ms"
out_safety = """
        // SAFETY: out_ms checked non-null at line 238; FFI contract pins
        // the `u64` storage for the call. Writing the `reconnect.wait_ms`
        // field cannot tear under a concurrent reader because the FFI
        // surface is not thread-safe on a single config handle.
"""
doc = """
Read the current reconnect `wait_ms` setting.

Writes the configured millisecond delay into `*out_ms`. Returns
`0` on success, `-1` if either pointer is null.
"""
cpp_doc = """
Current reconnect wait_ms (default 250). Returns the default on
a null config handle.
"""
py_doc = """
Current reconnect ``wait_ms`` value (default ``250``).
"""
ts_doc = """
Current reconnect `wait_ms` value (default `250`).
"""

[[accessor]]
symbol = "thetadatadx_config_set_reconnect_wait_rate_limited_ms"
kind = "set"
param = "ms"
abi_type = "u64"
path = "reconnect.wait_rate_limited_ms"
doc = """
Set the reconnect delay (ms) honoured for `TooManyRequests`
