# ─── Cross-binding error-class name divergences ───────────────────────
#
# The Rust `Error` enum surfaces through different binding-language
# idioms (no per-language "rename for cosmetics" pass):
#
#   * Rust:       `thetadatadx::Error` (single error enum).
#   * Python:     runtime class is `Error` (matches the Rust name);
#                 the `.pyi` stub shadows it as `FpssParseError`
#                 (suffix-disambiguated against the generic
#                 `Error(ThetaDataError)` exception class) to avoid the
#                 mypy duplicate-class collision. Runtime callers still
#                 catch `thetadatadx.Error`.
#   * TypeScript: napi exposes the variants as a discriminated union
#                 over the standard JS `Error` superclass — `class
#                 Error extends globalThis.Error` is the napi default.
#   * C++:        FFI surface returns `int32_t` status codes per the
#                 `tdx_last_error()` thread-local string convention; the
#                 RAII wrapper exposes them as `tdx::FpssError` to
#                 disambiguate from `std::exception`.
#
# This row is informational — the parity script's class-existence
# check skips dotted rows.

[[class]]
name = "Error.cross_binding_name_divergence"
python = true
typescript = true
cpp = true

# ─── EOD-Greek + index-price tick anchors ─────────────────────────────
#
# Two tick types model the verified-live wire shape on two endpoints
# whose v10 routing dropped server-emitted columns:
#
#   * `GreeksEodTick` (39 columns) -- `option_history_greeks_eod`.
#     Previously routed to the bare `GreeksAllTick` (28 columns),
#     losing the twelve EOD trade/quote columns (`open`, `high`,
#     `low`, `close`, `volume`, `count`, `bid_size`, `bid_exchange`,
#     `bid_condition`, `ask_size`, `ask_exchange`, `ask_condition`).
#   * `IndexPriceAtTimeTick` (10 columns) -- `index_at_time_price`.
#     Previously routed to the bare `PriceTick` (3 columns), losing
#     the seven trade-side execution columns (`sequence`,
#     `ext_condition1..4`, `condition`, `size`, `exchange`) including
#     the SIP-exchange attribution field.
#
# Both ticks are implicitly tracked by the parity script's `*Tick`
# catch-all (`scripts/check_binding_parity.py::_is_implicitly_tracked`)
# alongside every other generator-emitted tick wrapper. The rows
# below are documentation anchors so the parity matrix records the
# v11 additions; the script does not gate on dotted-name rows.

[[class]]
name = "GreeksEodTick.cross_binding_anchor"
python = true       # `thetadatadx.GreeksEodTick` pyclass + `GreeksEodTickList` + Arrow + columnar
typescript = true   # `GreeksEodTick` napi class
cpp = true          # `tdx::GreeksEodTick` alias over `TdxGreeksEodTick`

[[class]]
name = "IndexPriceAtTimeTick.cross_binding_anchor"
python = true       # `thetadatadx.IndexPriceAtTimeTick` pyclass + `IndexPriceAtTimeTickList` + Arrow + columnar
typescript = true   # `IndexPriceAtTimeTick` napi class
cpp = true          # `tdx::IndexPriceAtTimeTick` alias over `TdxIndexPriceAtTimeTick`

# ─── Rust-only MDDS / FPSS knobs (Gate 2 tightening / #595) ─────────────
#
# Pub fields on `MddsConfig` / `FpssConfig` that the binding sweep has
# not yet exposed on Python / TypeScript / C++. These are deliberately
# Rust-only today — embedders that own the runtime can mutate the
# field directly through the `DirectConfig` struct, but the
# higher-level bindings do not expose a setter. The
# `rust_only = true` flag + `issue = "#595"` citation discloses the
# tracked-work status: #595 (the Gate 2 per-field granularity
# tightening) is the umbrella issue under which the cross-binding
# sweep for these fields would be planned.
