# ─── Client construction-from-file convenience ([[from_file]]) ────────
#
# Every standalone client class exposes a one-call file-construction
# convenience: load credentials from a two-line file (line 1 = email,
# line 2 = password) and connect, defaulting to the production
# configuration. It composes `Credentials::from_file(path)` with the
# class's `connect`, named per language idiom:
#
#   python      — `<Class>.from_file(path, config=None)` staticmethod on
#                 the pyclass.
#   typescript  — `<Class>.connectFromFile(path, config?)` napi factory.
#   cpp         — `<Class>::from_file(path, config = Config::production())`
#                 static member on the C++ wrapper.
#   ffi         — the `thetadatadx_<stem>_connect_from_file(path, config)`
#                 extern "C" symbol (`client` / `historical` / `streaming`).
#
# The construction entry point is not a data method the `[[method]]`
# rows cover, and its spelling differs per binding, so without this
# family a binding could grow `from_file` on one client and silently
# omit it on another. The collector set is reconciled against these
# rows in both directions: a declared row that does not match the
# binding state fails, and a client that exposes file-construction on
# any binding without a row fails. `name` is the cross-binding client
# class identifier (the same name used by the `[[class]]` rows).

[[from_file]]
name = "Client"
python = true
typescript = true
cpp = true
ffi = true

[[from_file]]
name = "HistoricalClient"
python = true
typescript = true
cpp = true
ffi = true

[[from_file]]
name = "StreamingClient"
python = true
typescript = true
cpp = true
ffi = true

# ─── Client construction (connect) surface ([[connect]]) ──────────────
#
# The base construction entry point per standalone client: connect with
# an in-memory `Credentials` + `Config`. The spelling differs per binding
# — Python exposes a `#[new]` constructor (`Client(creds, config)`),
# TypeScript / C++ a `connect` static factory, the C ABI a
# `thetadatadx_<stem>_connect` symbol — so it cannot ride a `[[method]]`
# row. `name` is the cross-binding client class identifier. C++
# `StreamingClient` constructs through `from_file` / the RAII handle
# rather than a static `connect`, so its `cpp` column is `false` while
# the C ABI symbol and the Python / TypeScript construction all exist.
# `AsyncClient` is the Python-only async wrapper over `Client`; it has no
# C ABI / TypeScript / C++ twin, so it is gated on Python alone.

[[connect]]
name = "Client"
python = true
typescript = true
cpp = true
ffi = true

[[connect]]
name = "HistoricalClient"
python = true
typescript = true
cpp = true
ffi = true

[[connect]]
name = "StreamingClient"
python = true
typescript = true
cpp = false  # C++ constructs via `from_file` / the RAII handle, not a static `connect`
ffi = true

[[connect]]
name = "AsyncClient"
python = true
typescript = false  # Python-only async wrapper over `Client`
cpp = false
ffi = false
