# ─── Free-function (utility) parity matrix ─────────────────────────────
#
# `[[utility]]` rows pin the cross-binding presence of the offline
# analytics FREE functions — the Black-Scholes Greeks calculator. These
# are not methods on a tracked class, so the `[[method]]` rows above
# cannot express them; without these rows a binding could ship the
# calculator on three languages and silently omit the fourth (the exact
# gap this matrix closes). Every row carries:
#
#   name        — the canonical snake_case function name as declared in
#                 `crates/thetadatadx/sdk_surface.toml` (`all_greeks`,
#                 `implied_volatility`). The checker derives the
#                 per-binding spelling: Python `#[pyfunction] fn <name>`,
#                 TypeScript `#[napi(js_name = "<camelCase>")]`, C++
