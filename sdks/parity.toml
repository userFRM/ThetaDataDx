# ─── Historical buffered base surface ([[historical_base]]) ───────────
#
# Every buffered historical endpoint exposes a blocking query terminal on
# ALL FIVE surfaces. This is the core "every endpoint exists everywhere"
# guarantee — previously asserted only transitively (via the async / stream
# companions on the managed bindings) and not at all on the C-ABI base.
#
#   rust        — `HistoricalClient::<endpoint>` buffered method, generated
#                 from the registry of record (`endpoint_surface.toml`).
#   python      — `<Endpoint>Builder.list()` collect terminal.
#   typescript  — the buffered `<endpoint>` method on `HistoricalView`
#                 (itself async-returning, so the buffered and async surfaces
#                 coincide there).
#   cpp         — `Historical::<endpoint>(...)` blocking member.
#   ffi         — the `thetadatadx_<endpoint>_with_options` extern "C" base
#                 symbol, read from the SHIPPED header
#                 `sdks/cpp/include/endpoint_with_options.h.inc` so a stale
#                 regenerated header is caught.
#
# `name` is the canonical snake_case endpoint name. The Rust column is the
# source of truth: a dropped or renamed endpoint vanishes from the registry
# and every downstream surface in lockstep, and this family trips. The
# shipped header, the `ffi/src` source, and the Rust registry are
# cross-checked for agreement so a header/source/registry divergence trips
# without duplicating the broader `.so`-vs-header completeness checker
# (`scripts/ci/check_c_abi_completeness.py`).

[[historical_base]]
name = "calendar_on_date"
