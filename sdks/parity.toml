# ─── Free-function (utility) parity matrix ─────────────────────────────
#
# `[[utility]]` rows pin the cross-binding presence of the offline
# analytics FREE functions — the Black-Scholes Greeks calculator. These
# are not methods on a tracked class, so the `[[method]]` rows above
# cannot express them; without these rows a binding could ship the
# calculator on three languages and silently omit the fourth (the exact
# gap this matrix closes). Every row carries:
#
#   name        — the canonical snake_case function name as declared in
#                 `crates/thetadatadx/sdk_surface.toml` (`all_greeks`,
#                 `implied_volatility`). The checker derives the
#                 per-binding spelling: Python `#[pyfunction] fn <name>`,
#                 TypeScript `#[napi(js_name = "<camelCase>")]`, C++
#                 `<name>(` in the wrapper header, FFI `tdx_<name>`.
#   python      — `true` iff the `#[pyfunction]` is emitted on the
#                 Python surface.
#   typescript  — `true` iff the napi free function is emitted on the
#                 TypeScript surface.
#   cpp         — `true` iff the wrapper declares the function in
#                 `sdks/cpp/include/utilities.hpp.inc` (folded into the
#                 `tdx` namespace of `thetadx.hpp`).
#   ffi         — `true` iff the `tdx_<name>` C ABI symbol exists in
#                 `ffi/src/`. Every higher-level binding except Python /
#                 TypeScript (which call the Rust core directly) forwards
#                 through this symbol.
#
# All four surfaces are generated from the one `sdk_surface.toml` SSOT
# (Python / TS / C++ / MCP / CLI) over the same `thetadatadx::greeks`
# core, so they stay in lockstep by construction; the
# `generate_sdk_surfaces --check` drift gate and these rows guard a
# regression. The FFI `tdx_all_greeks` / `tdx_implied_volatility` pair is
# hand-written but covered by `check_c_abi_completeness`.

[[utility]]
name = "all_greeks"
python = true
typescript = true
cpp = true
ffi = true

[[utility]]
name = "implied_volatility"
python = true
typescript = true
cpp = true
ffi = true


# ─── Method-level parity matrix ────────────────────────────────────────
#
# `[[method]]` rows pin the per-method binding state on the load-bearing
# user-facing classes (`ThetaDataDxClient`, `FpssClient`, `Credentials`,
# `Config`). The class-level `[[class]]` rows above only record that
# the class exists in each binding; without these `[[method]]` rows a
# binding could quietly drop a public method (or fail to add a new one
# alongside its siblings) and no checker would notice. Each row carries:
#
#   class       — the canonical class name (Python pyclass / TS napi
#                 class / C++ class). For C++ alias names see
#                 `scripts/check_binding_parity.py::CPP_ALIASES`
#                 (`ThetaDataDxClient` -> `UnifiedClient`).
#   name        — the canonical method name in camelCase. The parity
#                 checker derives the snake_case form for Python +
#                 C++ matching and uses the camelCase form to match
#                 `#[napi(js_name = "...")]` declarations.
#   python      — `true` iff a `fn <snake_case>` declaration lives
#                 inside an `impl <class>` block on the Python source.
#   typescript  — `true` iff a `#[napi(js_name = "<camelCase>")]`
#                 attribute appears anywhere in `sdks/typescript/src/`.
#   cpp         — `true` iff a `<snake_case>(` member declaration
#                 appears inside the C++ class body in `thetadx.hpp`.
#
# Set a column to `false` to record a deliberate cross-binding
# asymmetry (e.g. the TS unified client deliberately exposes
# `setCallback` via the napi `startStreaming(callback)` factory rather
# than a separate method — the row captures that). Adding a method on
# one binding without flipping the matching column trips the gate;
# removing a method from a binding without updating the matrix also
# trips the gate.
#
# Scope: high-visibility user-facing classes only. Configuration
# setters (`Config.*`) remain governed by the dotted `[[class]]` rows
# above (e.g. `ReconnectConfig.wait_ms`) which already cover the
# cross-binding setter contract at the field level.

# ── ThetaDataDxClient (the unified entry-point client) ──

