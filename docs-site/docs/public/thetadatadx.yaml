openapi: 3.1.0

info:
  title: ThetaDataDx SDK
  description: |
    Canonical checked-in REST contract for the registry endpoints exposed by
    ThetaDataDx's server surface. SDK-only callback-based `*_stream` history
    builders are documented in the API reference rather than this OpenAPI file.

    ThetaDataDx also ships native Rust, Python (PyO3), and C++
    bindings backed by the same Rust core.

    All dates use YYYYMMDD format. Times use milliseconds since midnight ET.
    Intervals accept milliseconds ("60000") or shorthand ("1m"). Valid presets: 100ms, 500ms, 1s, 5s, 10s, 15s, 30s, 1m, 5m, 10m, 15m, 30m, 1h.
    All prices are f64 (double) -- decoded during parsing.
  version: 13.0.0-rc.5
  contact:
    name: ThetaDataDx
    url: https://github.com/userFRM/ThetaDataDx
  license:
    name: Apache-2.0
    url: https://github.com/userFRM/ThetaDataDx/blob/main/LICENSE

servers:
  - url: http://localhost:25503
    description: Local ThetaDataDx server (HTTP)

tags:
  - name: Stock / List
    description: Enumerate available stock symbols and dates
  - name: Stock / Snapshot
    description: Real-time stock snapshots (OHLC, trade, quote, market value)
  - name: Stock / History
    description: Historical stock data (EOD, intraday OHLC, trades, quotes)
  - name: Stock / AtTime
    description: Stock data at a specific time of day across a date range
  - name: Option / List
    description: Enumerate option symbols, dates, expirations, strikes, and contracts
  - name: Option / Snapshot
    description: Real-time option snapshots (OHLC, trade, quote, OI, market value)
  - name: Option / Snapshot Greeks
    description: Real-time option Greeks snapshots (IV, all, first/second/third order)
  - name: Option / History
    description: Historical option data (EOD, intraday OHLC, trades, quotes, OI)
  - name: Option / History Greeks
    description: Historical option Greeks (EOD, intraday, IV, first/second/third order)
  - name: Option / History Trade Greeks
    description: Greeks computed on each individual option trade
  - name: Option / AtTime
    description: Option data at a specific time of day across a date range
  - name: Index / List
    description: Enumerate available index symbols and dates
  - name: Index / Snapshot
    description: Real-time index snapshots (OHLC, price, market value)
  - name: Index / History
    description: Historical index data (EOD, intraday OHLC, price)
  - name: Index / AtTime
    description: Index data at a specific time of day across a date range
  - name: Calendar
    description: Market calendar operations (open today, date info, yearly calendar)
  - name: Interest Rate
    description: Interest rate data endpoints
  - name: System
    description: Server status and lifecycle endpoints
  - name: Flat Files
    description: Whole-universe daily flat-file downloads (CSV or JSON Lines)

# No global security requirement: the server authenticates its upstream
# connection once at startup, and request paths carry no per-request
# credential. The only route-scoped requirement is the shutdown token on
# POST /v3/system/shutdown.

# ---------------------------------------------------------------------------
# Reusable anchors for common parameter/schema objects
# ---------------------------------------------------------------------------
x-anchors:
  # --- Common parameter shapes ---
  symbol-param: &symbol-param
    name: symbol
    in: query
    required: true
    schema:
      type: string
    description: Ticker symbol (e.g. "AAPL")

  symbols-param: &symbols-param
    name: symbol
    in: query
    required: true
    schema:
      type: array
      items:
        type: string
    description: One or more ticker symbols

  start_date-param: &start_date-param
    name: start_date
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Start date in YYYYMMDD format

  end_date-param: &end_date-param
    name: end_date
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: End date in YYYYMMDD format

  date-param: &date-param
    name: date
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Date in YYYYMMDD format

  date-optional-param: &date-optional-param
    name: date
    in: query
    required: false
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Date in YYYYMMDD format (optional when using start_date/end_date)

  interval-param: &interval-param
    name: interval
    in: query
    required: true
    schema:
      type: string
    description: 'Accepts milliseconds ("60000") or shorthand ("1m"). Valid presets: 100ms, 500ms, 1s, 5s, 10s, 15s, 30s, 1m, 5m, 10m, 15m, 30m, 1h.'

  time_of_day-param: &time_of_day-param
    name: time_of_day
    in: query
    required: true
    schema:
      type: string
    description: ET wall-clock time in HH:MM:SS.SSS (e.g. "09:30:00.000" for 9:30 AM ET; legacy "34200000" is also accepted)

  venue-param: &venue-param
    name: venue
    in: query
    required: false
    schema:
      type: string
    description: Data venue (e.g. "nqb" for Nasdaq Basic)

  min_time-param: &min_time-param
    name: min_time
    in: query
    required: false
    schema:
      type: string
    description: Minimum timestamp filter

  start_time-param: &start_time-param
    name: start_time
    in: query
    required: false
    schema:
      type: string
    description: Start time in milliseconds from midnight ET

  end_time-param: &end_time-param
    name: end_time
    in: query
    required: false
    schema:
      type: string
    description: End time in milliseconds from midnight ET

  request_type-param: &request_type-param
    name: request_type
    in: query
    required: true
    schema:
      type: string
      enum: [EOD, TRADE, QUOTE, OHLC, OPEN_INTEREST]
    description: The type of data request

  expiration-param: &expiration-param
    name: expiration
    in: query
    required: true
    schema:
      type: string
      pattern: '^(\d{8}|\*)$'
    description: >-
      Option expiration date in YYYYMMDD format. Pass `*` to select all
      expirations for the underlying (chain-wide; query one date at a time).

  expiration-no-star-param: &expiration-no-star-param
    name: expiration
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: >-
      Option expiration date in YYYYMMDD format. This endpoint resolves a
      single concrete expiration and rejects the `*` wildcard.

  strike-param: &strike-param
    name: strike
    in: query
    required: true
    schema:
      type: string
    description: Strike price in dollars as a string (e.g. "500" or "17.5")

  right-param: &right-param
    name: right
    in: query
    required: true
    schema:
      type: string
      enum: [call, put, both, C, P, c, p, CALL, PUT, Call, Put, "*"]
    description: >-
      Option side. Use `both` or `*` (alias) for calls and puts. Accepts
      `call`, `put`, `both` (upstream ThetaData vocabulary; upstream default
      is `both`), plus our short-forms `C` (call), `P` (put), and `*` (alias
      for `both`) for SDK ergonomics. Matching is case-insensitive. Every
      endpoint that exposes `right` accepts the `both` / `*` wildcard.

  max_dte-param: &max_dte-param
    name: max_dte
    in: query
    required: false
    schema:
      type: integer
    description: Maximum days to expiration filter

  strike_range-param: &strike_range-param
    name: strike_range
    in: query
    required: false
    schema:
      type: integer
    description: Number of strikes above/below ATM to include

  exclusive-param: &exclusive-param
    name: exclusive
    in: query
    required: false
    schema:
      type: boolean
    description: Whether time boundaries are exclusive

  # --- Greeks optional parameters ---
  annual_dividend-param: &annual_dividend-param
    name: annual_dividend
    in: query
    required: false
    schema:
      type: number
      format: double
    description: Annual dividend amount for Greeks calculation

  rate_type-param: &rate_type-param
    name: rate_type
    in: query
    required: false
    schema:
      type: string
    description: Interest rate type for Greeks calculation

  rate_value-param: &rate_value-param
    name: rate_value
    in: query
    required: false
    schema:
      type: number
      format: double
    description: Interest rate value for Greeks calculation

  stock_price-param: &stock_price-param
    name: stock_price
    in: query
    required: false
    schema:
      type: number
      format: double
    description: Override underlying stock price for Greeks calculation

  greeks_version-param: &greeks_version-param
    name: version
    in: query
    required: false
    schema:
      type: string
    description: Greeks calculation model version

  use_market_value-param: &use_market_value-param
    name: use_market_value
    in: query
    required: false
    schema:
      type: boolean
    description: Use market value instead of midpoint for Greeks calculation

  underlyer_use_nbbo-param: &underlyer_use_nbbo-param
    name: underlyer_use_nbbo
    in: query
    required: false
    schema:
      type: boolean
    description: Use NBBO midpoint for underlying price

  # --- Common response schemas ---
  ohlc-tick: &ohlc-tick
    type: object
    properties:
      ms_of_day:
        type: integer
        description: Milliseconds since midnight ET
      open:
        type: number
        format: double
        description: Opening price (f64)
      high:
        type: number
        format: double
        description: Highest price (f64)
      low:
        type: number
        format: double
        description: Lowest price (f64)
      close:
        type: number
        format: double
        description: Closing price (f64)
      volume:
        type: integer
        format: int64
        description: Number of shares/contracts traded
      count:
        type: integer
        format: int64
        description: Number of trades
      date:
        type: integer
        description: Date as YYYYMMDD integer

  trade-tick: &trade-tick
    type: object
    properties:
      ms_of_day:
        type: integer
        description: Milliseconds since midnight ET
      sequence:
        type: integer
        description: Exchange sequence number
      size:
        type: integer
        description: Trade size in shares
      price:
        type: number
        format: double
        description: Trade price (f64)
      exchange:
        type: integer
        description: Exchange code
      condition:
        type: integer
        description: Trade condition code
      date:
        type: integer
        description: Date as YYYYMMDD integer

  quote-tick: &quote-tick
    type: object
    properties:
      ms_of_day:
        type: integer
        description: Milliseconds since midnight ET
      bid:
        type: number
        format: double
        description: Bid price (f64)
      ask:
        type: number
        format: double
        description: Ask price (f64)
      bid_size:
        type: integer
        description: Bid size
      ask_size:
        type: integer
        description: Ask size
      date:
        type: integer
        description: Date as YYYYMMDD integer

  eod-tick: &eod-tick
    type: object
    properties:
      ms_of_day:
        type: integer
      open:
        type: number
        format: double
      high:
        type: number
        format: double
      low:
        type: number
        format: double
      close:
        type: number
        format: double
      volume:
        type: integer
        format: int64
      count:
        type: integer
        format: int64
      bid:
        type: number
        format: double
      ask:
        type: number
        format: double
      bid_size:
        type: integer
      ask_size:
        type: integer
      date:
        type: integer
        description: Date as YYYYMMDD integer

  open-interest-tick: &open-interest-tick
    type: object
    properties:
      ms_of_day:
        type: integer
      open_interest:
        type: integer
      date:
        type: integer

  trade-quote-tick: &trade-quote-tick
    type: object
    description: Combined trade + quote tick (25 fields)
    properties:
      ms_of_day:
        type: integer
      sequence:
        type: integer
      size:
        type: integer
      price:
        type: number
        format: double
      exchange:
        type: integer
      condition:
        type: integer
      bid:
        type: number
        format: double
      ask:
        type: number
        format: double
      bid_size:
        type: integer
      ask_size:
        type: integer
      date:
        type: integer

  data-table: &data-table
    type: object
    description: Generic DataTable with string headers and typed cell values
    properties:
      headers:
        type: array
        items:
          type: string
      data_table:
        type: array
        items:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
              - type: number
              - type: "null"

  symbol-list: &symbol-list
    type: array
    items:
      type: string

  date-list: &date-list
    type: array
    items:
      type: string
      pattern: '^\d{8}$'

  # --- Reusable response wrappers ---
  ohlc-response: &ohlc-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *ohlc-tick

  trade-response: &trade-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *trade-tick

  quote-response: &quote-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *quote-tick

  eod-response: &eod-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *eod-tick

  trade-quote-response: &trade-quote-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *trade-quote-tick

  option-contract-response: &option-contract-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            properties:
              root:
                type: string
              expiration:
                type: string
              strike:
                type: string
              right:
                type: string
                description: >-
                  Option right as emitted by the drop-in REST/WS server.
                  Currently `"C"` (call) or `"P"` (put); no enum constraint
                  so future output formats (e.g. upstream `"CALL"`/`"PUT"`)
                  remain backward-compatible.

  data-table-response: &data-table-response
    description: Successful response
    content:
      application/json:
        schema: *data-table

  symbol-list-response: &symbol-list-response
    description: Successful response
    content:
      application/json:
        schema: *symbol-list

  date-list-response: &date-list-response
    description: Successful response
    content:
      application/json:
        schema: *date-list

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # STOCK / LIST
  # =========================================================================

  /v3/stock/list/symbols:
    x-min-subscription: free
    get:
      operationId: stockListSymbols
      summary: List all stock symbols
      description: |
        Returns all traded stock symbols. Updated overnight.
        gRPC: GetStockListSymbols
      tags: [Stock / List]
      parameters: []
      responses:
        '200': *symbol-list-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let symbols = client.historical().stock_list_symbols().await?;
        - lang: python
          label: Python
          source: |
            symbols = client.historical.stock_list_symbols()
        - lang: cpp
          label: C++
          source: |
            auto symbols = client.historical().stock_list_symbols();

  /v3/stock/list/dates:
    x-min-subscription: free
    get:
      operationId: stockListDates
      summary: List available dates for a stock
      description: |
        Lists all dates of data available for a stock by request type (EOD, TRADE, QUOTE, etc.).
        Updated overnight.
        gRPC: GetStockListDates
      tags: [Stock / List]
      parameters:
        - *request_type-param
        - *symbol-param
      responses:
        '200': *date-list-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let dates = client.historical().stock_list_dates("TRADE", "AAPL").await?;
        - lang: python
          label: Python
          source: |
            dates = client.historical.stock_list_dates("TRADE", "AAPL")
        - lang: cpp
          label: C++
          source: |
            auto dates = client.historical().stock_list_dates("TRADE", "AAPL");

  /v3/stock/list/dates/{request_type}:
    x-min-subscription: free
    get:
      operationId: stockListDatesByRequestType
      summary: List available dates for a stock (path form)
      description: |
        Path-segment form of `/v3/stock/list/dates`: the request type rides the
        URL path instead of a query parameter. Same endpoint and response; this
        is the terminal-compatible `/v3/stock/list/dates/{request_type}` spelling.
        gRPC: GetStockListDates
      tags: [Stock / List]
      parameters:
        - name: request_type
          in: path
          required: true
          schema:
            type: string
            enum: [EOD, TRADE, QUOTE, OHLC, OPEN_INTEREST]
          description: The type of data request (case-insensitive).
        - *symbol-param
      responses:
        '200': *date-list-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let dates = client.historical().stock_list_dates("TRADE", "AAPL").await?;
        - lang: python
          label: Python
          source: |
            dates = client.historical.stock_list_dates("TRADE", "AAPL")
        - lang: cpp
          label: C++
          source: |
            auto dates = client.historical().stock_list_dates("TRADE", "AAPL");

  # =========================================================================
  # STOCK / SNAPSHOT
  # =========================================================================

  /v3/stock/snapshot/ohlc:
    x-min-subscription: value
    get:
      operationId: stockSnapshotOhlc
      summary: Stock OHLC snapshot
      description: |
        Real-time Open, High, Low, Close for the current trading day.
        Returns real-time data with standard/pro subscription, 15-minute delayed with value subscription.
        Snapshot cache resets at midnight ET daily.
        gRPC: GetStockSnapshotOhlc
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *ohlc-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let ohlc = client.historical().stock_snapshot_ohlc(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            ohlc = client.historical.stock_snapshot_ohlc(["AAPL"])
        - lang: cpp
          label: C++
          source: |
            auto ohlc = client.historical().stock_snapshot_ohlc({"AAPL"});

  /v3/stock/snapshot/trade:
    x-min-subscription: standard
    get:
      operationId: stockSnapshotTrade
      summary: Stock trade snapshot
      description: |
        Real-time last trade from the Nasdaq Basic feed.
        Requires stocks standard or pro subscription.
        Snapshot cache resets at midnight ET daily.
        gRPC: GetStockSnapshotTrade
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *trade-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let trades = client.historical().stock_snapshot_trade(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            trades = client.historical.stock_snapshot_trade(["AAPL"])
        - lang: cpp
          label: C++
          source: |
            auto trades = client.historical().stock_snapshot_trade({"AAPL"});

  /v3/stock/snapshot/quote:
    x-min-subscription: value
    get:
      operationId: stockSnapshotQuote
      summary: Stock quote snapshot
      description: |
        Real-time last BBO quote from the Nasdaq Basic feed (standard/pro) or
        15-minute delayed NBBO quote from UTP/CTA feeds (value subscription).
        Snapshot cache resets at midnight ET daily.
        gRPC: GetStockSnapshotQuote
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *quote-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let quotes = client.historical().stock_snapshot_quote(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            quotes = client.historical.stock_snapshot_quote(["AAPL"])
        - lang: cpp
          label: C++
          source: |
            auto quotes = client.historical().stock_snapshot_quote({"AAPL"});

  /v3/stock/snapshot/market_value:
    x-min-subscription: standard
    get:
      operationId: stockSnapshotMarketValue
      summary: Stock market value snapshot
      description: |
        Latest market value snapshot for one or more stocks.
        gRPC: GetStockSnapshotMarketValue
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *data-table-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let mv = client.historical().stock_snapshot_market_value(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            mv = client.historical.stock_snapshot_market_value(["AAPL"])
        - lang: cpp
          label: C++
          source: |
            auto mv = client.historical().stock_snapshot_market_value({"AAPL"});

  # =========================================================================
  # STOCK / HISTORY
  # =========================================================================

  /v3/stock/history/eod:
    x-min-subscription: free
    get:
      operationId: stockHistoryEod
      summary: Stock end-of-day history
      description: |
        End-of-day stock data for a date range including OHLC + closing quote.
        gRPC: GetStockHistoryEod
      tags: [Stock / History]
      parameters:
        - *symbol-param
        - *start_date-param
        - *end_date-param
      responses:
        '200': *eod-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let eod = client.historical().stock_history_eod("AAPL", "20240101", "20240301").await?;
        - lang: python
          label: Python
          source: |
            df = client.historical.stock_history_eod("AAPL", "20240101", "20240301").to_pandas()
        - lang: cpp
          label: C++
          source: |
            auto eod = client.historical().stock_history_eod("AAPL", "20240101", "20240301");

  /v3/stock/history/ohlc:
    x-min-subscription: value
    get:
      operationId: stockHistoryOhlc
      summary: Stock intraday OHLC bars
      description: |
        Intraday OHLC bars for a single date.
        Interval accepts milliseconds ("60000") or shorthand ("1m"). Valid presets: 100ms, 500ms, 1s, 5s, 10s, 15s, 30s, 1m, 5m, 10m, 15m, 30m, 1h.
        gRPC: GetStockHistoryOhlc
      tags: [Stock / History]
      parameters:
        - *symbol-param
        - *date-param
        - *interval-param
        - *start_time-param
        - *end_time-param
        - *venue-param
      responses:
        '200': *ohlc-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let bars = client.historical().stock_history_ohlc("AAPL", "20240315", "60000").await?;
        - lang: python
          label: Python
          source: |
            bars = client.historical.stock_history_ohlc("AAPL", "20240315", "60000")
        - lang: cpp
          label: C++
          source: |
            auto bars = client.historical().stock_history_ohlc("AAPL", "20240315", "60000");

  /v3/stock/history/ohlc_range:
    x-min-subscription: value
    get:
      operationId: stockHistoryOhlcRange
      summary: Stock intraday OHLC bars across a date range
      description: |
        Intraday OHLC bars across a date range.
        Interval accepts milliseconds ("60000") or shorthand ("1m"). Valid presets: 100ms, 500ms, 1s, 5s, 10s, 15s, 30s, 1m, 5m, 10m, 15m, 30m, 1h.
        gRPC: synthetic ThetaDataDx range projection over GetStockHistoryOhlc
      tags: [Stock / History]
      parameters:
        - *symbol-param
        - *start_date-param
        - *end_date-param
        - *interval-param
        - *start_time-param
        - *end_time-param
        - *venue-param
      responses:
        '200': *ohlc-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let bars = client.historical().stock_history_ohlc_range("AAPL", "20240101", "20240301", "60000").await?;
