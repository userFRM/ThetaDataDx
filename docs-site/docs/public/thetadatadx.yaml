                    description: Streaming connection state.
                  version:
                    type: string
                    description: Running server version.
                  broadcast_dropped:
                    type: integer
                    format: int64
                    description: Total streaming events dropped on the internal handoff since startup.
                  json_serialize_failures:
                    type: integer
                    format: int64
                    description: Total streaming-event serialization failures since startup.

  /v3/system/shutdown:
    post:
      tags: [System]
      summary: Graceful server shutdown
      description: |
        Initiates a graceful shutdown of the thetadatadx server.
        Requires a valid `X-Shutdown-Token` header (a 128-bit hex token, 32
        lowercase hex characters, printed to stderr on server startup).
        Rate-limited to ~3 attempts per hour per client IP.
      security:
        - shutdownToken: []
      responses:
        '200':
          description: Shutdown initiated
        '401':
          description: Missing or invalid token
        '429':
          description: Too many attempts (rate-limited)

  # =========================================================================
  # TERMINAL (drop-in management compatibility)
  # =========================================================================
  # These routes mirror the management status paths the Theta Terminal serves,
  # so operator tooling that scrapes the terminal's mgmt surface works against
  # this server unchanged. Each returns a one-word `text/plain` body
  # (CONNECTED / DISCONNECTED) — the plain-text sibling of the JSON
  # /v3/system/{streaming,historical}/status routes above.

  /v3/terminal/streaming/status:
    get:
      operationId: terminalStreamingStatus
      tags: [Terminal]
      summary: Streaming connection status (text/plain)
      description: |
        Terminal-compatible streaming connection status as a bare `text/plain`
        body. Returns `CONNECTED` or `DISCONNECTED` — the plain-text sibling of
        the JSON `/v3/system/streaming/status` route.
      parameters: []
      responses:
        '200':
          description: Streaming connection state as a one-word plain-text body.
          content:
            text/plain:
              schema:
                type: string
                enum: [CONNECTED, DISCONNECTED]

  /v3/terminal/historical/status:
    get:
      operationId: terminalHistoricalStatus
      tags: [Terminal]
      summary: Historical connection status (text/plain)
      description: |
        Terminal-compatible historical connection status as a bare `text/plain`
        body. Returns `CONNECTED` or `DISCONNECTED` — the plain-text sibling of
        the JSON `/v3/system/historical/status` route.
      parameters: []
      responses:
        '200':
          description: Historical connection state as a one-word plain-text body.
          content:
            text/plain:
              schema:
                type: string
                enum: [CONNECTED, DISCONNECTED]

  # =========================================================================
  # FLAT FILES
  # =========================================================================

  /v3/flatfile/{sec_type}/{req_type}:
    get:
      operationId: flatfileGet
      tags: [Flat Files]
      summary: Download a daily flat file (path form)
      description: |
        Downloads a whole-universe daily flat file for one security type and
        request type. The `sec_type` and `req_type` path segments are matched
        case-insensitively. The response body is the file bytes, streamed as an
        attachment. Only these pairs are served (any other pairing returns 400):
        `option/trade_quote`, `option/open_interest`, `option/eod`,
        `stock/trade_quote`, `stock/eod`, `index/eod`. The path form takes the
        parameters independently, so an unserved pairing (for example
        `stock/open_interest`) is accepted by the route but rejected at request
        time with 400; the body form constrains the served pairs in the schema
        itself.
      parameters:
        - name: sec_type
          in: path
          required: true
          schema:
            type: string
            enum: [option, stock, index]
          description: Security type (case-insensitive).
        - name: req_type
          in: path
          required: true
          schema:
            type: string
            enum: [trade_quote, open_interest, eod]
          description: |
            Request type (case-insensitive). `open_interest` is served for
            `option` only; `index` serves `eod` only.
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Trading date in YYYYMMDD format.
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv, jsonl]
            default: csv
          description: On-disk format. Defaults to csv.
      responses:
        '200':
          description: |
            Flat-file bytes streamed as an attachment. Content type is
            `text/csv` for csv or `application/x-ndjson` for jsonl.
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400':
          description: Unknown security type, request type, format, or date, or an unserved pair.
        '502':
          description: The flat-file distribution is unavailable upstream.

  /v3/{sec_type}/flat_file/{req_type}:
    get:
      operationId: flatfileGetBySecType
      tags: [Flat Files]
      summary: Download a daily flat file (sec_type/flat_file/req_type path form)
      description: |
        Terminal-compatible spelling of `/v3/flatfile/{sec_type}/{req_type}`:
        the security type leads the path and `flat_file` separates it from the
        request type. Same handler, parameters, and response as the other path
        form. The `sec_type` and `req_type` segments are matched
        case-insensitively. The response body is the file bytes, streamed as an
        attachment. Only these pairs are served (any other pairing returns 400):
        `option/trade_quote`, `option/open_interest`, `option/eod`,
        `stock/trade_quote`, `stock/eod`, `index/eod`. The path form takes the
        parameters independently, so an unserved pairing (for example
        `stock/open_interest`) is accepted by the route but rejected at request
        time with 400.
      parameters:
        - name: sec_type
          in: path
          required: true
          schema:
            type: string
            enum: [option, stock, index]
          description: Security type (case-insensitive).
        - name: req_type
          in: path
          required: true
          schema:
            type: string
            enum: [trade_quote, open_interest, eod]
          description: |
            Request type (case-insensitive). `open_interest` is served for
            `option` only; `index` serves `eod` only.
        - name: date
          in: query
          required: true
          schema:
            type: string
          description: Trading date in YYYYMMDD format.
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv, jsonl]
            default: csv
          description: On-disk format. Defaults to csv.
      responses:
        '200':
          description: |
            Flat-file bytes streamed as an attachment. Content type is
            `text/csv` for csv or `application/x-ndjson` for jsonl.
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400':
          description: Unknown security type, request type, format, or date, or an unserved pair.
        '502':
          description: The flat-file distribution is unavailable upstream.

  /v3/flatfile/request:
    post:
      operationId: flatfileRequest
      tags: [Flat Files]
      summary: Download a daily flat file (body form)
      description: |
        Downloads a whole-universe daily flat file described by a JSON body.
        The `sec_type` and `req_type` fields are matched case-insensitively.
        The response body is the file bytes, streamed as an attachment. A
        security-type / request-type pair the flat-file distribution does not
        serve returns 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sec_type, req_type, date]
              description: |
                Only the served security-type / request-type pairs validate.
                The `oneOf` branches constrain `req_type` to the request types
                served for each `sec_type`: `option` serves `trade_quote`,
                `open_interest`, and `eod`; `stock` serves `trade_quote` and
                `eod`; `index` serves `eod`. The `sec_type` and `req_type`
                fields are matched case-insensitively.
              properties:
                date:
                  type: string
                  description: Trading date in YYYYMMDD format.
                format:
                  type: string
                  enum: [csv, jsonl]
                  default: csv
                  description: On-disk format. Defaults to csv.
              oneOf:
                - title: option
                  required: [sec_type, req_type]
                  properties:
                    sec_type:
                      type: string
                      enum: [option]
                      description: Security type (case-insensitive).
                    req_type:
                      type: string
                      enum: [trade_quote, open_interest, eod]
                      description: Request type served for option flat files.
                - title: stock
                  required: [sec_type, req_type]
                  properties:
                    sec_type:
                      type: string
                      enum: [stock]
                      description: Security type (case-insensitive).
                    req_type:
                      type: string
                      enum: [trade_quote, eod]
                      description: Request type served for stock flat files.
                - title: index
                  required: [sec_type, req_type]
                  properties:
                    sec_type:
                      type: string
                      enum: [index]
                      description: Security type (case-insensitive).
                    req_type:
                      type: string
                      enum: [eod]
                      description: Request type served for index flat files.
      responses:
        '200':
          description: |
            Flat-file bytes streamed as an attachment. Content type is
            `text/csv` for csv or `application/x-ndjson` for jsonl.
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400':
          description: Unknown security type, request type, format, or date, or an unserved pair.
        '502':
          description: The flat-file distribution is unavailable upstream.

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    shutdownToken:
      type: apiKey
      in: header
      name: X-Shutdown-Token
      description: |
        A 128-bit hex token (32 lowercase hex characters) printed to stderr on
        server startup. Required on the `/v3/system/shutdown` POST endpoint.
        Rate-limited to ~3 attempts per hour per client IP. See
        `tools/server/README.md`.

  schemas:
    OhlcTick: *ohlc-tick
    TradeTick: *trade-tick
    QuoteTick: *quote-tick
    EodTick: *eod-tick
    OpenInterestTick: *open-interest-tick
    TradeQuoteTick: *trade-quote-tick
    DataTable: *data-table

    ContractSpec:
      type: object
      description: Option contract specification
      required: [symbol, expiration]
      properties:
        symbol:
          type: string
          description: Underlying symbol (e.g. "SPY")
        expiration:
          type: string
          description: Expiration date in YYYYMMDD format
        strike:
          type: string
          description: Strike price in dollars as a string
        right:
          type: string
          enum: [C, P]
          description: '"C" for call, "P" for put'

    Price:
      type: number
      format: double
      description: All prices are decoded to f64 (double) during parsing.

    StreamEventKind:
      type: string
      description: |
        Discriminator for streaming event variants. This is a literal-union
        string, not a TypeScript `const enum`, so the type information
        stays self-contained under `isolatedModules: true` and works
        in every toolchain (Vite, esbuild, ts-jest, Next.js).
      enum:
        - ohlcvc
        - open_interest
        - quote
        - trade
        - simple
        - raw_data

    StreamEvent:
      type: object
      description: Real-time streaming event
      oneOf:
        - type: object
          description: Quote tick (best bid/ask update)
          properties:
            kind:
              type: string
              enum: [quote]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            bid:
              type: number
              format: double
            ask:
              type: number
              format: double
            bid_size:
              type: integer
            ask_size:
              type: integer
            bid_exchange:
              type: integer
            ask_exchange:
              type: integer
            date:
              type: integer
            received_at_ns:
              type: integer
              format: int64
              description: Nanosecond monotonic receipt timestamp
        - type: object
          description: Trade tick
          properties:
            kind:
              type: string
              enum: [trade]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            sequence:
              type: integer
            price:
              type: number
              format: double
            size:
              type: integer
            exchange:
              type: integer
            condition:
              type: integer
            date:
              type: integer
            received_at_ns:
              type: integer
              format: int64
              description: Nanosecond monotonic receipt timestamp
        - type: object
          description: Open interest tick
          properties:
            kind:
              type: string
              enum: [open_interest]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            open_interest:
              type: integer
            date:
              type: integer
            received_at_ns:
              type: integer
              format: int64
              description: Nanosecond monotonic receipt timestamp
        - type: object
          description: |
            OHLCVC bar (open/high/low/close + volume + count).
            Volume and count are `i64`.
          properties:
            kind:
              type: string
              enum: [ohlcvc]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            open:
              type: number
              format: double
            high:
              type: number
              format: double
            low:
              type: number
              format: double
            close:
              type: number
              format: double
            volume:
              type: integer
              format: int64
            count:
              type: integer
              format: int64
            date:
              type: integer
            received_at_ns:
              type: integer
              format: int64
              description: Nanosecond monotonic receipt timestamp
        - type: object
          description: |
            Control / diagnostic event (streaming lifecycle). SDKs flatten
            every `StreamControl` variant into a single `Simple` pyclass / TS
            object with `kind: "simple"` and an `event_type` discriminator.
            Use `event_type` to branch on the concrete variant; `detail` is
            a free-form diagnostic string; `id` is the contract_id / req_id
            / reconnect-attempt number where applicable.
          properties:
            kind:
              type: string
              enum: [simple]
              description: Top-level variant discriminator — always "simple" for control events.
            event_type:
              type: string
              enum:
                - login_success
                - contract_assigned
                - req_response
                - market_open
                - market_close
                - server_error
                - disconnected
                - reconnecting
                - reconnected
                - error
                - unknown_frame
                - unknown_event
              description: Concrete control-event name.
            detail:
              type: string
              nullable: true
              description: Free-form diagnostic payload; `null` for variants with no payload.
            id:
              type: integer
              format: int32
              nullable: true
              description: contract_id / req_id / reconnect attempt number (variant-specific).
            received_at_ns:
              type: integer
              format: int64
              description: Nanosecond monotonic receipt timestamp
        - type: object
          description: |
            Raw (non-decoded) streaming payload. `payload` is a base64-encoded
            copy of the original bytes (escape-hatch for forward-compat /
            debugging; SDKs should prefer decoded variants above).
          properties:
            kind:
              type: string
              enum: [raw_data]
            code:
              type: integer
              format: int32
              minimum: 0
              maximum: 255
              description: Wire byte code (0-255). Original streaming protocol uses unsigned 8-bit.
            payload:
              type: string
              description: Base64-encoded raw bytes
            received_at_ns:
              type: integer
              format: int64
              description: Nanosecond monotonic receipt timestamp

    Error:
      type: object
      properties:
        code:
          type: string
          enum: [Auth, Http, Grpc, NoData]
        message:
          type: string

  parameters:
    symbol:
      <<: *symbol-param
    symbols:
      <<: *symbols-param
    start_date:
      <<: *start_date-param
    end_date:
      <<: *end_date-param
    date:
      <<: *date-param
    interval:
      <<: *interval-param
    time_of_day:
      <<: *time_of_day-param
    venue:
      <<: *venue-param
    min_time:
      <<: *min_time-param
    request_type:
      <<: *request_type-param
    expiration:
      <<: *expiration-param
    strike:
      <<: *strike-param
    right:
      <<: *right-param
    max_dte:
      <<: *max_dte-param
    strike_range:
      <<: *strike_range-param
