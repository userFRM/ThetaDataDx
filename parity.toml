# ─── Arrow-IPC terminals on history results ───────────────────────────
#
# Every binding exposes the columnar Arrow exit in the two forms the core
# `TicksArrowExt` pair defines:
#
#   * Full schema (every column the tick type defines) — `TicksArrowExt::to_arrow`,
#     the hand-built-rows path a caller assembled itself, which never touched a
#     wire so every column is present: Python `<TickName>List.to_arrow()` on a
#     hand-built list, TypeScript `<tick>ToArrowIpc(rows)`, C++
#     `thetadatadx::<collection>_to_arrow_ipc(std::vector<Tick>)` over
#     `thetadatadx_<collection>_to_arrow_ipc`.
#
#   * Decode-fed projected (only the columns the response's wire carried, plus
#     the optional broadcast `symbol`) — `TicksArrowExt::to_arrow_projected`,
#     the terminal-exact path. Every binding surfaces the response's own
#     `ColumnPresence` from a live query so the projection is drivable without
#     hand-supplying the header list: Python's `<TickName>List.to_arrow()` on a
#     decoded list auto-projects from the presence the list carries; the C ABI /
#     C++ buffered `_with_options` entry points return the present columns
#     through the `ColumnPresence` out-param; TypeScript's `<endpoint>WithColumns`
#     method returns `{ rows, presentColumns, symbol? }`. The caller then hands
#     `presentColumns` plus the optional `symbol` to
#     `<tick>ToArrowIpcProjected(rows, presentColumns, symbol?)` /
#     `thetadatadx_<tick>_to_arrow_ipc_projected`. The projected `RecordBatch` is
#     identical; the only difference is where the presence is carried (on the
#     Python result, the C/C++ out-param, or the TypeScript return object).
#
# All surfaces are generated from `tick_schema.toml` and funnel through the one
# `TicksArrowExt::to_arrow` / `to_arrow_projected` + Arrow IPC `StreamWriter`
# path; the `generate_sdk_surfaces --check` drift gate and the
# `check_c_abi_completeness` header/symbol parity gate guard a regression. The
# per-tick serializer free functions are not methods on a tracked class, so they
# are not expressible as `[[method]]` / `[[value_field]]` rows. The TypeScript
# `<endpoint>WithColumns` reachability (a presence-carrying variant per columnar
# buffered endpoint) is machine-enforced by the check_binding_parity
# `withColumns` reachability gate, mirroring the C/C++ `_with_options` presence
# out-param — this note records the rest of the contract the drift gates enforce.


# ─── Market-data server-stream surface ([[market_data_streaming]]) ──────
#
# Every buffered market-data endpoint has a server-stream companion: the
# core `request.stream(handler)` primitive surfaced as a per-binding
# terminal that pumps each decoded gRPC chunk through a callback with
# memory bounded to a single chunk, never the full result. The terminal
# is named per language idiom:
#
#   python      — `.stream(handler)` + `.stream_async(handler)` on the
#                 `<Endpoint>Builder` pyclass.
#   typescript  — `<endpoint>Stream(...args, options, callback)` on the
#                 `Client` napi class.
#   cpp         — `<endpoint>_stream(...args, callback, options)` on the
#                 C++ `Client` wrapper.
#   ffi         — the `thetadatadx_<endpoint>_stream(...)` extern "C" symbol.
#
# These terminals live on per-endpoint builders / as endpoint-named
# methods, NOT on a class the `[[method]]` rows cover, so without this
# family a binding could ship streaming on some endpoints and silently
# omit it on others (or on a whole binding) with no checker noticing.
# The collector set is reconciled against these rows in both directions:
# a declared row that does not match the binding state fails, and an
# endpoint that streams on any binding without a row fails. `name` is the
# canonical snake_case endpoint name (initialisms collapse: the codegen
# emits `stockHistoryEODStream` in TS and `StockHistoryEodBuilder` in
