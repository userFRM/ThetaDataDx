# ─── C-ABI streaming-batch / borrowed-handle externs ───────────────────
#
# A small family of `extern "C"` symbols underpins the columnar streaming
# reader, the flat-file Arrow bridge, and the borrowed market-data handle.
# They are not endpoint (`_with_options` / `_stream`) symbols, config
# accessors, or utilities, so no other family tracks them — a `[[ffi_symbol]]`
# row pins each one's existence so it cannot be removed (breaking the C++
# RecordBatchStream / FlatFileRowList wrappers) without tripping the gate.
# The `name` is the bare symbol with the `thetadatadx_` prefix stripped; the
# checker re-derives the full `thetadatadx_<name>` extern when matching
# `thetadatadx-ffi/src/**`. The reverse FFI-orphan scan additionally guarantees no
# C-ABI symbol ships without belonging to some enrolled family.
#
# Each of these eight hand-written symbols carries an optional
# `[ffi_symbol.signature]` pinning its C param list + return: the extern's
# declared signature is extracted and compared on the `ffi` lang, where the
# opaque handle pointers (`*const ThetaDataDxClient`) and owned-struct returns
# (`ThetaDataDxArrowBytes`) compare by exact C-ABI spelling. The
# macro-generated per-tick `*_to_arrow_ipc` terminals below carry NO signature:
# they are emitted from one `tick_array_to_arrow_ipc!` macro, so their shape is
# identical by construction — the name-only row already pins their existence.
[[ffi_symbol]]
name = "client_batches_open"
[ffi_symbol.signature]
params = ["*const ThetaDataDxClient", "usize", "u64", "i32", "usize"]
returns = "*mut ThetaDataDxRecordBatchStream"

[[ffi_symbol]]
name = "client_market_data"
[ffi_symbol.signature]
params = ["*const ThetaDataDxClient"]
returns = "*const ThetaDataDxMarketDataClient"

[[ffi_symbol]]
name = "record_batch_stream_next_ipc"
[ffi_symbol.signature]
params = ["*const ThetaDataDxRecordBatchStream", "*mut ThetaDataDxArrowBytes"]
returns = "i32"

[[ffi_symbol]]
name = "record_batch_stream_schema_ipc"
[ffi_symbol.signature]
params = ["*const ThetaDataDxRecordBatchStream", "*mut ThetaDataDxArrowBytes"]
returns = "i32"

[[ffi_symbol]]
name = "record_batch_stream_dropped"
[ffi_symbol.signature]
params = ["*const ThetaDataDxRecordBatchStream"]
returns = "u64"

[[ffi_symbol]]
name = "record_batch_stream_close"
[ffi_symbol.signature]
params = ["*const ThetaDataDxRecordBatchStream"]
returns = "()"

[[ffi_symbol]]
name = "record_batch_stream_free"
[ffi_symbol.signature]
params = ["*mut ThetaDataDxRecordBatchStream"]
returns = "()"

[[ffi_symbol]]
name = "flatfile_rows_to_arrow_ipc"
[ffi_symbol.signature]
params = ["*const ThetaDataDxFlatFileRowList"]
returns = "ThetaDataDxFlatFileBytes"

# Flat files from the standalone market-data client. Flat files are pure
