# those columns — the C++ equivalent of Python's `<TickName>List.to_arrow()` on a
# decode result. Both families are macro-emitted in `thetadatadx-ffi/src/types.rs`
# alongside the all-present `*_to_arrow_ipc` family, share the
# `ThetaDataDxColumnPresence` carrier (freed by `thetadatadx_column_presence_free`),
# and are bound by name in the generated C++ `tick_arrow_ipc.hpp.inc`. Name-only
# rows pin each so a rename/removal trips before it breaks arrow-cpp consumers.
