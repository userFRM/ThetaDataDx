# ─── Method-level parity matrix ────────────────────────────────────────
#
# `[[method]]` rows pin the per-method binding state on the load-bearing
# user-facing classes (`Client`, `StreamingClient`, `Credentials`,
# `Config`). The class-level `[[class]]` rows above only record that
# the class exists in each binding; without these `[[method]]` rows a
# binding could quietly drop a public method (or fail to add a new one
# alongside its siblings) and no checker would notice. Each row carries:
#
#   class       — the canonical class name (Python pyclass / TS napi
#                 class / C++ class). For C++ alias names see
#                 `scripts/ci/check_binding_parity.py::CPP_ALIASES`
#                 (e.g. `Contract` -> `FluentContract`).
#   name        — the canonical method name in camelCase. The parity
#                 checker derives the snake_case form for Python +
#                 C++ matching and uses the camelCase form to match
#                 `#[napi(js_name = "...")]` declarations.
#   python      — `true` iff a `fn <snake_case>` declaration lives
#                 inside an `impl <class>` block on the Python source.
#   typescript  — `true` iff a `#[napi(js_name = "<camelCase>")]`
#                 attribute appears anywhere in `thetadatadx-ts/src/`.
#   cpp         — `true` iff a `<snake_case>(` member declaration
#                 appears inside the C++ class body in `thetadatadx.hpp`.
#
# Set a column to `false` to record a deliberate cross-binding
# asymmetry (e.g. the TS unified client deliberately exposes
# `setCallback` via the napi `startStreaming(callback)` factory rather
# than a separate method — the row captures that). Adding a method on
# one binding without flipping the matching column trips the gate;
# removing a method from a binding without updating the matrix also
# trips the gate.
#
# Scope: high-visibility user-facing classes only. Configuration
# setters (`Config.*`) remain governed by the dotted `[[class]]` rows
# above (e.g. `ReconnectConfig.wait_ms`) which already cover the
# cross-binding setter contract at the field level.

# ── Client (the unified entry-point client) ──
#
# The unified `Client` exposes its data surfaces through three view
# accessors — `marketData`, `stream`, and `flatFiles` — each returning a
# cheap handle clone over the inner client. They are symmetric across
# Python (`#[getter]`), TypeScript (`#[napi(getter)]`), C++ (a member
# accessor), and Rust (`Client::flat_files()` returning a borrowed
# `FlatFiles` view), and the reverse-orphan scan below fails if any
# binding drops or renames one without the matrix recording it. The
# `flatFiles` row carries the Rust column so the Rust core accessor is
# machine-checked alongside the other three; `marketData` / `stream`
# stay on the existing three-binding columns.

[[method]]
class = "Client"
name = "marketData"
python = true
typescript = true
cpp = true
rust = true         # `Client::market_data()` view accessor
# Zero-arg accessor; the returned market-data view IS the cross-binding
# contract (a rename / drop of the view trips the gate).
[method.signature]
returns = "MarketDataView"

[[method]]
class = "Client"
name = "stream"
python = true
typescript = true
cpp = true
rust = true         # `Client::stream()` view accessor
[method.signature]
returns = "StreamView"

[[method]]
class = "Client"
name = "flatFiles"
python = true
typescript = true
cpp = true
rust = true         # `Client::flat_files()` view accessor
[method.signature]
returns = "FlatFilesNamespace"

# The standalone market-data client exposes the same accessor: flat files are
# account-authenticated market data with no streaming leg, so a market-data-only
# handle reaches them without the unified client. Genuinely enforced on every
# binding so a future drop/rename of the accessor trips the gate. Python is the
# explicit `#[getter] flat_files` on the `MarketDataClient` pyclass (a static
# accessor, not the `__getattr__` forward, so the collector sees it); TypeScript
# is the napi `flatFiles` getter on `MarketDataClient`; C++ and Rust are the
# `MarketDataClient::flat_files()` view accessor (Rust harvested from
# `impl MarketDataClient` in `mdds/client.rs`).
[[method]]
class = "MarketDataClient"
name = "flatFiles"
python = true
typescript = true
cpp = true
rust = true         # `MarketDataClient::flat_files()` view accessor
[method.signature]
returns = "FlatFilesNamespace"

# Deterministic base-client teardown (issue #1069). `close()` stops streaming
# if live and releases the client; the language context-manager / RAII wrappers
# (`__exit__`/`[Symbol.dispose]`/destructor) route through it. The
# context-manager dunders themselves (`__enter__`/`__exit__`/`__aenter__`/
# `__aexit__`, `[Symbol.dispose]`/`[Symbol.asyncDispose]`) are exempt from the
# parity matrix by the collectors' lifecycle-dunder filter, so only the
# cross-binding `close` verb carries a row.
[[method]]
class = "Client"
name = "close"
python = true       # `Client.close()` + `with` / `async with` context manager
typescript = true   # napi `close(): void` + `[Symbol.dispose]` / `[Symbol.asyncDispose]`
cpp = true          # `Client::close()` (explicit form of the RAII destructor)
rust = true         # `Client::close()`
[method.signature]
returns = "()"

# Market-data-only sibling of `Client.close`. The market-data surface never opens
# streaming, so this releases the gRPC channel pool with no drain; present on
# every binding so the base/market-data lifecycle is uniform.
[[method]]
class = "MarketDataClient"
name = "close"
python = true       # `MarketDataClient.close()` + `with` / `async with` context manager
typescript = true   # napi `close(): void` + `[Symbol.dispose]` / `[Symbol.asyncDispose]`
cpp = true          # `MarketDataClient::close()` (explicit form of the RAII destructor)
rust = true         # `MarketDataClient::close()`
[method.signature]
returns = "()"

# Context-managed streaming session opener. A managed-binding ergonomic that
# pairs `start_streaming` with a scope-exit `stop_streaming` + drain barrier:
# Python `with client.streaming(cb) as session:` and TypeScript
# `await using session = await client.streaming(cb)`. C++ and Rust express the
# same lifecycle through idiomatic scope-bound resource management (the C++
# `Client` RAII destructor; Rust scoped streaming APIs) rather than a named
# `streaming(...)` factory, so the helper is intentionally Python + TypeScript
# only. The TypeScript side lives on the package-entry wrapper
# (`streaming-session.{js,d.ts}`), which the method collector reads alongside
# the napi `impl` blocks.
[[method]]
class = "Client"
name = "streaming"
python = true       # `with client.streaming(callback) as session:` context manager
typescript = true   # `await using session = await client.streaming(callback)` wrapper
cpp = false         # C++ uses the `Client` RAII destructor, no `streaming()` factory
rust = false        # Rust uses scoped streaming APIs, no `streaming()` factory
# Per-event callback in, context-managed session out. The TypeScript session
# is the hand-written `.d.ts` wrapper with no napi `fn`, so `ts_napi` is
# skipped (mirroring `startStreaming`); the `.d.ts` shape is cross-checked.
[method.signature]
params = ["Callback"]
returns = "StreamingSession"
skip_langs = ["ts_napi"]

# ── Inline client construction (first-class API-key entry points) ──
#
# The fluent builder is the headline ergonomic for selecting the API key
# (or email + password) and the target environment inline at the client.
# Each binding reaches all options through its idiomatic shape, so the
# canonical name differs per binding and the columns are NOT uniformly
# `true`:
#
#   - Rust + C++ expose a fluent `Client::builder()` / `Client::builder`
#     returning a `ClientBuilder`, so the `builder` row carries the `rust`
#     and `cpp` columns.
#   - TypeScript exposes the options-object factory `Client.connectWith({
#     apiKey, marketDataType, ... })` — the idiomatic JS shape — tracked by the
#     `connectWith` row.
#   - Python reaches the same surface through the `Client(api_key=...,
#     market_data_type=...)` constructor kwargs (a keyword constructor, not a
#     named method), so it rides the existing `__new__` constructor rather
#     than a `[[method]]` row; both `builder` and `connectWith` are
#     therefore absent on the Python column.
#
# The forward check pins each binding's symbol exactly and trips if the
# named entry is dropped from the binding that owns it, or appears on a
# binding the row marks absent.

[[method]]
class = "Client"
name = "builder"
python = false      # Python uses the `Client(api_key=...)` constructor kwargs
typescript = false  # TypeScript uses the `connectWith` options-object factory
cpp = true          # `Client::builder()` fluent builder
rust = true         # `Client::builder()` fluent builder
# Zero-arg fluent entry; the returned `ClientBuilder` is the contract.
[method.signature]
returns = "ClientBuilder"

[[method]]
class = "Client"
name = "connectWith"
python = false      # Python uses the `Client(api_key=...)` constructor kwargs
typescript = true   # `Client.connectWith({ apiKey, marketDataType, ... })` napi factory
cpp = false         # C++ uses the `Client::builder()` fluent builder
rust = false        # Rust uses the `Client::builder()` fluent builder
# TypeScript-only inline factory: options object in, connected `Client` out.
# The other bindings reach the surface through their own inline entry points
# (tracked by `builder` / the constructor), so the row pins TypeScript alone.
[method.signature]
params = ["ClientConnectOptions"]
returns = "Client"

# Two Rust-core ergonomic conveniences carry no binding twin by design,
# so they are intentional asymmetries rather than parity gaps:
#
#   - `Client::connect_with_api_key(key, config)` is thin sugar over
#     `Client::builder().api_key(key).config(config).connect()` for the
#     single most common inline shape. Every binding already reaches the
#     same surface through its idiomatic inline entry point (the Python
#     `Client(api_key=...)` constructor kwargs, the TypeScript
#     `Client.connectWith({ apiKey })` factory, the C++ `Client::builder()`
#     fluent builder), so a fourth named twin would be redundant.
#   - `Config::with_dotenv(path)` is the builder companion to
#     `Config::from_dotenv`: it layers the same `.env`-sourced cluster
#     selection onto an existing config instead of starting from the
#     production preset. The bindings expose the `from_dotenv` factory
#     (the `fromDotenv` rows above); the layer-onto-existing variant stays
#     a Rust convenience because the binding callers build the config in
#     one expression rather than mutating a receiver.
#
# Both are pure sugar over surfaces already at full cross-binding parity,
# so they are deliberately not enrolled as rows (a binding twin is not
# expected and their absence is not a gap).

