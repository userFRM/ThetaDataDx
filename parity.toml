# Cross-binding parity matrix (Gate 2 / issue #545).
#
# Every user-facing class registered on Python is declared here with
# its current state in TypeScript (napi) and C++ (`thetadatadx.hpp`).
# `scripts/ci/check_binding_parity.py` parses this file and compares the
# actual binding state of each SDK to the declared state; mismatches
# fail CI.
#
# When you intentionally ship a binding asymmetry (e.g. you land a
# Python pyclass first and TS/C++ are tracked separately), update the
# row here. When you intend to keep the three bindings in lockstep,
# every row should be `true` in every column and CI will block any
# Python-only PR that forgets to update TS / C++.

[[class]]
name = "Credentials"
python = true
typescript = true   # `Credentials` napi class: `new Credentials(email, password)` / `Credentials.fromFile(path)`, passed to `connect(creds, config?)`
cpp = true

[[class]]
name = "Config"
python = true
typescript = true   # exposed as `Config` napi class with `production() / dev() / stage()` factories
cpp = true


[[class]]
name = "Client"
python = true
typescript = true
cpp = true          # exposed as `thetadatadx::Client` (unified); `thetadatadx::MarketDataClient` is the market-data-only sibling

[[class]]
name = "AsyncClient"
python = true
typescript = false  # JS has no separate async client: the single Client's data-fetch methods each return a Promise resolved off the execution thread (the idiomatic JS shape), so an explicit async-twin class is redundant
cpp = false         # not yet ported — issue #545 follow-up

[[class]]
name = "StreamingClient"
python = true
typescript = true   # standalone FPSS-only napi class over `thetadatadx::fpss::StreamingClient`
cpp = true

[[class]]
