# core as `FlatFiles::to_path` on the `Client::flat_files()` view. A single row
# pins all four; the per-binding home-class + name override below routes the
# canonical row to each binding's actual symbol so the divergence reads as
# convention, not drift, and a drop on any binding trips the gate.
