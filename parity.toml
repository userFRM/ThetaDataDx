# ─── Free-function (utility) parity matrix ─────────────────────────────
#
# `[[utility]]` rows pin the cross-binding presence of the standalone
# utility FREE functions — the conditions / exchange / calendar / sequence
# lookups and the strike / timestamp converters. These are not methods on
# a tracked class, so the `[[method]]` rows above cannot express them;
# without these rows a binding could ship a helper on three languages and
# silently omit the fourth (the exact gap this matrix closes). Every row
# carries:
#
#   name        — the canonical snake_case function name as declared in
#                 `thetadatadx-rs/sdk_surface.toml`. The checker derives the
#                 per-binding spelling: Python `#[pyfunction] fn <name>`,
#                 TypeScript `#[napi(js_name = "<camelCase>")]`, C++
#                 `<name>(` in the wrapper header, FFI `thetadatadx_<name>`.
#   python      — `true` iff the `#[pyfunction]` is emitted on the
#                 Python surface.
#   typescript  — `true` iff the napi free function is emitted on the
#                 TypeScript surface.
#   cpp         — `true` iff the wrapper declares the function in the C++
#                 `thetadatadx` namespace of `thetadatadx.hpp`.
#   ffi         — `true` iff the `thetadatadx_<name>` C ABI symbol exists in
#                 `thetadatadx-ffi/src/`. Every higher-level binding except Python /
#                 TypeScript (which call the Rust core directly) forwards
#                 through this symbol.
#
# These surfaces are generated from the one `sdk_surface.toml` SSOT, so
# they stay in lockstep by construction; the `generate_sdk_surfaces
# --check` drift gate and these rows guard a regression.

# Conditions / exchange / calendar / sequence lookups. Exposed as the
# `thetadatadx.util` submodule (Python), the `Util` namespace class
# (TypeScript: `Util.conditionName(...)`), the `thetadatadx::util` namespace plus
# the `thetadatadx::calendar_status_name` / `thetadatadx::timestamp_ms` free functions
# (C++), and bare `thetadatadx_*` symbols (the C ABI). The four predicate helpers
# carry a disambiguating prefix on the C ABI symbol (`thetadatadx_condition_is_cancel`
# vs the bare `is_cancel` the managed bindings expose, so the quote-condition
# predicate of the same shape stays distinct); the `ffi_name` field records
# the bare C-symbol name for those rows. All present on every binding.

[[utility]]
name = "condition_name"
python = true
typescript = true
cpp = true
ffi = true

[[utility]]
name = "condition_description"
python = true
typescript = true
cpp = true
ffi = true

[[utility]]
name = "is_cancel"
ffi_name = "condition_is_cancel"
python = true
typescript = true
cpp = true
ffi = true

[[utility]]
