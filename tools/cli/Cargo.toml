[package]
name = "thetadatadx-cli"
version = "7.3.1"
edition = "2021"
description = "CLI for ThetaDataDx — query ThetaData from your terminal"
license = "Apache-2.0"
# Internal CLI — never published to crates.io. Only `tdbe` and
# `thetadatadx` are published (see publish-crate job in ci.yml).
publish = false

[[bin]]
name = "tdx"
path = "src/main.rs"

[dependencies]
thetadatadx = { path = "../../crates/thetadatadx" }
tdbe = { version = "0.10.0", path = "../../crates/tdbe" }
clap = { version = "4.6.1", features = ["derive"] }
tokio = { version = "1.52.1", features = ["rt-multi-thread", "macros"] }
sonic-rs = "0.5.8"
comfy-table = "7.2.2"
