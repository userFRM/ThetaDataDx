# Declarative non-endpoint SDK/tool surface specification.
#
# endpoint_surface.toml remains the SSOT for validated request/response
# endpoints backed by the upstream proto. This file covers the remaining
# non-endpoint projections:
#   - FPSS/unified public methods
#   - offline utility functions
#   - CLI/MCP utility commands and tools
#   - small C++ lifecycle wrappers
#
# This spec now declares the public method set, parameter lists, target
# projections, and user-facing docs. build_support/sdk_surface/ is only the
# renderer: it maps semantic kinds below onto language-specific code templates.

version = 2

[[methods]]
name = "start_streaming"
kind = "start_streaming"
doc = "Start streaming and register a callback for incoming events. Each typed streaming event is delivered to the callback off the network thread; the binding owns the dispatcher and the callback runs under a panic boundary."
targets = ["python_unified", "typescript_napi"]

[[methods]]
name = "is_streaming"
kind = "is_streaming"
doc = "Whether the streaming connection is active."
targets = ["python_unified", "typescript_napi"]

[[methods]]
name = "batches"
kind = "batches"
doc = "Open a pull-based columnar reader over the live stream, a sibling to the per-event callback. Returns a reader of Apache Arrow record batches under a fixed schema; the same subscriptions feed it. Tune batch_size, linger, and backpressure on the returned builder/reader."
# C++ is intentionally absent: its `batches()` is hand-written on the `Stream`
# class (the same hand-written class as `set_callback`), not the generated
# `StreamingClient` the cpp_fpss target feeds. C++ parity is tracked directly.
targets = ["python_unified", "typescript_napi"]

#  — typed subscribe_* / unsubscribe_* methods deleted.
# The polymorphic `subscribe(Subscription)` / `subscribe_many([...])` /
# `unsubscribe(Subscription)` / `unsubscribe_many([...])` paths are
# implemented directly on the unified client surface in each binding
# (Python: `thetadatadx-py/src/lib.rs`, TypeScript: `thetadatadx-ts/src/lib.rs`,
# C++: `thetadatadx-cpp/include/thetadatadx.hpp`). The fluent `Contract` /
# `Subscription` / `SecType` value types are exposed through
# language-native modules (`fluent.rs` for Python and TypeScript,
# `thetadatadx.hpp` for C++).

[[methods]]
name = "active_subscriptions"
kind = "active_subscriptions"
doc = "Get a snapshot of currently active subscriptions."
targets = ["python_unified", "typescript_napi", "cpp_fpss"]

[[methods]]
name = "reconnect"
kind = "reconnect"
doc = "Reconnect streaming and re-subscribe all previous subscriptions."
targets = ["python_unified", "typescript_napi", "cpp_fpss"]

[[methods]]
name = "stop_streaming"
kind = "stop_streaming"
doc = """Stop streaming while keeping the historical client usable.

Clears the registered callback. To resume streaming, start streaming again with a freshly bound callback -- reconnect will fail because no callback is held. See the reconnect docs for the rationale: the callback is released at the same scope boundary the application observes, so a stopped session never retains a captured reference past a teardown the caller has already seen."""
targets = ["python_unified", "typescript_napi"]

[[methods]]
name = "shutdown"
kind = "shutdown"
doc = """Shut down the streaming connection.

On the Python and TypeScript bindings, this clears the registered callback (same explicit-handoff semantics as stopping the stream); reconnect will then fail until the caller starts streaming again with a freshly bound callback. The C++ binding preserves the underlying connection's behaviour."""
targets = ["python_unified", "typescript_napi", "cpp_fpss"]

[[methods]]
name = "await_drain"
kind = "await_drain"
doc = "Block until the previous streaming session's consumer thread has finished firing the registered callback. Returns true if the drain completed within the timeout, false otherwise."
targets = ["python_unified", "typescript_napi"]
params = [{ name = "timeout_ms", type = "u64", doc = "Maximum time to wait, in milliseconds." }]

[[methods]]
name = "is_authenticated"
kind = "is_authenticated"
doc = "Return true if the streaming client is currently authenticated."
targets = ["cpp_fpss"]

[[methods]]
name = "connect"
kind = "fpss_connect"
doc = "Connect to streaming servers. Throws on failure."
targets = ["cpp_fpss"]
params = [
  { name = "creds", type = "credentials_ref", doc = "Credentials handle." },
  { name = "config", type = "config_ref", doc = "Configuration handle." },
]

[[methods]]
name = "from_file"
kind = "fpss_connect_from_file"
doc = "Connect to streaming servers, loading credentials from a file (line 1 = email, line 2 = password), defaulting to the production configuration. Throws on failure."
targets = ["cpp_fpss"]
params = [{ name = "path", type = "string", doc = "Path to the credentials file." }]

[[methods]]
name = "credentials_from_file"
kind = "credentials_from_file"
doc = "Load credentials from a file. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the credentials file." }]

[[methods]]
name = "credentials_from_email"
kind = "credentials_from_email"
doc = "Construct credentials from email and password. Throws on failure."
targets = ["cpp_lifecycle"]
params = [
  { name = "email", type = "string", doc = "Account email." },
  { name = "password", type = "string", doc = "Account password." },
]

[[methods]]
name = "credentials_from_api_key"
kind = "credentials_from_api_key"
doc = "Authenticate with an API key instead of an email and password. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "api_key", type = "string", doc = "API key, held as secret material." }]

[[methods]]
name = "credentials_from_api_key_with_email"
kind = "credentials_from_api_key_with_email"
doc = "Authenticate with an API key paired with an account email. Throws on failure."
targets = ["cpp_lifecycle"]
params = [
  { name = "email", type = "string", doc = "Account email." },
  { name = "api_key", type = "string", doc = "API key, held as secret material." },
]

[[methods]]
name = "credentials_from_env"
kind = "credentials_from_env"
doc = "Source credentials strictly from the THETADATA_API_KEY environment variable. An unset or whitespace-only value is an error; there is no creds.txt fallback. Throws on failure."
targets = ["cpp_lifecycle"]

[[methods]]
name = "credentials_from_env_or_file"
kind = "credentials_from_env_or_file"
doc = "Source credentials from the environment, falling back to a file. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the fallback credentials file." }]

[[methods]]
name = "credentials_from_dotenv"
kind = "credentials_from_dotenv"
doc = "Source credentials from a .env-format file. THETADATA_API_KEY selects an API key; otherwise THETADATA_EMAIL + THETADATA_PASSWORD build email + password credentials. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the .env file." }]

[[methods]]
name = "config_production"
kind = "config_constructor"
doc = "Create the production configuration."
targets = ["cpp_lifecycle"]
config_variant = "production"

[[methods]]
name = "config_dev"
kind = "config_constructor"
doc = "Create the dev replay configuration."
targets = ["cpp_lifecycle"]
config_variant = "dev"

[[methods]]
name = "config_stage"
kind = "config_constructor"
doc = "Create the staging configuration."
targets = ["cpp_lifecycle"]
config_variant = "stage"

[[methods]]
name = "config_from_dotenv"
kind = "config_from_dotenv"
doc = "Source a configuration from a .env-format file. THETADATA_MARKET_DATA_TYPE (PROD/STAGE) selects the environment; THETADATA_MARKET_DATA_HOST / THETADATA_STREAMING_HOST override the hosts. The same .env can also carry THETADATA_API_KEY for the credential. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the .env file." }]

[[methods]]
name = "client_connect"
kind = "client_connect"
doc = "Connect the unified client. Throws on failure."
targets = ["cpp_lifecycle"]
params = [
  { name = "creds", type = "credentials_ref", doc = "Credentials handle." },
  { name = "config", type = "config_ref", doc = "Configuration handle." },
]

[[methods]]
name = "mdds_client_from_file"
kind = "client_connect_from_file"
doc = "Connect the historical client, loading credentials from a file. Throws on failure."
targets = ["cpp_lifecycle"]
params = [{ name = "path", type = "string", doc = "Path to the credentials file." }]

[[utilities]]
name = "ping"
kind = "ping"
doc = "Check MCP server status."
mcp_description = "Check MCP server status. Returns uptime and connection info without hitting ThetaData servers."
targets = ["mcp"]

# ── Cross-language lookup-table helpers ──────────────────────────────────
#
# The `thetadatadx.util` Python submodule and the TypeScript `Util` class.
# Ten share a single `forwarder` shape (one-line forward into a
# `thetadatadx::utils::*` lookup); four carry a dedicated kind because
# their bodies are non-trivial (calendar map, epoch conversion, wire-range
# sequence re-encoding). Python emits free `#[pyfunction]`s + the
# `util` submodule; TypeScript emits `Util` static methods. All pinned in
# `parity.toml`. C++ / C ABI keep their own hand-written paths.

[[utilities]]
name = "condition_name"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::condition_name"
forward_return = "str"
doc = "Symbolic name for a trade `condition` code (e.g. `0` -> `\"REGULAR\"`).\nReturns `\"UNKNOWN\"` for codes outside the table."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Trade condition code." }]

[[utilities]]
name = "condition_description"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::condition_description"
forward_return = "str"
doc = "Human-readable description for a trade `condition` code."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Trade condition code." }]

[[utilities]]
name = "is_cancel"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::is_cancel"
forward_return = "bool"
doc = "Whether a trade `condition` code marks a trade cancellation."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Trade condition code." }]

[[utilities]]
name = "updates_volume"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::updates_volume"
forward_return = "bool"
doc = "Whether a trade with this `condition` code contributes to the\nrunning session volume."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Trade condition code." }]

[[utilities]]
name = "quote_condition_name"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::quote_condition_name"
forward_return = "str"
doc = "Symbolic name for a quote `condition` code."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Quote condition code." }]

[[utilities]]
name = "quote_condition_description"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::quote_condition_description"
forward_return = "str"
doc = "Human-readable description for a quote `condition` code."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Quote condition code." }]

[[utilities]]
name = "is_firm"
kind = "forwarder"
forward_call = "thetadatadx::utils::conditions::is_firm"
forward_return = "bool"
doc = "Whether a quote `condition` code marks a firm (binding) quote."
