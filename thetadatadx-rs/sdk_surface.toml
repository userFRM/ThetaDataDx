[[utilities]]
name = "exchange_name"
kind = "forwarder"
forward_call = "thetadatadx::utils::exchange::exchange_name"
forward_return = "str"
doc = "Symbolic name for an `exchange` code (e.g. `3` ->\n`\"NewYorkStockExchange\"`)."
targets = ["python", "typescript"]
params = [{ name = "code", type = "i32", doc = "Exchange code." }]

[[utilities]]
name = "exchange_symbol"
kind = "forwarder"
forward_call = "thetadatadx::utils::exchange::exchange_symbol"
forward_return = "str"
doc = "Short ticker-tape symbol for an `exchange` code (e.g. `3` ->\n`\"NYSE\"`)."
