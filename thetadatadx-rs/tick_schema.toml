# Tick Type Schema -- single source of truth for all DataTable column schemas
# AND every per-language binding name a renderer needs to emit code for that
# tick type.
#
# build.rs reads this file and generates:
#   - DataTable parsers              -> $OUT_DIR/decode_generated.rs
#   - per-language SDK surfaces      -> thetadatadx-{py,ts,cpp}/...
#                                       (driven entirely by [types.X.render])
#
# Column types:
#   i32     -> row_number(row, i)                         default: 0
#   i64     -> row_number_i64(row, i)                     default: 0
#   f64     -> row_price_f64(row, i) (accepts Price|Number)  default: 0.0
#   String  -> row_text(row, i)                           default: ""
#   price   -> decode to f64 via Price::new(raw, pt).to_f64()
#   right   -> option right as a logical char: wire Number (ASCII 67/80)
#              or Text ("CALL"/"C"/"PUT"/"P") -> 'C' / 'P'. Rust char,
#              Python/TS string ("C"/"P"), C ABI 4-byte Unicode scalar.
#   bool    -> logical boolean: wire Number 0/1 -> bool   default: false
#   calendar_status -> vendor calendar day type: wire Text ("open"/
#              "early_close"/"full_close"/"weekend") or Number 0-3 ->
#              tdbe CalendarStatus enum (repr(i32)); Python/TS string.
#   eod_num -> EOD numeric/time field: Price/Number direct, Timestamp -> ms_of_day
#   eod_num64 -> EOD numeric widened to i64 (for volume/count); Price/Number direct, Timestamp -> ms_of_day
#   eod_date -> EOD date field: Price/Number direct, Timestamp -> YYYYMMDD
#   eod_price -> EOD price fields: decode to f64 at parse time
#
# Parser options:
#   required = ["col1", "col2"]  -- headers that must exist or parser returns empty vec
#   eod_style = true  -- use eod_num helper (handles both Price and Number cells)
#
# Struct options:
#   copy = true/false   -- whether to derive Copy (false when String fields exist)
#   align = 64          -- repr(C, align(N)); omit for no repr attribute
#   doc = "..."         -- doc comment on the struct
#   contract_id = true  -- inject expiration/strike/right fields
#                          (populated by server on wildcard queries, 0 otherwise)
#
# Render block (per-language binding names):
#   collection            -- wire-collection plural (e.g. "GreeksTicks") matched
#                            by `endpoint_surface.toml::returns`. Must be unique.
#   direct                -- Rust direct-client tick type
#   parser                -- generated parser fn name (matches `parser` above)
#   ffi_array             -- FFI array struct (e.g. "ThetaDataDxGreeksAllTickArray")
#   ffi_output_variant    -- thetadatadx::EndpointOutput variant name
#   ffi_from_vec_array    -- FFI array struct used in ThetaDataDx*::from_vec calls
#   ffi_free_fn           -- C-side free fn name (without C. prefix)
#   cpp_value             -- C++ value type name
#   python_pyclass_list   -- Python pyclass-list converter (PyTickList)
#   python_vec_to_pylist  -- Python Vec<Tick> -> Py<PyList> fast-path converter
#   python_slice_arrow    -- Python slice-arrow Arrow C Data converter
#   ts_class              -- TypeScript napi-rs class name
#   ts_class_vec          -- TypeScript class-vec converter fn
#   pyclass               -- Python pyclass struct name (typically same as type_name)

# ─────────────────────────────────────────────────────────────────────────────
# Existing 4 tick types (hand-written before, now generated)
# ─────────────────────────────────────────────────────────────────────────────

[types.TradeTick]
doc = "Trade tick -- 15 fields. Core unit of trade data."
copy = true
align = 64
contract_id = true
parser = "parse_trade_ticks"
required = ["ms_of_day", "price"]
columns = [
    { name = "ms_of_day",       field = "ms_of_day",       type = "i32", doc = "Milliseconds since midnight Eastern Time." },
    { name = "sequence",        field = "sequence",        type = "i32", doc = "Exchange-assigned trade sequence number." },
    { name = "ext_condition1",  field = "ext_condition1",  type = "i32", doc = "Additional trade condition code." },
    { name = "ext_condition2",  field = "ext_condition2",  type = "i32", doc = "Additional trade condition code." },
    { name = "ext_condition3",  field = "ext_condition3",  type = "i32", doc = "Additional trade condition code." },
    { name = "ext_condition4",  field = "ext_condition4",  type = "i32", doc = "Additional trade condition code." },
    { name = "condition",       field = "condition",       type = "i32", doc = "Trade condition code." },
    { name = "size",            field = "size",            type = "i32", doc = "Number of contracts or shares traded." },
    { name = "exchange",        field = "exchange",        type = "i32", doc = "Exchange code where the trade executed." },
    { name = "price",           field = "price",           type = "price", doc = "Trade price." },
    { name = "condition_flags", field = "condition_flags", type = "i32", doc = "Trade condition flags bitmap." },
    { name = "price_flags",     field = "price_flags",     type = "i32", doc = "Trade price flags bitmap." },
    { name = "volume_type",     field = "volume_type",     type = "i32", doc = "Volume reporting mode: 0 = incremental, 1 = cumulative." },
    { name = "records_back",    field = "records_back",    type = "i32", doc = "Offset of this record behind the most recent record." },
    { name = "date",            field = "date",            type = "i32", doc = "Trading date as a YYYYMMDD integer." },
]
# Boolean flag-word accessors decoded from the integer condition / flag
# columns, mirroring the hand-written Rust `impl TradeTick` helpers in
# `thetadatadx-rs/src/tdbe/types/tick.rs`. Projected into Python (computed
# property), TypeScript (precomputed object field), and C++ (free
# function) so a caller never hand-decodes `condition_flags` /
# `price_flags`. The literal operands match `thetadatadx-rs/src/tdbe/flags.rs`.
flag_accessors = [
    { name = "is_cancelled",             field = "condition",       kind = "range_inclusive", lo = 40, hi = 44, doc = "True when the trade carries a cancelled-trade condition (codes 40-44)." },
    { name = "trade_condition_no_last",  field = "condition_flags", kind = "bit_set",         value = 1,        doc = "True when the trade condition flags set the 'no last' bit (this trade must not update the last price)." },
    { name = "price_condition_set_last", field = "price_flags",     kind = "bit_set",         value = 1,        doc = "True when the price flags set the 'set last' bit (this trade sets the last price)." },
    { name = "is_incremental_volume",    field = "volume_type",     kind = "eq",              value = 0,        doc = "True when volume is reported incrementally (each trade adds to the daily total) rather than cumulatively." },
    { name = "regular_trading_hours",    field = "ms_of_day",       kind = "range_inclusive", lo = 34200000, hi = 57600000, doc = "True when the trade occurred during regular trading hours (9:30 AM - 4:00 PM ET)." },
    { name = "is_seller",                field = "ext_condition1",  kind = "eq",              value = 12,       doc = "True when the trade is seller-initiated (ext_condition1 == 12)." },
]

[types.TradeTick.render]
collection = "TradeTicks"
direct = "TradeTick"
parser = "parse_trade_ticks"
ffi_array = "ThetaDataDxTradeTickArray"
ffi_output_variant = "TradeTicks"
ffi_from_vec_array = "ThetaDataDxTradeTickArray"
ffi_free_fn = "thetadatadx_trade_tick_array_free"
cpp_value = "TradeTick"
python_pyclass_list = "trade_ticks_to_pyclass_list"
python_vec_to_pylist = "trade_ticks_vec_to_pylist"
python_slice_arrow = "slice_arrow::trade_tick_slice_to_arrow_table"
ts_class = "TradeTick"
ts_class_vec = "trade_ticks_to_class_vec"
pyclass = "TradeTick"

[types.QuoteTick]
doc = """Quote tick -- 10 fields. NBBO quote data.

Wire layout: the full shape is 11 columns (`ms_of_day`,
`bid_size`, `bid_exchange`, `bid`, `bid_condition`, `ask_size`,
`ask_exchange`, `ask`, `ask_condition`, `price_type`, `date`).
The four exchange / condition columns are NOT in the `required` list
below, so when the wire omits them the generated parser skips their
column pass and the `0` seed stands; this lets the decoder accept
subset NBBO layouts (e.g. the
6-field `[ms_of_day, bid_size, bid, ask_size, ask, date]` shape some
storage tiers emit) without erroring, while still decoding the full
11-field shape bit-exact when every column is present."""
copy = true
align = 64
contract_id = true
parser = "parse_quote_ticks"
required = ["ms_of_day", "bid", "ask"]
columns = [
    { name = "ms_of_day",     field = "ms_of_day",     type = "i32", doc = "Milliseconds since midnight Eastern Time." },
    { name = "bid_size",      field = "bid_size",      type = "i32", doc = "Last NBBO bid size." },
    { name = "bid_exchange",  field = "bid_exchange",  type = "i32", doc = "Exchange code of the NBBO bid." },
    { name = "bid",           field = "bid",           type = "price", doc = "Last NBBO bid price." },
    { name = "bid_condition", field = "bid_condition", type = "i32", doc = "Quote condition code on the bid side." },
    { name = "ask_size",      field = "ask_size",      type = "i32", doc = "Last NBBO ask size." },
    { name = "ask_exchange",  field = "ask_exchange",  type = "i32", doc = "Exchange code of the NBBO ask." },
    { name = "ask",           field = "ask",           type = "price", doc = "Last NBBO ask price." },
    { name = "ask_condition", field = "ask_condition", type = "i32", doc = "Quote condition code on the ask side." },
    { name = "date",          field = "date",          type = "i32", doc = "Trading date as a YYYYMMDD integer." },
]

[types.QuoteTick.render]
collection = "QuoteTicks"
direct = "QuoteTick"
parser = "parse_quote_ticks"
ffi_array = "ThetaDataDxQuoteTickArray"
ffi_output_variant = "QuoteTicks"
ffi_from_vec_array = "ThetaDataDxQuoteTickArray"
ffi_free_fn = "thetadatadx_quote_tick_array_free"
