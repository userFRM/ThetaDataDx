[types.EodTick]
doc = """End-of-day tick -- 17 fields. Full EOD snapshot with OHLC + quote.

The two time columns carry the vendor's v3 field semantics under their
v3 names: `created` is when the EOD report was generated (~17:15 ET,
NOT a trade time) and `last_trade` is the time of the day's final
trade. On a day with no trades the report zero-fills the trade-derived
columns: `open` / `high` / `low` / `close` are `0.0` and
`last_trade_ms_of_day` is `0`; the quote-side columns still carry the
closing NBBO snapshot."""
copy = true
align = 64
contract_id = true
parser = "parse_eod_ticks"
eod_style = true
required = ["created"]
columns = [
    { name = "created",       field = "created_ms_of_day",    type = "eod_num", doc = "EOD report creation time (NOT a trade time), milliseconds since midnight ET." },
    { name = "last_trade",    field = "last_trade_ms_of_day", type = "eod_num", doc = "Time of the day's last trade, milliseconds since midnight ET. 0 when no trades printed that day." },
    { name = "open",          field = "open",          type = "eod_price", doc = "Opening trade price. 0.0 when no trades printed that day." },
    { name = "high",          field = "high",          type = "eod_price", doc = "Highest traded price. 0.0 when no trades printed that day." },
    { name = "low",           field = "low",           type = "eod_price", doc = "Lowest traded price. 0.0 when no trades printed that day." },
    { name = "close",         field = "close",         type = "eod_price", doc = "Closing traded price. 0.0 when no trades printed that day." },
    { name = "volume",        field = "volume",        type = "eod_num64", doc = "Number of contracts or shares traded." },
    { name = "count",         field = "count",         type = "eod_num64", doc = "Number of trades." },
    { name = "bid_size",      field = "bid_size",      type = "eod_num", doc = "Last NBBO bid size." },
    { name = "bid_exchange",  field = "bid_exchange",  type = "eod_num", doc = "Exchange code of the NBBO bid." },
    { name = "bid",           field = "bid",           type = "eod_price", doc = "Last NBBO bid price." },
    { name = "bid_condition", field = "bid_condition", type = "eod_num", doc = "Quote condition code on the bid side." },
    { name = "ask_size",      field = "ask_size",      type = "eod_num", doc = "Last NBBO ask size." },
    { name = "ask_exchange",  field = "ask_exchange",  type = "eod_num", doc = "Exchange code of the NBBO ask." },
    { name = "ask",           field = "ask",           type = "eod_price", doc = "Last NBBO ask price." },
    { name = "ask_condition", field = "ask_condition", type = "eod_num", doc = "Quote condition code on the ask side." },
    { name = "date",          field = "date",          type = "eod_date", doc = "Trading date as a YYYYMMDD integer." },
]

[types.EodTick.render]
collection = "EodTicks"
direct = "EodTick"
parser = "parse_eod_ticks"
ffi_array = "ThetaDataDxEodTickArray"
ffi_output_variant = "EodTicks"
ffi_from_vec_array = "ThetaDataDxEodTickArray"
ffi_free_fn = "thetadatadx_eod_tick_array_free"
