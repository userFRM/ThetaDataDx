[types.OhlcTick]
doc = """OHLC tick -- 9 fields. Aggregated bar data including SIP-rule VWAP.

`stock_history_ohlc`, `option_history_ohlc`, and `index_history_ohlc`
emit the same 8 data columns (`timestamp,open,high,low,close,
volume,count,vwap`). The snapshot variants (`*_snapshot_ohlc`) omit
`vwap`; the generated parser's optional-column path defaults the
field to `0.0` for those endpoints, mirroring how `volume`/`count`
already zero-default on quote-only intraday bars.
"""
copy = true
align = 64
contract_id = true
parser = "parse_ohlc_ticks"
required = ["ms_of_day", "open"]
columns = [
    { name = "ms_of_day",  field = "ms_of_day",  type = "i32", doc = "Opening time of the bar, milliseconds since midnight ET." },
    { name = "open",       field = "open",        type = "price", doc = "Opening trade price." },
    { name = "high",       field = "high",        type = "price", doc = "Highest traded price." },
    { name = "low",        field = "low",         type = "price", doc = "Lowest traded price." },
    { name = "close",      field = "close",       type = "price", doc = "Closing traded price." },
    { name = "volume",     field = "volume",      type = "i64", doc = "Number of contracts or shares traded." },
    { name = "count",      field = "count",       type = "i64", doc = "Number of trades." },
    { name = "vwap",       field = "vwap",        type = "price", doc = "Volume-weighted average price of the session." },
    { name = "date",       field = "date",        type = "i32", doc = "Trading date as a YYYYMMDD integer." },
]

[types.OhlcTick.render]
collection = "OhlcTicks"
