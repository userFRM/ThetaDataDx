[types.GreeksAllTick]
doc = """
Full union Greeks tick -- every Greek the v3 server publishes on the
`option_*_greeks_all` and `option_*_greeks_eod` endpoints.

The vendor's per-order endpoints (`option_*_greeks_first_order`,
`_second_order`, `_third_order`) emit strict subsets of these columns
and bind to `GreeksFirstOrderTick`, `GreeksSecondOrderTick`,
`GreeksThirdOrderTick` respectively. `option_*_greeks_implied_volatility`
binds to `IvTick`.

The wire-level `timestamp` -> `ms_of_day`, `underlying_timestamp` ->
`underlying_ms_of_day`, and `implied_vol` -> `implied_volatility`
mappings are applied through `HEADER_ALIASES` in
`thetadatadx-rs/src/decode.rs`.
"""
copy = true
align = 64
contract_id = true
parser = "parse_greeks_all_ticks"
required = ["ms_of_day"]
columns = [
    { name = "ms_of_day",            field = "ms_of_day",            type = "i32", doc = "Milliseconds since midnight Eastern Time." },
    { name = "bid",                  field = "bid",                  type = "price", doc = "Last NBBO bid price." },
    { name = "ask",                  field = "ask",                  type = "price", doc = "Last NBBO ask price." },
    { name = "implied_volatility",   field = "implied_volatility",   type = "f64", doc = "Implied volatility solved from the option price." },
    { name = "delta",                field = "delta",                type = "f64", doc = "Sensitivity of the option value to a one-dollar move in the underlying." },
    { name = "gamma",                field = "gamma",                type = "f64", doc = "Rate of change of delta with respect to the underlying price." },
    { name = "theta",                field = "theta",                type = "f64", doc = "Sensitivity of the option value to the passage of time." },
    { name = "vega",                 field = "vega",                 type = "f64", doc = "Sensitivity of the option value to a change in implied volatility." },
    { name = "rho",                  field = "rho",                  type = "f64", doc = "Sensitivity of the option value to the risk-free rate." },
