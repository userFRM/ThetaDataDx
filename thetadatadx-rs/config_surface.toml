rate-limited disconnects. Default ``130_000`` (matches the
JVM terminal's 130 s rate-limit cooldown).
"""
ts_doc = """
Set the reconnect delay (ms) honoured for `TooManyRequests`
rate-limited disconnects. Default `130_000`.
"""
py_param = "ms"
ts_param = "ms"

