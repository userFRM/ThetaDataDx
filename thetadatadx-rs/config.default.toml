# thetadatadx default configuration
#
# Copy this file to `config.toml` and edit as needed.
# All time values are in milliseconds unless noted otherwise.

# ── Historical Data (gRPC) ───────────────────────────────────────────────────
# Historical data is served via gRPC over TLS (not raw TCP).

[market_data]
host = "mdds-01.thetadata.us"
port = 443
tls = true

# gRPC keepalive
keepalive_time_secs = 30
keepalive_timeout_secs = 10

# Max inbound gRPC message size (bytes). Default 4MB. This is the canonical
# size knob. The MB-denominated [grpc] max_message_size_mb below, when set,
# overrides this value; leave it unset to keep this byte value in force.
max_message_size = 4194304

# Bulk-fetch sharding policy for large history pulls. "auto" (default) splits
# a big pull into balanced concurrent sub-requests across your tier's request
# budget; "off" runs every query as a single stream in the server's own row
# and chunk order. Case-insensitive.
# bulk_fetch = "auto"

# Fan-out cap for bulk_fetch = "auto". Absent (default) uses the account's
# full concurrent-request budget; set a smaller number to reserve capacity.
# An explicit 0 is floored to 1.
# shard_concurrency = 4

# ── Real-Time Streaming (TLS/TCP) ────────────────────────────────────────────
# The client tries each host in order until one connects.

[streaming]
# Production servers (New Jersey datacenter)
hosts = [
    "nj-a.thetadata.us:20000",
    "nj-a.thetadata.us:20001",
    "nj-b.thetadata.us:20000",
    "nj-b.thetadata.us:20001",
]

# Connection timeout per server attempt (ms)
connect_timeout = 2000

# Read timeout — how long to wait for data before the link is considered
# dead (ms). Matches the terminal's streaming socket read timeout and rides
# through the brief silence right after a full-market subscribe while the
# server sets the subscription up. The ~100 ms cadence is the client's ping
# to the server, not an inbound heartbeat; inbound frames arrive ~250 ms.
read_timeout = 10000

# Client outbound ping interval (ms). Matches the terminal's pinger (a fixed
# 100 ms period after a 2 s warm-up). The ping also flushes queued outbound
# control frames, so this interval bounds subscribe / unsubscribe latency.
# Reverse-direction liveness is the inbound frame stream, which read_timeout
# guards.
ping_interval = 100

# Initial reconnect wait after an involuntary disconnect (ms). The auto-
# reconnect driver doubles this per consecutive attempt up to its cap, then
# applies jitter so a fleet does not reconnect in lockstep.
reconnect_wait = 250

# Reconnect wait after TooManyRequests (ms). ThetaData enforces rate limits.
reconnect_wait_rate_limited = 130000

# Event ring buffer size # VOCAB-OK: internal config knob (events). Must be a power of two and
# >= 64. Larger rings absorb more burst traffic but use more memory.
# Increase if stream events are being dropped (see `dropped_event_count`).
ring_size = 131072

# CPU core to pin the streaming consumer thread to. -1 (default) leaves
# it unpinned; set a core index to reduce scheduler jitter on a busy box.
consumer_cpu = -1

# How the streaming consumer waits when no events are ready.
#   "spin"     (default) adaptive: short spin then a yield ramp, never sleeps.
#   "busyspin" pure spin, no yield, never sleeps. Lowest jitter; pin a core.
#   "park"     spin/yield ramp then sleep(park_interval_us). Low, fixed CPU.
#   "backoff"  spins while events flow, sleeps(park_interval_us) once idle,
#              then resumes spinning — low latency active, low CPU idle.
# NOTE: "spin" and "busyspin" both hold ~100% of one core and differ only in
# jitter. Only "park" and "backoff" lower idle CPU. "backoff" is the
# hands-free choice for a 24/7 consumer.
wait_mode = "spin"

# Park/backoff idle sleep length in MICROSECONDS; only used when wait_mode is
# "park" or "backoff". Default 1000 (= 1 ms). Worst-case added delivery latency
# per parked event. The OS timer honors sleeps down to ~50us (below that,
# kernel timer slack dominates, so 50 is the floor); a 100us park is a valid
# low-latency option (a few percent of a core in live premarket, well under
# the ~100% a spin holds; a shorter interval wakes more and costs a bit more
# than the 1ms default, for ~150us wake latency). The client pings every ~100ms, so parking beyond
# ~100ms (100000us) saves no extra CPU and only adds latency/backlog.
# Validated [50, 1000000].
park_interval_us = 1000

# ── Credentials ──────────────────────────────────────────────────────────────
# Credentials are loaded separately from this file, via the credential API
# (Credentials::from_file("creds.txt") or Credentials::new(email, password))
# passed to the client constructor. They are not part of this tuning config.

# ── Environment selection ────────────────────────────────────────────────────
# The market-data and streaming channels are selected independently via
# environment variables, each PROD by default:
#   THETADATA_MARKET_DATA_TYPE = "prod" | "stage"  — market-data cluster + auth marker
#   THETADATA_STREAMING_TYPE  = "prod" | "dev"    — streaming cluster only
# There is no streaming staging cluster; market-data staging leaves streaming on
# production. `stage` (market-data) is less stable than production and reboots
# often.

# ── Alternate Server Regions ─────────────────────────────────────────────────
# Dev streaming servers (frequent reboots, replays historical data). Selected
# with THETADATA_STREAMING_TYPE=dev; uncomment to pin the dev hosts in this file.
# [streaming]
# hosts = [
#     "nj-a.thetadata.us:20200",
#     "test-server.thetadata.us:20200",
#     "test-server.thetadata.us:20201",
# ]
