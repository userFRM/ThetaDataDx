# Wire shape captured from the live server:
#   curl http://127.0.0.1:25503/v3/option/history/greeks/eod?\
#     symbol=SPY&expiration=20240621&start_date=20240614&end_date=20240614
# Synthesised into a single-row `proto::ResponseData` by the
# `build_eod_greeks_fixtures` example so the parser regression test
# can round-trip the exact 43-column wire shape without a live
# terminal. The header list, row count, and first-row values are
# pinned against captured CSV row 1 verbatim. An earlier `GreeksAllTick`
# routing dropped the twelve EOD trade/quote columns (`open`,
# `high`, `low`, `close`, `volume`, `count`, `bid_size`,
# `bid_exchange`, `bid_condition`, `ask_size`, `ask_exchange`,
# `ask_condition`); the current schema restores the full.

endpoint = "option_history_greeks_eod"
tick_type = "GreeksEodTick"
expected_rows = 1
expected_headers = [
    "symbol", "expiration", "strike", "right",
    "timestamp", "open", "high", "low", "close", "volume", "count",
    "bid_size", "bid_exchange", "bid", "bid_condition",
    "ask_size", "ask_exchange", "ask", "ask_condition",
    "delta", "theta", "vega", "rho", "epsilon", "lambda",
    "gamma", "vanna", "charm", "vomma", "veta", "vera",
    "speed", "zomma", "color", "ultima",
    "d1", "d2", "dual_delta", "dual_gamma",
    "implied_vol", "iv_error",
    "underlying_timestamp", "underlying_price",
]

# 16:11:12.295 EDT on 2024-06-14 = (16-0) * 3_600_000 + 11 * 60_000 +
#   12 * 1_000 + 295 = 58_272_295 ms past 00:00 New York. The wire
# `Timestamp` is converted to ms-of-day by `row_number`'s timestamp arm.
first_row_ms_of_day = 58272295
first_row_expiration = 20240621
first_row_strike = 500.0
first_row_right = 67  # ASCII 'C'

# Twelve EOD trade/quote columns -- the data the earlier routing dropped.
# Pinning each here catches any regression that reverts the endpoint
# back to the bare `GreeksAllTicks` collection.
first_row_open = 41.71
first_row_high = 42.78
first_row_low = 40.48
first_row_close = 42.78
first_row_volume = 683
first_row_count = 99
first_row_bid_size = 325
first_row_bid_exchange = 5
first_row_bid_condition = 50
first_row_ask_size = 418
first_row_ask_exchange = 5
first_row_ask_condition = 50

# Quote pair (also in the bare `GreeksAllTick`, pinned for completeness).
first_row_bid = 42.39
first_row_ask = 43.25

# Greek anchors -- delta = 1.0 (deep-ITM clamp), iv_error = 0.0109
# anchors the four-decimal Greek-precision decode. All other Greeks are
# 0.0 for the clamped row.
first_row_delta = 1.0
first_row_gamma = 0.0
first_row_implied_volatility = 0.0
first_row_iv_error = 0.0109

# Underlying snapshot: 17:15:39.187 EDT -> 62_139_187 ms past 00:00 NY.
first_row_underlying_ms_of_day = 62139187
first_row_underlying_price = 542.7799
first_row_date = 20240614
